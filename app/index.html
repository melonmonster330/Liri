        <div style={{ minHeight:"100vh", background:"#080810", color:"#f0e6d3", fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", position:"relative", overflow:"hidden" }}>

          {/* Blurred album art backdrop */}
          {artwork && (
            <div style={{ position:"fixed", inset:"-20px", zIndex:0, backgroundImage:`url(${artwork})`, backgroundSize:"cover", backgroundPosition:"center", filter:"blur(80px) brightness(0.15) saturate(2)", transition:"opacity 1s ease", opacity: isSyncing ? 1 : 0.4 }} />
          )}
          <div style={{ position:"fixed", inset:0, zIndex:1, background:"linear-gradient(to bottom, rgba(8,8,16,0.6) 0%, rgba(8,8,16,0.3) 40%, rgba(8,8,16,0.7) 100%)", pointerEvents:"none" }} />

          {/* ── ONBOARDING OVERLAY ── */}
          {showOnboarding && (
            <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(8,8,16,0.96)", backdropFilter:"blur(12px)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 32px" }}>

              {/* Skip button */}
              {onboardingStep < ONBOARDING_STEPS - 1 && (
                <button onClick={dismissOnboarding} style={{ position:"absolute", top:"max(24px, calc(env(safe-area-inset-top) + 12px))", right:"24px", background:"none", border:"none", color:"rgba(255,255,255,0.25)", cursor:"pointer", fontSize:"14px", fontFamily:"inherit" }}>Skip</button>
              )}

              {/* Step 0: Welcome */}
              {onboardingStep === 0 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <Vinyl size={120} spinning={false} />
                  <div style={{ marginTop:"28px", fontSize:"13px", letterSpacing:"4px", color:"#d4a846", textTransform:"uppercase", marginBottom:"8px" }}>Welcome to</div>
                  <div style={{ fontSize:"40px", letterSpacing:"16px", color:"#d4a846", fontWeight:"300", marginBottom:"12px" }}>LIRI</div>
                  <div style={{ fontSize:"16px", color:"rgba(255,255,255,0.35)", letterSpacing:"2px", marginBottom:"40px" }}>Lyrics for Vinyl</div>
                  <p style={{ fontSize:"17px", color:"rgba(255,255,255,0.6)", lineHeight:"1.8", maxWidth:"280px", margin:"0 auto 48px" }}>
                    Put on a record. Hold your phone near the speakers. Watch the lyrics appear — in perfect sync.
                  </p>
                  <button onClick={() => setOnboardingStep(1)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"18px 52px", fontSize:"15px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit", letterSpacing:"1px", boxShadow:"0 8px 32px rgba(212,168,70,0.3)" }}>
                    Let's go →
                  </button>
                </div>
              )}

              {/* Step 1: How to Listen */}
              {onboardingStep === 1 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <div style={{ marginBottom:"32px" }}><WaveAnimation active={true} size={1.2} /></div>
                  <div style={{ fontSize:"26px", fontWeight:"700", color:"#f0e6d3", marginBottom:"16px" }}>Hold it close</div>
                  <p style={{ fontSize:"15px", color:"rgba(255,255,255,0.5)", lineHeight:"1.9", maxWidth:"280px", margin:"0 auto 48px" }}>
                    When your record is playing, tap <strong style={{ color:"#d4a846" }}>Listen</strong> and hold your phone near the speakers. Liri identifies the song and syncs the words in real time.
                  </p>
                  <div style={{ display:"flex", gap:"16px", justifyContent:"center", alignItems:"center" }}>
                    <button onClick={() => setOnboardingStep(0)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"12px 24px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>← Back</button>
                    <button onClick={() => setOnboardingStep(2)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Next →</button>
                  </div>
                </div>
              )}

              {/* Step 2: History */}
              {/* TODO ART: ⏱ placeholder — replace with original Liri history/time illustration */}
              {onboardingStep === 2 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <div style={{ fontSize:"72px", marginBottom:"24px", filter:"drop-shadow(0 0 20px rgba(212,168,70,0.4))" }}>⏱</div>
                  <div style={{ fontSize:"26px", fontWeight:"700", color:"#f0e6d3", marginBottom:"16px" }}>Your listening history</div>
                  <p style={{ fontSize:"15px", color:"rgba(255,255,255,0.5)", lineHeight:"1.9", maxWidth:"280px", margin:"0 auto 32px" }}>
                    Every song you identify gets saved automatically. Tap the <strong style={{ color:"#d4a846" }}>clock icon</strong> anytime to see what's been spinning on your turntable.
                  </p>
                  {/* Mini history preview */}
                  <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"16px", padding:"12px 16px", maxWidth:"280px", margin:"0 auto 40px", textAlign:"left" }}>
                    {[{title:"Blue in Green", artist:"Miles Davis"}, {title:"God Only Knows", artist:"The Beach Boys"}, {title:"In the Aeroplane", artist:"Neutral Milk Hotel"}].map((s,i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"8px 0", borderBottom: i < 2 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                        <div style={{ width:"36px", height:"36px", borderRadius:"6px", background:"rgba(212,168,70,0.15)", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px" }}>♪</div>
                        <div>
                          <div style={{ fontSize:"13px", fontWeight:"600", color:"#f0e6d3" }}>{s.title}</div>
                          <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.35)" }}>{s.artist}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex", gap:"16px", justifyContent:"center", alignItems:"center" }}>
                    <button onClick={() => setOnboardingStep(1)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"12px 24px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>← Back</button>
                    <button onClick={() => setOnboardingStep(3)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Next →</button>
                  </div>
                </div>
              )}

              {/* Step 3: Vinyl Auto Mode */}
              {onboardingStep === 3 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"16px", marginBottom:"28px" }}>
                    <Vinyl size={80} spinning={false} />
                    <div style={{ width:"52px", height:"30px", borderRadius:"15px", background:"linear-gradient(135deg, #d4a846, #c9807a)", position:"relative", flexShrink:0 }}>
                      <div style={{ position:"absolute", top:"5px", right:"5px", width:"20px", height:"20px", borderRadius:"50%", background:"white", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
                    </div>
                  </div>
                  <div style={{ fontSize:"26px", fontWeight:"700", color:"#f0e6d3", marginBottom:"16px" }}>Vinyl Auto Mode</div>
                  <p style={{ fontSize:"15px", color:"rgba(255,255,255,0.5)", lineHeight:"1.9", maxWidth:"280px", margin:"0 auto 32px" }}>
                    Turn on <strong style={{ color:"#d4a846" }}>Auto Mode</strong> in Settings and Liri will automatically listen for the next track as each song ends — no tapping needed.
                  </p>
                  <div style={{ background:"rgba(212,168,70,0.07)", border:"1px solid rgba(212,168,70,0.15)", borderRadius:"14px", padding:"12px 16px", maxWidth:"260px", margin:"0 auto 40px", fontSize:"13px", color:"rgba(255,255,255,0.35)", lineHeight:"1.7" }}>
                    ✦ Detects end of side after two failed listens
                  </div>
                  <div style={{ display:"flex", gap:"16px", justifyContent:"center", alignItems:"center" }}>
                    <button onClick={() => setOnboardingStep(2)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"12px 24px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>← Back</button>
                    <button onClick={() => setOnboardingStep(4)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Next →</button>
                  </div>
                </div>
              )}

              {/* Step 4: Cast to TV */}
              {/* TODO ART: 📺 placeholder — replace with original Liri TV/cast illustration */}
              {onboardingStep === 4 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <div style={{ fontSize:"72px", marginBottom:"24px", filter:"drop-shadow(0 0 24px rgba(200,120,120,0.4))" }}>📺</div>
                  <div style={{ fontSize:"26px", fontWeight:"700", color:"#f0e6d3", marginBottom:"16px" }}>See it on the big screen</div>
                  <p style={{ fontSize:"15px", color:"rgba(255,255,255,0.5)", lineHeight:"1.9", maxWidth:"280px", margin:"0 auto 32px" }}>
                    While lyrics are syncing, tap <strong style={{ color:"#d4a846" }}>📺</strong> to cast to any TV browser. Scan the QR code or type the URL — no app needed.
                  </p>
                  <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"16px", padding:"16px", maxWidth:"240px", margin:"0 auto 40px" }}>
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", letterSpacing:"2px", marginBottom:"8px" }}>ROOM CODE</div>
                    <div style={{ fontSize:"36px", fontWeight:"800", letterSpacing:"10px", color:"#d4a846" }}>ABCDEF</div>
                  </div>
                  <div style={{ display:"flex", gap:"16px", justifyContent:"center", alignItems:"center" }}>
                    <button onClick={() => setOnboardingStep(3)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"12px 24px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>← Back</button>
                    <button onClick={() => setOnboardingStep(5)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Next →</button>
                  </div>
                </div>
              )}

              {/* Step 5: Credits + Copyright */}
              {onboardingStep === 5 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both", maxWidth:"320px", margin:"0 auto" }}>

                  {/* Liri mark */}
                  <Vinyl size={64} spinning={false} />
                  <div style={{ marginTop:"16px", fontSize:"11px", letterSpacing:"4px", color:"rgba(212,168,70,0.5)", textTransform:"uppercase", marginBottom:"6px" }}>Liri</div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.2)", marginBottom:"32px" }}>© {new Date().getFullYear()} Liri. All rights reserved.</div>

                  {/* Artist acknowledgment */}
                  <div style={{ background:"rgba(212,168,70,0.06)", border:"1px solid rgba(212,168,70,0.12)", borderRadius:"16px", padding:"18px 20px", marginBottom:"24px" }}>
                    <div style={{ fontSize:"13px", color:"rgba(212,168,70,0.7)", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"10px" }}>To the artists</div>
                    <p style={{ fontSize:"13px", color:"rgba(255,255,255,0.4)", lineHeight:"1.8" }}>
                      The lyrics displayed in Liri belong to the artists, songwriters, and publishers who created them. We're just here to help you feel every word.
                    </p>
                  </div>

                  {/* Credits row */}
                  <div style={{ marginBottom:"36px" }}>
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"14px" }}>Made possible by</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                      {[
                        { name:"ACRCloud",    role:"Audio recognition" },
                        { name:"LRCLib",      role:"Synced lyrics" },
                        { name:"Apple iTunes",role:"Track & album data" },
                        { name:"Liri Community", role:"Vinyl pressing database" },
                      ].map(c => (
                        <div key={c.name} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 14px", background:"rgba(255,255,255,0.03)", borderRadius:"10px" }}>
                          <span style={{ fontSize:"13px", color:"rgba(255,255,255,0.55)", fontWeight:"500" }}>{c.name}</span>
                          <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>{c.role}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* CTA */}
                  <button onClick={dismissOnboarding} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"18px 52px", fontSize:"15px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit", letterSpacing:"1px", boxShadow:"0 8px 32px rgba(212,168,70,0.3)" }}>
                    Start listening →
                  </button>
                  <div style={{ marginTop:"14px" }}>
                    <button onClick={() => setOnboardingStep(4)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:"13px", fontFamily:"inherit" }}>← Back</button>
                  </div>
                </div>
              )}

              {/* Pagination dots */}
              <div style={{ position:"absolute", bottom:"max(40px, calc(env(safe-area-inset-bottom) + 24px))", left:0, right:0, display:"flex", justifyContent:"center", gap:"8px" }}>
                {Array.from({ length: ONBOARDING_STEPS }).map((_, i) => (
                  <div key={i} onClick={() => setOnboardingStep(i)} style={{ width: i === onboardingStep ? "20px" : "6px", height:"6px", borderRadius:"3px", background: i === onboardingStep ? "#d4a846" : "rgba(255,255,255,0.15)", transition:"all 0.3s ease", cursor:"pointer" }} />
                ))}
              </div>
            </div>
          )}

          {/* ── CAST MODAL ── */}
          {showCast && (
            <div onClick={() => setShowCast(false)} style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
              <div onClick={e => e.stopPropagation()} style={{ background:"#0f0f1c", borderRadius:"24px 24px 0 0", padding:"8px 28px max(40px, calc(env(safe-area-inset-bottom) + 28px))", width:"100%", maxWidth:"480px", animation:"slide-up 0.3s ease", textAlign:"center" }}>
                <div style={{ padding:"12px 0 20px", cursor:"pointer" }} onClick={() => setShowCast(false)}>
                  <div style={{ width:"40px", height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.12)", display:"inline-block" }} />
                </div>

                <div style={{ fontSize:"11px", letterSpacing:"3px", color:"#d4a846", textTransform:"uppercase", marginBottom:"6px" }}>Cast to TV</div>

                {/* ── Chromecast section (when Cast SDK is available) ── */}
                {castReady ? (
                  <div>
                    {castConnected ? (
                      /* Currently connected */
                      <div>
                        <div style={{ display:"inline-flex", alignItems:"center", gap:"10px", background:"rgba(212,168,70,0.08)", border:"1px solid rgba(212,168,70,0.2)", borderRadius:"50px", padding:"10px 20px", marginBottom:"28px" }}>
                          <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:"#d4a846", boxShadow:"0 0 8px rgba(212,168,70,0.8)" }} />
                          <span style={{ fontSize:"14px", color:"rgba(255,255,255,0.7)" }}>Casting to <strong style={{ color:"#d4a846" }}>{castDeviceName || "TV"}</strong></span>
                        </div>
                        <div style={{ marginBottom:"32px" }}>
                          <button onClick={stopCast} style={{ background:"rgba(232,160,168,0.1)", border:"1px solid rgba(232,160,168,0.2)", color:"#e8a0a8", borderRadius:"50px", padding:"12px 28px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>
                            Stop casting
                          </button>
                        </div>
                      </div>
                    ) : (
                      /* Not connected — show device picker button */
                      <div>
                        <p style={{ fontSize:"14px", color:"rgba(255,255,255,0.3)", marginBottom:"28px", lineHeight:"1.7" }}>
                          Tap below to choose a Chromecast or Google TV on your network.
                        </p>
                        <button
                          onClick={() => castContext?.requestSession().catch(() => {})}
                          style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"14px", padding:"16px 36px", fontSize:"15px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.5px", boxShadow:"0 8px 24px rgba(212,168,70,0.3)", marginBottom:"12px", display:"block", width:"100%", maxWidth:"300px", margin:"0 auto 12px" }}>
                          Choose Chromecast device
                        </button>
                        <p style={{ fontSize:"12px", color:"rgba(255,255,255,0.15)", marginBottom:"28px" }}>
                          Your Chromecast must be on the same Wi-Fi network
                        </p>
                      </div>
                    )}
                    {/* Divider */}
                    <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"24px" }}>
                      <div style={{ flex:1, height:"1px", background:"rgba(255,255,255,0.06)" }} />
                      <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", letterSpacing:"1px" }}>OR USE ROOM CODE</span>
                      <div style={{ flex:1, height:"1px", background:"rgba(255,255,255,0.06)" }} />
                    </div>
                  </div>
                ) : (
                  /* Cast SDK not available (iOS Safari, Firefox, etc.) */
                  <p style={{ fontSize:"13px", color:"rgba(255,255,255,0.25)", marginBottom:"24px", lineHeight:"1.7" }}>
                    Direct Chromecast requires Chrome on Android or desktop.<br/>
                    <span style={{ color:"rgba(212,168,70,0.5)" }}>Use the room code below on any TV browser.</span>
                  </p>
                )}

                {/* ── QR / Room code fallback (always shown) ── */}
                {qrUrl && <img src={qrUrl} alt="QR Code" style={{ width:"160px", height:"160px", borderRadius:"14px", marginBottom:"16px" }} />}
                <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", letterSpacing:"2px", marginBottom:"6px" }}>ROOM CODE</div>
                <div style={{ fontSize:"44px", fontWeight:"800", letterSpacing:"10px", color:"#d4a846", marginBottom:"16px" }}>{roomCode}</div>
                <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:"10px", padding:"10px 14px", marginBottom:"8px" }}>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.25)", wordBreak:"break-all" }}>{tvUrl}</div>
                </div>
                <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.18)", lineHeight:"1.7" }}>
                  Open on any smart TV browser or scan the QR code
                </div>
              </div>
            </div>
          )}

          {/* ── ALBUM PICKER SHEET ── */}
          {showAlbumPicker && (
            <div onClick={() => setShowAlbumPicker(false)} style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)" }}>
              <div onClick={e => e.stopPropagation()} style={{ position:"absolute", bottom:0, left:0, right:0, background:"#0f0f1c", borderRadius:"24px 24px 0 0", maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 -8px 48px rgba(0,0,0,0.6)", animation:"slide-up 0.3s ease" }}>
                {/* Handle */}
                <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px" }}>
                  <div style={{ width:36, height:4, borderRadius:2, background:"rgba(255,255,255,0.12)" }} />
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 24px 16px" }}>
                  <div style={{ fontSize:18, fontWeight:700 }}>What's on the turntable?</div>
                  <button onClick={() => setShowAlbumPicker(false)} style={{ background:"rgba(255,255,255,0.07)", border:"none", color:"rgba(255,255,255,0.5)", width:30, height:30, borderRadius:"50%", cursor:"pointer", fontSize:14, fontFamily:"inherit" }}>✕</button>
                </div>
                <div style={{ overflowY:"auto", padding:"0 24px", flex:1, paddingBottom:"max(24px, env(safe-area-inset-bottom))" }}>
                  {/* Clear / none option */}
                  {turntableAlbum && (
                    <button onClick={() => { setTurntableAlbum(null); setShowAlbumPicker(false); }}
                      style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"12px 0", background:"none", border:"none", borderBottom:"1px solid rgba(255,255,255,0.04)", cursor:"pointer", fontFamily:"inherit", color:"rgba(255,255,255,0.35)", fontSize:13, textAlign:"left", marginBottom:4 }}>
                      <div style={{ width:44, height:44, borderRadius:8, background:"rgba(255,255,255,0.03)", border:"1px dashed rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>✕</div>
                      <span>Clear selection — use ACR fingerprinting</span>
                    </button>
                  )}
                  {/* Library albums */}
                  {libLoading ? (
                    <div style={{ display:"flex", justifyContent:"center", padding:"32px 0" }}>
                      <div style={{ width:24, height:24, borderRadius:"50%", border:"2px solid rgba(255,255,255,0.06)", borderTopColor:"#d4a846", animation:"spin 0.8s linear infinite" }} />
                    </div>
                  ) : userLibrary.length === 0 ? (
                    <div style={{ textAlign:"center", padding:"32px 0", color:"rgba(255,255,255,0.2)" }}>
                      <div style={{ fontSize:32, marginBottom:10, opacity:0.4 }}>💿</div>
                      <div style={{ fontSize:14, marginBottom:8 }}>Your library is empty</div>
                      <a href="/library" style={{ fontSize:12, color:"rgba(212,168,70,0.6)", textDecoration:"none" }}>Go to My Records →</a>
                    </div>
                  ) : (
                    userLibrary.map(album => {
                      const isSelected = turntableAlbum?.itunes_collection_id === album.itunes_collection_id;

                      onClick={() => advanceToNextTrack(albumTracksRef.current, currentTrackIndexRef.current)}
                      disabled={currentTrackIndex >= albumTracks.length - 1}
                      style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", color: currentTrackIndex >= albumTracks.length - 1 ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.5)", borderRadius:"50%", width:"32px", height:"32px", display:"flex", alignItems:"center", justifyContent:"center", cursor: currentTrackIndex >= albumTracks.length - 1 ? "default" : "pointer", fontSize:"14px", flexShrink:0 }}>
                      →
                    </button>
                  </div>
                )}

                {/* Nudge hint label */}
                <div style={{ textAlign:"center", fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"8px", color: isResyncing ? "#d4a846" : "rgba(255,255,255,0.18)", animation: isResyncing ? "pulse 1.2s ease-in-out infinite" : "none" }}>
                  {isResyncing ? "↻ listening for resync…" : nudgeMenu ? "tap to adjust more" : "tap ± to sync lyrics"}
                </div>
                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"8px", marginBottom:"12px" }}>

                  {/* Left cluster: extra options appear to the left when expanded */}
                  <div style={{ display:"flex", gap:"6px", alignItems:"center", transition:"all 0.2s ease" }}>
                    {nudgeMenu === "left" && (
                      <>
                        <button onClick={() => handleNudge(-5)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.35)", padding:"8px 11px", borderRadius:"20px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit", animation:"fade-up 0.15s ease" }}>−5s</button>
                        <button onClick={() => handleNudge(-2)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.35)", padding:"8px 11px", borderRadius:"20px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit", animation:"fade-up 0.15s ease" }}>−2s</button>
                      </>
                    )}
                    <button onClick={() => handleNudge(-1)} style={{ background: nudgeMenu === "left" ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.15)", color:"rgba(255,255,255,0.7)", padding:"10px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"14px", fontFamily:"inherit", fontWeight:"600", transition:"background 0.2s" }}>−1s</button>
                  </div>

                  {/* Stop */}
                  <button onClick={reset} style={{ background:"rgba(212,168,70,0.12)", border:"1px solid rgba(212,168,70,0.3)", color:"#d4a846", padding:"10px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontFamily:"inherit", fontWeight:"600" }}>Stop</button>

                  {/* Right cluster: extra options appear to the right when expanded */}
                  <div style={{ display:"flex", gap:"6px", alignItems:"center", transition:"all 0.2s ease" }}>
                    <button onClick={() => handleNudge(1)} style={{ background: nudgeMenu === "right" ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.15)", color:"rgba(255,255,255,0.7)", padding:"10px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"14px", fontFamily:"inherit", fontWeight:"600", transition:"background 0.2s" }}>+1s</button>
                    {nudgeMenu === "right" && (
                      <>
                        <button onClick={() => handleNudge(2)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.35)", padding:"8px 11px", borderRadius:"20px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit", animation:"fade-up 0.15s ease" }}>+2s</button>
                        <button onClick={() => handleNudge(5)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.35)", padding:"8px 11px", borderRadius:"20px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit", animation:"fade-up 0.15s ease" }}>+5s</button>
                      </>
                    )}
                  </div>
                </div>
                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"20px" }}>
                  <button onClick={resync} disabled={isResyncing} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor: isResyncing ? "wait" : "pointer", fontSize:"12px", fontFamily:"inherit", opacity: isResyncing ? 0.4 : 1 }}>↻ Resync timing</button>
                  <span style={{ color:"rgba(255,255,255,0.1)", fontSize:"10px" }}>·</span>
                  <button onClick={() => { reset(); setTimeout(() => startListening(false), 150); }} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:"12px", fontFamily:"inherit" }}>Wrong song? Try again</button>
                </div>
                <div style={{ textAlign:"center", marginTop:"6px", fontSize:"9px", color:"rgba(255,255,255,0.1)", letterSpacing:"1px" }}>v{APP_VERSION}</div>
              </div>
            </div>
          )}

          {/* ── NON-SYNCING SCREENS ── */}
          {!isSyncing && (
            <div style={{ position:"relative", zIndex:10, minHeight:"100vh", display:"flex", flexDirection:"column" }}>

              {/* Top bar */}
              <div className="safe-top" style={{ padding:"0 20px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-start", gap:"1px" }}>
                  <div style={{ fontSize:"9px", letterSpacing:"1px", color:"rgba(255,255,255,0.15)", fontWeight:"400" }}>v{APP_VERSION}</div>
                  <div style={{ fontSize:"16px", letterSpacing:"10px", color:"#d4a846", fontWeight:"300" }}>LIRI</div>
                  {(() => { const si = getSideInfo(); return si ? (
                    <div style={{ marginTop:"3px", fontSize:"10px", fontWeight:"600", letterSpacing:"2px", color:"rgba(212,168,70,0.75)", textTransform:"uppercase" }}>
                      {si.side ? `Side ${si.side}  ·  ${si.track}` : `Track ${si.track}`}
                    </div>
                  ) : null; })()}
                </div>
                <div style={{ display:"flex", gap:"12px", alignItems:"center" }}>
                  <button onClick={() => { fetchHistory(user); setShowHistory(true); }} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.35)", cursor:"pointer", fontSize:"18px", padding:"4px", lineHeight:1 }} title="History">⏱</button>
                  {/* Account avatar */}
                  <button onClick={() => setShowSettings(true)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", border:"none", borderRadius:"50%", width:"32px", height:"32px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"13px", fontWeight:"700", color:"#080810", cursor:"pointer", flexShrink:0, boxShadow:"0 2px 8px rgba(212,168,70,0.35)", padding:0 }} title="Account">
                    {user?.email?.[0]?.toUpperCase() || "?"}
                  </button>
                </div>
              </div>

              <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 32px", textAlign:"center" }}>

                {/* IDLE */}
                {mode === "idle" && (
                  <div style={{ animation:"fade-up 0.5s ease both", width:"100%", maxWidth:"320px" }}>
                    <Vinyl size={130} spinning={false} />

                    {/* ── Turntable album selector ── */}
                    <div style={{ marginTop:"32px", marginBottom:"24px" }}>
                      {turntableAlbum ? (
                        // Album selected — whole card is tappable to change
                        <button onClick={() => { fetchUserLibrary(user.id); setShowAlbumPicker(true); }}
                          style={{ width:"100%", display:"flex", alignItems:"center", gap:"12px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"16px", padding:"12px 14px", cursor:"pointer", fontFamily:"inherit", textAlign:"left" }}>
                          {turntableAlbum.artwork_url
                            ? <img src={turntableAlbum.artwork_url} alt="" style={{ width:48, height:48, borderRadius:8, objectFit:"cover", flexShrink:0 }} />
                            : <div style={{ width:48, height:48, borderRadius:8, background:"rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>💿</div>
                          }
                          <div style={{ flex:1, minWidth:0, textAlign:"left" }}>
                            <div style={{ fontSize:"13px", fontWeight:600, color:"#f0e6d3", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{turntableAlbum.album_name}</div>
                            <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{turntableAlbum.artist_name}</div>
                          </div>
                          {turntableTracksLoading
                            ? <div style={{ width:14, height:14, borderRadius:"50%", border:"2px solid rgba(255,255,255,0.1)", borderTopColor:"#d4a846", animation:"spin 0.8s linear infinite", flexShrink:0 }} />
                            : <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.3)", flexShrink:0 }}>change</span>
                          }
                        </button>
                      ) : (
                        // No album selected — prominent call to action
                        <button onClick={() => { fetchUserLibrary(user.id); setShowAlbumPicker(true); }}
                          style={{ width:"100%", display:"flex", alignItems:"center", gap:"12px", background:"rgba(212,168,70,0.06)", border:"1px solid rgba(212,168,70,0.2)", borderRadius:"16px", padding:"14px 16px", cursor:"pointer", fontFamily:"inherit", textAlign:"left" }}>
                          <div style={{ width:40, height:40, borderRadius:8, background:"rgba(212,168,70,0.1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>💿</div>
                          <div>
                            <div style={{ fontSize:"13px", fontWeight:600, color:"rgba(212,168,70,0.9)" }}>What's on the turntable?</div>
                            <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.35)", marginTop:2 }}>Tap to choose a record from your library</div>
                          </div>
                        </button>
                      )}
                    </div>

                    <button onClick={() => !turntableTracksLoading && startListening(false)}
                      style={{ background: turntableTracksLoading ? "rgba(255,255,255,0.08)" : "linear-gradient(135deg, #d4a846, #c9807a)", color: turntableTracksLoading ? "rgba(255,255,255,0.3)" : "#080810", border:"none", borderRadius:"50px", padding:"18px 52px", fontSize:"15px", fontWeight:"700", letterSpacing:"1px", cursor: turntableTracksLoading ? "default" : "pointer", fontFamily:"inherit", boxShadow: turntableTracksLoading ? "none" : "0 8px 32px rgba(212,168,70,0.3)", width:"100%", transition:"all 0.2s" }}>
                      {turntableTracksLoading ? "Loading tracks…" : turntableAlbum ? "Find my place" : "Listen"}
                    </button>
                    {vinylMode && (
                      <div style={{ marginTop:"16px", fontSize:"12px", color:"rgba(212,168,70,0.5)", letterSpacing:"1px" }}>✦ Vinyl Auto Mode on</div>
                    )}
                    {!isUnlimited(user) && (
                      <div style={{ marginTop:"12px", fontSize:"12px", color:"rgba(255,255,255,0.2)" }}>
                        {FREE_LIMIT - usageCount} free {FREE_LIMIT - usageCount === 1 ? "song" : "songs"} remaining
                      </div>
                    )}
                  </div>
                )}

                {/* LISTENING */}
                {mode === "listening" && (
                  <div style={{ animation:"fade-up 0.3s ease both" }}>
                    <div style={{ position:"relative", width:"120px", height:"120px", margin:"0 auto 16px" }}>
                      <div style={{ position:"absolute", inset:0 }}><ProgressRing progress={listenProgress} size={120} /></div>
                      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <WaveAnimation active={true} level={audioLevel} />
                      </div>
                    </div>
                    {/* Live volume label — hidden once we move to lyric-matching phase */}
                    {listenAttempt <= MAX_ATTEMPTS && (
                      <div style={{ marginBottom:"20px", fontSize:"11px", letterSpacing:"1.5px", textTransform:"uppercase",
                        color: audioLevel > 0.05 ? "#d4a846" : "#c9807a",
                        transition:"color 0.2s ease" }}>
                        {audioLevel > 0.25 ? "● Loud — perfect"
                       : audioLevel > 0.05 ? "● Good signal"
                       :                     "● Too quiet — move closer"}
                      </div>
                    )}
                    <div style={{ fontSize:"22px", fontWeight:"600", color:"#f0e6d3", marginBottom:"10px",
                      marginTop: listenAttempt > MAX_ATTEMPTS ? "20px" : "0" }}>
                      {listenAttempt > MAX_ATTEMPTS ? "Matching by lyrics…" : "Listening…"}
                    </div>
                    <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.3)" }}>
                      {listenAttempt > MAX_ATTEMPTS
                        ? "Identifying by lyrics"
                        : listenSecs === 0
                        ? "Hold near your speakers"
                        : `${listenSecs}s — hold steady`}
                    </div>
                    <div style={{ display:"flex", gap:"12px", marginTop:"28px", justifyContent:"center" }}>
                      <button onClick={() => { listenSessionRef.current++; clearInterval(progressTimerRef.current); streamRef.current?.getTracks().forEach(t => t.stop()); reset(); }} style={{ background:"none", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.4)", borderRadius:"50px", padding:"10px 26px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>Stop</button>
                      <button onClick={() => { listenSessionRef.current++; clearInterval(progressTimerRef.current); streamRef.current?.getTracks().forEach(t => t.stop()); startListening(false); }} style={{ background:"none", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"10px 26px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>↺ Different song</button>
                    </div>
                  </div>
                )}

                {/* DETECTING */}
                {mode === "detecting" && (
                  <div style={{ animation:"fade-up 0.3s ease both" }}>
                    <Vinyl size={100} spinning={true} />
                    <div style={{ marginTop:"28px", fontSize:"20px", fontWeight:"600", color:"#f0e6d3", marginBottom:"8px" }}>Identifying…</div>
                    <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.3)" }}>Just a moment</div>
                    <button onClick={() => { listenSessionRef.current++; startListening(false); }} style={{ marginTop:"28px", background:"none", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"10px 26px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>↺ Different song</button>
                  </div>
                )}

                {/* ERROR */}
                {mode === "error" && (
                  <div style={{ maxWidth:"320px", animation:"fade-up 0.3s ease both" }}>
                    <div style={{ fontSize:"48px", marginBottom:"20px" }}>🎵</div>
                    {error?.split("\n\n").map((block, i) => (
                      <div key={i}
                        onClick={i === 1 ? () => { navigator.clipboard?.writeText(block).catch(() => {}); } : undefined}
                        title={i === 1 ? "Tap to copy log" : undefined}
                        style={{
                          marginBottom:"12px",
                          color: i === 0 ? "#e8a0a8" : "rgba(255,255,255,0.3)",
                          fontSize: i === 0 ? "15px" : "11px",
                          lineHeight: "1.7",
                          fontFamily: i > 0 ? "monospace" : "inherit",
                          whiteSpace: "pre-wrap",
                          textAlign: i > 0 ? "left" : "center",
                          background: i === 1 ? "rgba(255,255,255,0.04)" : "none",
                          borderRadius: i === 1 ? "8px" : 0,
                          padding: i === 1 ? "10px 12px" : 0,
                          cursor: i === 1 ? "pointer" : "default",
                          maxHeight: i === 1 ? "180px" : "none",
                          overflowY: i === 1 ? "auto" : "visible",
                        }}>{block}</div>
                    ))}
                    <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", justifyContent:"center", marginTop:"8px" }}>
                      <button onClick={reset} style={{ background:"none", border:"1px solid rgba(212,168,70,0.4)", color:"#d4a846", borderRadius:"50px", padding:"12px 32px", fontSize:"14px", cursor:"pointer", fontFamily:"inherit" }}>Try Again</button>
                      {lastRecordingRef.current && (
                        <button onClick={() => {
                          const url = URL.createObjectURL(lastRecordingRef.current);
                          const a = document.createElement("a");
                          a.href = url; a.download = "liri-recording.webm"; a.click();
                          setTimeout(() => URL.revokeObjectURL(url), 5000);
                        }} style={{ background:"none", border:"1px solid rgba(255,255,255,0.15)", color:"rgba(255,255,255,0.4)", borderRadius:"50px", padding:"12px 24px", fontSize:"12px", cursor:"pointer", fontFamily:"inherit" }}>
                          ↓ recording
                        </button>
                      )}
                    </div>
                  </div>
                )}

                {/* SIDE END */}
                {mode === "side-end" && (
                  <div style={{ maxWidth:"300px", animation:"fade-up 0.3s ease both", textAlign:"center" }}>
                    <Vinyl size={100} spinning={false} />
                    {sideEndReason === "flip" && (
                      <>
                        <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>Time to flip! 💿</div>
                        <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                          Flip your record, drop the needle,<br/>then tap Listen.
                        </div>
                        <button onClick={() => { reset(); setTimeout(() => startListening(false), 300); }} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Flip &amp; Listen →</button>
                      </>
                    )}
                    {sideEndReason === "album-end" && (
                      <>
                        <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>That's the album ✓</div>
                        <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                          You've reached the end.<br/>Put on another record to keep going.
                        </div>
                        <button onClick={reset} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>New Record →</button>
                      </>
                    )}
                    {sideEndReason === "failed" && (
                      <>
                        <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>End of side?</div>
                        <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                          Couldn't detect another track.<br/>Flip your record and tap Listen to continue.
                        </div>
                        <button onClick={reset} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Start Side B</button>
                      </>
                    )}
                  </div>
                )}

                {/* LIMIT */}
                {mode === "limit" && (
                  <div style={{ maxWidth:"300px", animation:"fade-up 0.3s ease both", textAlign:"center" }}>
                    <Vinyl size={100} spinning={false} />
                    <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>You've played 10 records</div>
                    <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                      Your 10 free songs are up.<br/>Liri Pro is coming soon — stay tuned.
                    </div>
                    <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.2)", marginBottom:"24px" }}>
                      Want early access?<br/><span style={{ color:"#d4a846" }}>hello@getliri.com</span>
                    </div>
                    <button onClick={() => setMode("idle")} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"10px 28px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>Back</button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Liri />);
  </script>
</body>
</html>
