<!--
  app/index.html — Liri Main App
  ──────────────────────────────────────────────────────────────────────────────
  The entire Liri web app lives in this single file (React 18 + Babel, no build).

  What it does:
  • Captures ~8s of audio via the device microphone and sends it to /api/recognize
  • ACRCloud identifies the song and returns the title, artist, and exact playback offset
  • Fetches timestamped LRC lyrics from lrclib.net and syncs them in real time
  • Vinyl Auto Mode: pulls the full album tracklist from iTunes, auto-advances
    through tracks, and detects side-flip points using:
      1. Liri Vinyl Database (Supabase) — most accurate, community-verified
      2. User-confirmed localStorage data — improves with use per-album
      3. Duration heuristic — fallback for unknown albums
  • TV Cast: broadcasts the current lyric line to tv.html via Supabase Realtime
  • Flip reminders: Web Audio API chime + push notification when a side ends

  Key dependencies (all loaded from CDN, no build step required):
  • React 18 + ReactDOM
  • Babel standalone (transpiles JSX in-browser)
  • Supabase JS client

  Supabase tables used:
  • user_usage       — tracks listen counts per user
  • song_history     — per-user history of identified songs
  • cast_sessions    — real-time TV cast state
  • vinyl_releases   — community vinyl pressing data
  • vinyl_tracks     — per-track side/position data for flip detection

  No environment variables needed client-side — all secrets live server-side
  in api/recognize.js (Vercel environment variables).
-->

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    if (typeof supabase === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="min-height:100vh;background:#080810;display:flex;align-items:center;justify-content:center;font-family:system-ui;color:#e8a0a8;text-align:center;padding:32px">Could not load auth library.<br><small style="color:#333;margin-top:8px;display:block">Check your connection and reload</small></div>';
      throw new Error('Supabase not loaded');
    }

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    const APP_VERSION = "1.03";

    const PROXY_URL = window.Capacitor
      ? "https://liri-vert.vercel.app/api/recognize"
      : "/api/recognize";

    // ── Google Cast ───────────────────────────────────────────────────────────
    // Replace with your App ID from cast.google.com/publish after registering.
    // Receiver URL to register: https://getliri.app/tv (or your Vercel URL/tv)
    const CAST_APP_ID = "2FBB66AA";
    const CAST_NS     = "urn:x-cast:com.getliri.lyrics";

    // Cast state — lives outside React so it's not re-created on renders
    let castContext    = null;
    let castAvailable  = false;

    window["__onGCastApiAvailable"] = function(isAvailable) {
      if (!isAvailable) return;
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({
          receiverApplicationId: CAST_APP_ID,
          autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
        });
        castAvailable = true;
        // Notify React that Cast became available
        window.dispatchEvent(new Event("liri-cast-ready"));
      } catch (e) { console.warn("Cast init failed:", e); }
    };

    // ── ART TODO — replace all emoji placeholders with original Liri illustrations ──────────────
    // Search "TODO ART" to find all locations. Priority order:
    //   1. Onboarding Step 2 (⏱)  → custom "song history / time" illustration
    //   2. Onboarding Step 4 (📺)  → custom "cast to TV" illustration
    //   3. Landing page feature cards (🎵 → sound/wave art, 💿 → vinyl art)
    //      Note: ✦ (sparkle character) is intentional Liri type — keep it
    //   4. Settings panel — consider a custom Liri icon or wordmark instead of generic text
    // All original artwork should match the dark palette: deep navy #080810, gold #d4a846, rose #c9807a
    // ─────────────────────────────────────────────────────────────────────────────────────────────

    // How many seconds we add to ACRCloud's offset to correct for processing lag
    const PLAYBACK_OFFSET_CORRECTION = 4.0;
    // Extra offset added when auto-advancing to next track (no re-listen),
    // accounting for lyrics-fetch + state-update delay. Tune if still drifting.
    const AUTO_ADVANCE_OFFSET = 2.0;

    function parseLRC(lrc) {
      const re = /\[(\d{2}):(\d{2})[.:](\d{2,3})\](.*)/;
      return lrc.split("\n").reduce((acc, line) => {
        const m = line.match(re);
        if (!m) return acc;
        const t = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3].padEnd(3,"0").slice(0,3)) / 1000;
        const text = m[4].trim();
        if (text) acc.push({ time: t, text });
        return acc;
      }, []).sort((a, b) => a.time - b.time);
    }

    function formatTime(s) {
      return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;
    }

    function timeAgo(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    const styleEl = document.createElement("style");
    styleEl.textContent = `
      @keyframes vinyl-spin { to { transform: rotate(360deg); } }
      @keyframes wave-0 { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
      @keyframes wave-1 { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
      @keyframes wave-2 { from { transform: scaleY(0.2); } to { transform: scaleY(0.9); } }
      @keyframes wave-3 { from { transform: scaleY(0.6); } to { transform: scaleY(1); } }
      @keyframes fade-up  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes pulse    { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
      .safe-top { padding-top: max(56px, calc(env(safe-area-inset-top) + 16px)) !important; }
      .safe-bottom { padding-bottom: max(32px, calc(env(safe-area-inset-bottom) + 16px)) !important; }
    `;
    document.head.appendChild(styleEl);

    function Vinyl({ size = 120, spinning = false }) {
      return (
        <div style={{ width:size, height:size, margin:"0 auto", animation: spinning ? "vinyl-spin 2s linear infinite" : "none", flexShrink:0 }}>
          <svg viewBox="0 0 100 100" style={{ width:"100%", height:"100%" }}>
            <defs>
              <radialGradient id="vg2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#1e1828" />
                <stop offset="70%" stopColor="#0a0812" />
                <stop offset="100%" stopColor="#050508" />
              </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="49" fill="url(#vg2)" />
            {[46,42,38,34,30,26,22].map((r,i) => (
              <circle key={i} cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="0.8" />
            ))}
            <circle cx="50" cy="50" r="10" fill="#d4a846" opacity="0.85" />
            <circle cx="50" cy="50" r="3.5" fill="#080810" />
          </svg>
        </div>
      );
    }

    function WaveAnimation({ active, size = 1 }) {
      return (
        <div style={{ display:"flex", gap:`${4*size}px`, alignItems:"center", height:`${52*size}px`, justifyContent:"center" }}>
          {[20,34,48,40,28,44,32,48,36,24,40,30].map((h, i) => (
            <div key={i} style={{
              width:`${3*size}px`, borderRadius:"2px",
              background:"linear-gradient(to top, #d4a846, #e8a0a8)",
              height: active ? `${h*size}px` : `${3*size}px`,
              animation: active ? `wave-${i%4} ${0.5+i*0.07}s ease-in-out infinite alternate` : "none",
              transition:"height 0.3s ease",
              opacity: active ? 1 : 0.3,
            }} />
          ))}
        </div>
      );
    }

    function ProgressRing({ progress, size = 96 }) {
      const r = size/2 - 5, circ = 2 * Math.PI * r;
      return (
        <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3" />
          <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth="3" strokeLinecap="round"
            stroke="url(#pg2)" strokeDasharray={`${circ*progress} ${circ}`}
            style={{ transition:"stroke-dasharray 0.1s linear" }} />
          <defs>
            <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#d4a846" /><stop offset="100%" stopColor="#e8a0a8" />
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function Liri() {
      // ── Core state ──
      const [mode, setMode]                   = useState("idle");
      const [detectedSong, setDetectedSong]   = useState(null);
      const [songDuration, setSongDuration]   = useState(null); // seconds
      const [lyrics, setLyrics]               = useState([]);
      const [currentIndex, setCurrentIndex]   = useState(0);
      const [playbackTime, setPlaybackTime]   = useState(0);
      const [error, setError]                 = useState(null);
      const [listenProgress, setListenProgress]   = useState(0);
      const [listenAttempt, setListenAttempt]     = useState(0); // which rolling attempt we're on

      // ── UI panels ──
      const [showSettings, setShowSettings]   = useState(false);
      const [showHistory, setShowHistory]     = useState(false);

      // ── Auth ──
      const [user, setUser]                   = useState(null);
      const [authLoading, setAuthLoading]     = useState(true);
      const [authMode, setAuthMode]           = useState("signin");
      const [authEmail, setAuthEmail]         = useState("");
      const [authPassword, setAuthPassword]   = useState("");
      const [authError, setAuthError]         = useState(null);
      const [authWorking, setAuthWorking]     = useState(false);

      // ── Usage ──
      const [usageCount, setUsageCount]       = useState(0);
      const FREE_LIMIT = 10;
      const isUnlimited = (u) => u?.email === "test@test.com";

      // ── History ──
      const [history, setHistory]             = useState([]);
      const [historyLoading, setHistoryLoading] = useState(false);

      // ── Vinyl auto mode ──
      const [vinylMode, setVinylMode]         = useState(() => localStorage.getItem("liri_vinyl_mode") === "true");
      const autoAdvanceFiredRef               = useRef(false);
      const autoRetryCountRef                 = useRef(0);

      // ── Album tracklist (for vinyl auto-advance without re-listening) ──
      const [albumTracks, setAlbumTracks]             = useState([]);
      const [currentTrackIndex, setCurrentTrackIndex] = useState(-1);
      const albumTracksRef                            = useRef([]);
      const currentTrackIndexRef                      = useRef(-1);

      // ── Resync / advance flags ──
      const [isResyncing, setIsResyncing]             = useState(false);
      const [shouldAdvanceTrack, setShouldAdvanceTrack] = useState(false);
      const [sideEndReason, setSideEndReason]         = useState("failed"); // "failed" | "flip" | "album-end"

      // ── Per-album side learning (silent — no user-facing UI) ──
      const [albumCollectionId, setAlbumCollectionId] = useState(null);
      const albumCollectionIdRef                      = useRef(null);
      const albumTpsRef                               = useRef(0); // effective tps from localStorage learning or heuristic

      // ── Liri vinyl database ──
      const [vinylDbRelease, setVinylDbRelease]       = useState(null);
      const vinylDbReleaseRef                         = useRef(null);

      // ── Flip notifications ──
      const [flipSound, setFlipSound]   = useState(() => localStorage.getItem("liri_flip_sound") !== "false");
      const [flipNotify, setFlipNotify] = useState(() => localStorage.getItem("liri_flip_notify") === "true");
      const [notifyDenied, setNotifyDenied] = useState(false);

      // ── Nudge expand ──
      const [nudgeMenu, setNudgeMenu]         = useState(null); // null | "left" | "right"
      const nudgeMenuTimerRef                 = useRef(null);

      // ── Onboarding ──
      const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem("liri_onboarding_done"));
      const [onboardingStep, setOnboardingStep] = useState(0);
      const ONBOARDING_STEPS = 6;
      const dismissOnboarding = () => { localStorage.setItem("liri_onboarding_done", "true"); setShowOnboarding(false); };

      // ── Analytics: persistent anonymous session ID ──
      // Stays in localStorage forever so we can track listening patterns even
      // before a user creates an account. Once logged in, user_id takes over.
      const sessionId = React.useMemo(() => {
        let sid = localStorage.getItem("liri_session_id");
        if (!sid) {
          sid = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,
            c => (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
          localStorage.setItem("liri_session_id", sid);
        }
        return sid;
      }, []);

      // ── Cast ──
      const [showCast, setShowCast]                 = useState(false);
      const [castReady, setCastReady]               = useState(false);   // Cast SDK loaded + App ID set
      const [castConnected, setCastConnected]       = useState(false);   // Active Cast session
      const [castDeviceName, setCastDeviceName]     = useState(null);    // e.g. "Living Room TV"

      // Browser-mode fallback (QR code)
      const roomCode = user?.id ? user.id.replace(/-/g, "").slice(0, 6).toUpperCase() : null;
      const tvUrl = roomCode ? `${location.origin}/tv?room=${roomCode}` : null;
      const qrUrl = tvUrl ? `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(tvUrl)}&size=220x220&bgcolor=0f0f1c&color=d4a846&margin=12&qzone=1` : null;

      // Listen for Cast SDK becoming ready
      useEffect(() => {
        const onReady = () => setCastReady(true);
        window.addEventListener("liri-cast-ready", onReady);
        if (castAvailable) setCastReady(true);
        return () => window.removeEventListener("liri-cast-ready", onReady);
      }, []);

      // Track Cast session state
      useEffect(() => {
        if (!castReady || !castContext) return;
        const onSessionChange = () => {
          const session = castContext.getCurrentSession();
          setCastConnected(!!session);
          setCastDeviceName(session?.getCastDevice()?.friendlyName || null);
        };
        castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onSessionChange);
        return () => castContext.removeEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onSessionChange);
      }, [castReady]);

      // Send lyrics to Chromecast whenever a song is detected/advanced
      const sendToCast = useCallback((song, lyricsArr, initialPos, detectedAt) => {
        if (!castReady || !castConnected) return;
        try {
          const session = castContext.getCurrentSession();
          if (!session) return;
          session.sendMessage(CAST_NS, {
            type:       "SESSION_START",
            songTitle:  song.title,
            songArtist: song.artist,
            artworkUrl: song.artwork || null,
            lyrics:     lyricsArr,
            initialPos,
            detectedAt: detectedAt || Date.now(),
          });
        } catch (e) { console.warn("Cast send failed:", e); }
      }, [castReady, castConnected]);

      const stopCast = useCallback(() => {
        if (!castReady || !castConnected) return;
        try {
          const session = castContext.getCurrentSession();
          session?.sendMessage(CAST_NS, { type: "SESSION_END" });
          castContext.endCurrentSession(true);
        } catch (e) {}
        setCastConnected(false);
      }, [castReady, castConnected]);

      const syncCastSession = async (song, lyricsArr, initialPos) => {
        const now = Date.now();
        // 1. Google Cast (Chromecast) — direct, instant, no server needed
        sendToCast(song, lyricsArr, initialPos, now);
        // 2. Supabase Realtime — fallback for TV browsers / QR code approach
        if (!user || !roomCode) return;
        await sb.from("cast_sessions").upsert({
          room_code: roomCode,
          user_id: user.id,
          song_title: song.title,
          song_artist: song.artist,
          artwork_url: song.artwork || null,
          lyrics_json: lyricsArr,
          initial_position: initialPos,
          detected_at: new Date(now).toISOString(),
          is_active: true,
        });
      };

      // ── Refs ──
      const streamRef        = useRef(null);
      const syncIntervalRef  = useRef(null);
      const syncStartRef     = useRef(null);
      const detectedAtRef    = useRef(null);
      const initialPosRef    = useRef(0);
      const lyricsRef        = useRef([]);
      const progressTimerRef    = useRef(null);
      const currentLineRef      = useRef(null);
      const listenSessionRef    = useRef(0); // increments on each startListening; guards stale async callbacks
      const attemptLogRef       = useRef([]); // collects per-attempt debug info for the error screen

      useEffect(() => { lyricsRef.current = lyrics; }, [lyrics]);
      useEffect(() => { albumTracksRef.current = albumTracks; }, [albumTracks]);
      useEffect(() => { currentTrackIndexRef.current = currentTrackIndex; }, [currentTrackIndex]);
      useEffect(() => { vinylDbReleaseRef.current    = vinylDbRelease;    }, [vinylDbRelease]);
      useEffect(() => { albumCollectionIdRef.current = albumCollectionId; }, [albumCollectionId]);


      // ── Vinyl mode persistence ──
      const toggleVinylMode = (val) => {
        setVinylMode(val);
        localStorage.setItem("liri_vinyl_mode", String(val));
      };

      // ── Per-album side data (localStorage, keyed by iTunes collectionId) ──
      const getAlbumSideData = (cid) => {
        if (!cid) return null;
        try { return JSON.parse(localStorage.getItem(`liri_album_sides_${cid}`) || "null"); }
        catch { return null; }
      };
      const saveAlbumSideData = (cid, sides, totalTracks) => {
        if (!cid || !totalTracks) return;
        const tps = Math.ceil(totalTracks / sides);
        const existing = getAlbumSideData(cid) || {};
        const data = { ...existing, tps, sides, totalTracks, confirmed: (existing.confirmed || 0) + 1 };
        localStorage.setItem(`liri_album_sides_${cid}`, JSON.stringify(data));
        albumTpsRef.current = tps;
      };
      // ── Liri vinyl DB lookup ──
      const fetchVinylRelease = async (collectionId) => {
        try {
          const { data } = await sb
            .from("vinyl_releases")
            .select("*, vinyl_tracks(*)")
            .eq("itunes_collection_id", collectionId)
            .order("confirmed_count", { ascending: false })
            .limit(1)
            .single();
          return data || null;
        } catch { return null; }
      };

      // Convert our DB track list into side-end indices that advanceToNextTrack can use.
      // Returns an array of iTunes track indices that are the last track of each side.
      const getDbSideEndIndices = (itunesTracks, dbTracks) => {
        const sideGroups = {};
        dbTracks.forEach(t => {
          if (!sideGroups[t.side]) sideGroups[t.side] = [];
          sideGroups[t.side].push(t);
        });
        const sides = Object.keys(sideGroups).sort();
        const result = [];
        // For every side except the last, find the last track of that side in the iTunes list
        sides.slice(0, -1).forEach(side => {
          const sorted = sideGroups[side].sort((a, b) => a.track_number_on_side - b.track_number_on_side);
          const lastTitle = sorted[sorted.length - 1]?.title?.toLowerCase();
          const idx = itunesTracks.findIndex(t => t.trackName?.toLowerCase() === lastTitle);
          if (idx >= 0) result.push(idx);
        });
        result.push(itunesTracks.length - 1); // album end
        return result;
      };

      // ── Flip notifications ──
      const playFlipChime = () => {
        if (localStorage.getItem("liri_flip_sound") === "false") return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          [[523.25, 0], [659.25, 0.35], [783.99, 0.7]].forEach(([freq, delay]) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = "sine"; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, ctx.currentTime + delay);
            gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 1.6);
            osc.start(ctx.currentTime + delay);
            osc.stop(ctx.currentTime + delay + 1.6);
          });
        } catch {}
      };

      const showFlipPushNotification = (song) => {
        if (localStorage.getItem("liri_flip_notify") !== "true") return;
        if (Notification.permission !== "granted") return;
        try {
          new Notification("Time to flip! 💿", {
            body: song ? `${song.artist} — ${song.album || "Side A done"}` : "Your side has ended — flip the record",
            icon: song?.artwork || undefined,
            tag: "liri-flip",  // replaces any previous flip notification
          });
        } catch {}
      };

      const enableFlipNotify = async () => {
        const perm = await Notification.requestPermission();
        if (perm === "granted") {
          setFlipNotify(true);
          localStorage.setItem("liri_flip_notify", "true");
          setNotifyDenied(false);
        } else {
          setNotifyDenied(true);
          setFlipNotify(false);
          localStorage.setItem("liri_flip_notify", "false");
        }
      };

      // ── Usage fetch ──
      const fetchUsage = async (u) => {
        if (!u || isUnlimited(u)) return;
        const { data } = await sb.from("user_usage").select("recognition_count").eq("user_id", u.id).single();
        if (data) setUsageCount(data.recognition_count);
        else { await sb.from("user_usage").insert({ user_id: u.id, recognition_count: 0 }); setUsageCount(0); }
      };

      // ── History fetch ──
      const fetchHistory = async (u) => {
        if (!u) return;
        setHistoryLoading(true);
        const { data } = await sb.from("song_history")
          .select("*").eq("user_id", u.id)
          .order("listened_at", { ascending: false }).limit(50);
        setHistory(data || []);
        setHistoryLoading(false);
      };

      // ── Save song to history ──
      const saveToHistory = async (u, song) => {
        if (!u) return;
        await sb.from("song_history").insert({
          user_id: u.id,
          title: song.title,
          artist: song.artist,
          album: song.album || null,
          artwork_url: song.artwork || null,
        });
      };

      // ── Analytics: log a song play to listening_events ──
      // Called for both manual recognitions and vinyl auto-advances.
      // Never throws — analytics must never block or break the UI.
      const logListeningEvent = async (params) => {
        try {
          await sb.from("listening_events").insert({
            user_id:              params.userId  || null,
            session_id:           sessionId,
            track_title:          params.title,
            artist_name:          params.artist,
            album_name:           params.album   || null,
            artwork_url:          params.artwork  || null,
            genre:                params.genre    || null,
            itunes_track_id:      params.itunesTrackId  ? Number(params.itunesTrackId)  : null,
            itunes_collection_id: params.collectionId   ? Number(params.collectionId)   : null,
            vinyl_release_id:     params.vinylReleaseId || null,
            vinyl_mode_on:        params.vinylModeOn    ?? false,
            source:               params.source         || "recognition",
            platform:             window.Capacitor ? "ios" : "web",
            country_code:         params.countryCode    || null,
            playback_offset_s:    params.offsetSecs     != null ? Math.round(params.offsetSecs)   : null,
            track_duration_s:     params.durationSecs   != null ? Math.round(params.durationSecs) : null,
            acr_confidence:       params.acrScore       || null,
          });
        } catch (e) {
          console.error("logListeningEvent failed:", e.message);
        }
      };

      // ── Analytics: log a vinyl side flip to flip_events ──
      const logFlipEvent = async (params) => {
        try {
          await sb.from("flip_events").insert({
            user_id:              params.userId  || null,
            session_id:           sessionId,
            vinyl_release_id:     params.vinylReleaseId  || null,
            itunes_collection_id: params.collectionId    ? Number(params.collectionId) : null,
            album_name:           params.album           || null,
            artist_name:          params.artist          || null,
            from_side:            params.fromSide        || null,
            to_side:              params.toSide          || null,
            detection_method:     params.method          || "heuristic",
          });
        } catch (e) {
          console.error("logFlipEvent failed:", e.message);
        }
      };

      // ── Auth setup ──
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          const u = session?.user || null;
          setUser(u); setAuthLoading(false);
          if (u) { fetchUsage(u); fetchHistory(u); }
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => {
          const u = s?.user || null;
          setUser(u);
          if (u) { fetchUsage(u); fetchHistory(u); }
        });
        return () => subscription.unsubscribe();
      }, []);

      const handleAuth = async () => {
        setAuthError(null); setAuthWorking(true);
        try {
          if (authMode === "signup") {
            const { error } = await sb.auth.signUp({ email: authEmail, password: authPassword });
            if (error) throw error;
            setAuthError("Check your email to confirm your account, then sign in.");
            setAuthMode("signin");
          } else {
            const { error } = await sb.auth.signInWithPassword({ email: authEmail, password: authPassword });
            if (error) throw error;
          }
        } catch (e) { setAuthError(e.message); }
        finally { setAuthWorking(false); }
      };

      const handleSignOut = async () => { await sb.auth.signOut(); setShowSettings(false); reset(); };

      // ── Auto-start sync after detection ──
      useEffect(() => { if (mode === "confirmed" && detectedSong) startSync(); }, [mode, detectedSong]);

      // ── Scroll to current lyric ──
      useEffect(() => {
        if (currentLineRef.current && mode === "syncing")
          currentLineRef.current.scrollIntoView({ behavior:"smooth", block:"center" });
      }, [currentIndex, mode]);

      // ── Vinyl auto-advance: trigger when song nears its end ──
      useEffect(() => {
        if (!vinylMode || mode !== "syncing" || !songDuration) return;
        if (playbackTime >= songDuration - 2 && !autoAdvanceFiredRef.current) {
          autoAdvanceFiredRef.current = true;
          // Small pause for the groove gap, then advance
          setTimeout(() => setShouldAdvanceTrack(true), 3000);
        }
      }, [playbackTime, songDuration, vinylMode, mode]);

      // ── Handle track advance (runs with fresh state) ──
      useEffect(() => {
        if (!shouldAdvanceTrack) return;
        setShouldAdvanceTrack(false);
        const tracks = albumTracksRef.current;
        const idx    = currentTrackIndexRef.current;
        if (tracks.length > 0 && idx >= 0 && idx < tracks.length - 1) {
          advanceToNextTrack(tracks, idx);
        } else {
          // Unknown tracklist — fall back to listening
          startListening(true);
        }
      }, [shouldAdvanceTrack]);

      // ── Cleanup on unmount ──
      useEffect(() => () => {
        clearInterval(syncIntervalRef.current);
        clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
      }, []);

      // ── Pure HTTP: send audio blob to ACRCloud, return raw response or null ──
      const sendAudioToACR = async (blob) => {
        try {
          const uint8 = new Uint8Array(await blob.arrayBuffer());
          let binary = "";
          for (let i = 0; i < uint8.length; i += 8192)
            binary += String.fromCharCode(...uint8.subarray(i, i + 8192));
          const res = await fetch(PROXY_URL, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio: btoa(binary), mimeType: blob.type || "audio/webm" }),
          });
          if (!res.ok) return null;
          return await res.json();
        } catch { return null; }
      };

      // ── Process a confirmed ACRCloud match — update all app state ──
      const handleMatch = async (data, isAutoAdvance) => {
        const m = data.metadata.music[0];
        const tcSecs      = (m.play_offset_ms || 0) / 1000 + PLAYBACK_OFFSET_CORRECTION;
        const duration    = m.duration_ms ? m.duration_ms / 1000 : null;
        const acrScore    = m.score            || null;
        const acrGenre    = m.genres?.[0]?.name || null;
        const countryCode = data._liri?.country_code || null;

        detectedAtRef.current      = Date.now();
        initialPosRef.current      = tcSecs;
        autoAdvanceFiredRef.current = false;
        autoRetryCountRef.current  = 0;

        const spotifyArt = m.external_metadata?.spotify?.album?.images?.[0]?.url || null;
        const title  = m.title;
        const artist = m.artists?.[0]?.name || "Unknown Artist";

        let artwork = spotifyArt;
        if (!artwork) {
          try {
            const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`).then(r => r.json());
            artwork = itunes.results?.[0]?.artworkUrl100?.replace("100x100bb", "600x600bb") || null;
          } catch {}
        }

        const song = { title, artist, album: m.album?.name || "", artwork };
        setDetectedSong(song);
        setSongDuration(duration);
        await loadLyrics(title, artist);

        saveToHistory(user, song);
        fetchHistory(user);
        syncCastSession(song, lyricsRef.current, initialPosRef.current);
        if (!isUnlimited(user)) {
          const newCount = usageCount + 1;
          await sb.from("user_usage").upsert({ user_id: user.id, recognition_count: newCount });
          setUsageCount(newCount);
        }

        setMode("confirmed");

        fetchAlbumTracks(title, artist).then(async ({ tracks, collectionId }) => {
          setAlbumTracks(tracks);
          setAlbumCollectionId(collectionId);
          const tIdx = tracks.findIndex(t => t.trackName?.toLowerCase() === title.toLowerCase());
          setCurrentTrackIndex(tIdx >= 0 ? tIdx : 0);

          const itunesTrack = tIdx >= 0 ? tracks[tIdx] : null;
          logListeningEvent({
            userId: user?.id, title, artist, album: song.album, artwork: song.artwork,
            genre: acrGenre, itunesTrackId: itunesTrack?.trackId, collectionId,
            vinylReleaseId: null, vinylModeOn: vinylMode, source: "recognition",
            countryCode, offsetSecs: tcSecs, durationSecs: duration, acrScore,
          });

          if (!collectionId || tracks.length === 0) return;
          const dbRelease = await fetchVinylRelease(collectionId);
          if (dbRelease?.vinyl_tracks?.length > 0) { setVinylDbRelease(dbRelease); albumTpsRef.current = 0; return; }
          const stored = getAlbumSideData(collectionId);
          if (stored?.tps) { albumTpsRef.current = stored.tps; return; }
          albumTpsRef.current = 0;
        }).catch(() => {});
      };

      // ── Whisper transcription → LRCLib lyrics match (fallback when ACRCloud fails) ──
      // Sends audio to /api/transcribe (Whisper), searches LRCLib by the
      // transcribed words, finds which line matches to get the playback position.
      const tryLyricsTranscription = async (blob, isAutoAdvance) => {
        try {
          // 1. Transcribe with Whisper
          const uint8 = new Uint8Array(await blob.arrayBuffer());
          let binary = "";
          for (let i = 0; i < uint8.length; i += 8192)
            binary += String.fromCharCode(...uint8.subarray(i, i + 8192));

          const transcribeUrl = window.Capacitor
            ? "https://liri-vert.vercel.app/api/transcribe"
            : "/api/transcribe";

          const tr = await fetch(transcribeUrl, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio: btoa(binary), mimeType: blob.type || "audio/webm" }),
          });
          if (!tr.ok) return false;
          const { text: transcribed } = await tr.json();
          if (!transcribed || transcribed.trim().length < 4) return false;

          // 2. Search LRCLib with transcribed words
          const [ra, rb] = await Promise.all([
            fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(transcribed)}`).then(r => r.json()).catch(() => []),
            fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(transcribed.split(" ").slice(0, 6).join(" "))}`).then(r => r.json()).catch(() => []),
          ]);
          const candidates = [...(Array.isArray(ra) ? ra : []), ...(Array.isArray(rb) ? rb : [])];
          const match = candidates.find(c => c.syncedLyrics) || candidates[0];
          if (!match) return false;

          // 3. Parse lyrics
          const lyrics = match.syncedLyrics
            ? parseLRC(match.syncedLyrics)
            : (match.plainLyrics || "").split("\n").filter(l => l.trim()).map((text, i) => ({ time: i * 4, text }));
          if (!lyrics.length) return false;

          // 4. Find playback position: match transcribed words against lyric lines
          const words = transcribed.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(Boolean);
          let startPos = 0;
          let bestScore = 0;
          for (const line of lyrics) {
            const lineWords = line.text.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/);
            const hits = words.filter(w => w.length > 3 && lineWords.includes(w)).length;
            if (hits > bestScore) { bestScore = hits; startPos = Math.max(0, line.time - 0.5); }
          }

          // 5. Fetch artwork from iTunes
          const title  = match.trackName  || "";
          const artist = match.artistName || "";
          let artwork = null;
          try {
            const it = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`).then(r => r.json());
            artwork = it.results?.[0]?.artworkUrl100?.replace("100x100bb", "600x600bb") || null;
          } catch {}

          // 6. Wire it up exactly like a normal recognition match
          const song = { title, artist, album: match.albumName || "", artwork };
          detectedAtRef.current      = Date.now();
          initialPosRef.current      = startPos;
          autoAdvanceFiredRef.current = false;
          autoRetryCountRef.current  = 0;

          setDetectedSong(song);
          setSongDuration(match.duration || null);
          setLyrics(lyrics);
          lyricsRef.current = lyrics;
          setMode("confirmed");

          saveToHistory(user, song);
          fetchHistory(user);
          syncCastSession(song, lyrics, startPos);

          // Non-blocking: fetch album tracklist for vinyl auto-advance
          fetchAlbumTracks(title, artist).then(({ tracks, collectionId }) => {
            setAlbumTracks(tracks);
            setAlbumCollectionId(collectionId);
            const tIdx = tracks.findIndex(t => t.trackName?.toLowerCase() === title.toLowerCase());
            setCurrentTrackIndex(tIdx >= 0 ? tIdx : 0);
            if (!collectionId) return;
            fetchVinylRelease(collectionId).then(db => {
              if (db?.vinyl_tracks?.length > 0) { setVinylDbRelease(db); albumTpsRef.current = 0; }
            });
          }).catch(() => {});

          return true;
        } catch { return false; }
      };

      // ── Handle final recognition failure ──
      const handleNoMatch = (isAutoAdvance, stage = "acr") => {
        if (isAutoAdvance) {
          autoRetryCountRef.current += 1;
          if (autoRetryCountRef.current < 2) {
            setTimeout(() => startListening(true), 4000);
          } else {
            autoRetryCountRef.current = 0;
            setSideEndReason("failed");
            setMode("side-end");
          }
        } else {
          const log = attemptLogRef.current;
          const summary = log.length
            ? log.join("\n")
            : "No attempts logged";
          const stageMsg = stage === "whisper_failed"
            ? "ACRCloud: no match · Whisper fallback: also failed"
            : "ACRCloud: no match after all attempts";
          setError(`${stageMsg}\n\n${summary}\n\nMove closer to your speakers and try again.`);
          setMode("error");
        }
      };

      // ── Record audio and detect — rolling 5s attempts ──
      // Sends a recognition request every 5 seconds using ALL accumulated audio.
      // On match: stops immediately. On miss: keeps recording and tries a longer clip.
      // Fast songs get identified in 5s. Quiet/tricky ones keep accumulating up to 30s.
      const ATTEMPT_INTERVAL = 5000; // ms between attempts
      const MAX_ATTEMPTS     = 6;    // 5s, 10s, 15s, 20s, 25s, 30s max

      const startListening = async (isAutoAdvance = false) => {
        if (!isAutoAdvance && !isUnlimited(user) && usageCount >= FREE_LIMIT) { setMode("limit"); return; }
        const session = ++listenSessionRef.current; // unique id for this listen attempt
        attemptLogRef.current = [];
        setError(null);
        setMode("listening");
        setListenProgress(0);
        setListenAttempt(0);
        clearInterval(syncIntervalRef.current);

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: { ideal: false }, noiseSuppression: { ideal: false }, autoGainControl: { ideal: false } }
          });
          streamRef.current = stream;
          const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
                         : MediaRecorder.isTypeSupported("audio/ogg")  ? "audio/ogg" : "";
          const recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          const allChunks  = [];
          let attempts     = 0;
          let sending      = false;
          let nextAttemptAt = ATTEMPT_INTERVAL;

          recorder.ondataavailable = e => { if (e.data.size > 0) allChunks.push(e.data); };
          recorder.onstop = () => stream.getTracks().forEach(t => t.stop());
          recorder.start(200);

          let elapsed = 0;
          progressTimerRef.current = setInterval(async () => {
            elapsed += 100;

            // Cycle the progress ring 0→1 over each 5s window so it keeps moving
            setListenProgress((elapsed % ATTEMPT_INTERVAL) / ATTEMPT_INTERVAL);

            if (elapsed >= nextAttemptAt && !sending) {
              sending = true;
              attempts++;
              setListenAttempt(attempts);
              nextAttemptAt = (attempts + 1) * ATTEMPT_INTERVAL;

              // Snapshot ALL audio accumulated so far — clip grows with each attempt
              const blob = new Blob([...allChunks], { type: mimeType || "audio/webm" });
              const data = await sendAudioToACR(blob);

              // Log this attempt for the error screen
              attemptLogRef.current.push(
                data
                  ? `#${attempts} (${attempts*5}s): ACR code ${data.status?.code} — ${data.status?.msg || "?"}`
                  : `#${attempts} (${attempts*5}s): network error (no response)`
              );

              // Abort if the user restarted while we were awaiting
              if (listenSessionRef.current !== session) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                return;
              }

              // Rate limit
              if (data?.status?.code === 3003 || data?.status?.code === 3015) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                setError("Recognition limit reached. Visit acrcloud.com.");
                setMode("error");
                return;
              }

              // Match found — stop recording and process
              if (data?.status?.code === 0 && data?.metadata?.music?.length > 0) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                setMode("detecting");
                await handleMatch(data, isAutoAdvance);
                return;
              }

              // No match yet — after MAX_ATTEMPTS try Whisper lyrics fallback
              if (attempts >= MAX_ATTEMPTS) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                // Signal the UI we're now trying lyrics transcription
                setListenAttempt(MAX_ATTEMPTS + 1);
                const finalBlob = new Blob([...allChunks], { type: mimeType || "audio/webm" });
                const found = await tryLyricsTranscription(finalBlob, isAutoAdvance);
                if (listenSessionRef.current !== session) return; // aborted during Whisper
                if (!found) handleNoMatch(isAutoAdvance, "whisper_failed");
                return;
              }

              sending = false; // ready for next attempt
            }
          }, 100);
        } catch { setError("Microphone access denied."); setMode("error"); }
      };

      // ── Kept for legacy reference — no longer called directly ──
      const detectSong = async (blob, isAutoAdvance = false) => {
        setMode("detecting");
        try {
          const data = await sendAudioToACR(blob);
          if (!data) { handleNoMatch(isAutoAdvance); return false; }
          if (data.status?.code === 3003 || data.status?.code === 3015) {
            setError("Recognition limit reached. Visit acrcloud.com."); setMode("error"); return false;
          }
          if (data.status?.code === 0 && data.metadata?.music?.length > 0) {
            await handleMatch(data, isAutoAdvance); return true;
          }
          handleNoMatch(isAutoAdvance); return false;
        } catch (err) {
          if (isAutoAdvance) {
            autoRetryCountRef.current += 1;
            if (autoRetryCountRef.current < 2) {
              setTimeout(() => startListening(true), 4000);
            } else {
              autoRetryCountRef.current = 0;
              setSideEndReason("failed");
              setMode("side-end");
            }
            return false;
          }
          setError(`Connection failed: ${err.message}`); setMode("error"); return false;
        }
      };

      const loadLyrics = async (title, artist) => {
        try {
          const [a, b] = await Promise.all([
            fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`).then(r => r.json()),
            fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`).then(r => r.json()),
          ]);
          const synced = [...a, ...b].find(x => x.syncedLyrics);
          if (synced) { setLyrics(parseLRC(synced.syncedLyrics)); return; }
          const plain = [...a, ...b].find(x => x.plainLyrics);
          if (plain) setLyrics(plain.plainLyrics.split("\n").filter(l => l.trim()).map((text, i) => ({ time: i * 4, text })));
          else setLyrics([]);
        } catch { setLyrics([]); }
      };

      const startSync = useCallback(() => {
        // Safe to re-arm auto-advance now — new sync is actually starting
        autoAdvanceFiredRef.current = false;
        const delay = detectedAtRef.current ? (Date.now() - detectedAtRef.current) / 1000 : 0;
        initialPosRef.current += delay;
        syncStartRef.current = Date.now();
        setMode("syncing"); setCurrentIndex(0);
        clearInterval(syncIntervalRef.current);
        syncIntervalRef.current = setInterval(() => {
          const t = initialPosRef.current + (Date.now() - syncStartRef.current) / 1000;
          setPlaybackTime(t);
          const lrc = lyricsRef.current;
          if (!lrc.length) return;
          let idx = 0;
          for (let i = 0; i < lrc.length; i++) { if (lrc[i].time <= t) idx = i; else break; }
          setCurrentIndex(idx);
        }, 80);
      }, []);

      const nudge = (s) => {
        initialPosRef.current = Math.max(0, initialPosRef.current + s);
        // Push updated position to TV
        if (roomCode && detectedSong) {
          sb.from("cast_sessions").update({
            initial_position: initialPosRef.current,
            detected_at: new Date().toISOString(),
          }).eq("room_code", roomCode);
        }
      };

      const handleNudge = (s) => {
        nudge(s);
        const side = s < 0 ? "left" : "right";
        clearTimeout(nudgeMenuTimerRef.current);
        setNudgeMenu(side);
        nudgeMenuTimerRef.current = setTimeout(() => setNudgeMenu(null), 2500);
      };

      // ── Fetch full album tracklist from iTunes ──
      // Returns { tracks: [...], collectionId: "12345" | null }
      const fetchAlbumTracks = async (title, artist) => {
        try {
          const search = await fetch(
            `https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=5`
          ).then(r => r.json());
          const hit = search.results?.find(r => r.wrapperType === "track");
          if (!hit?.collectionId) return { tracks: [], collectionId: null };
          const lookup = await fetch(
            `https://itunes.apple.com/lookup?id=${hit.collectionId}&entity=song`
          ).then(r => r.json());
          const tracks = (lookup.results || [])
            .filter(t => t.wrapperType === "track")
            .sort((a, b) => a.trackNumber - b.trackNumber);
          return { tracks, collectionId: String(hit.collectionId) };
        } catch { return { tracks: [], collectionId: null }; }
      };

      // ── Determine side-flip points ──
      // Returns an array of track indices that are the LAST track of each side.
      // e.g. for 12 tracks / 3 per side → [2, 5, 8, 11]
      // tracksPerSide=0 means auto-detect via duration (assumes 2 sides).
      // Returns { side: "A", track: 2 } for the current position when vinyl mode is on.
      // Uses Liri DB side data if available, otherwise derives from getSideEndIndices.
      const getSideInfo = () => {
        if (!vinylMode || albumTracks.length === 0 || currentTrackIndex < 0) return null;

        // Prefer Liri DB — has exact side labels and position_on_side
        if (vinylDbRelease?.vinyl_tracks?.length > 0) {
          const title = albumTracks[currentTrackIndex]?.trackName?.toLowerCase();
          const dbTrack = vinylDbRelease.vinyl_tracks.find(t =>
            t.track_title?.toLowerCase() === title
          );
          if (dbTrack?.side_label && dbTrack?.position_on_side) {
            return { side: dbTrack.side_label.toUpperCase(), track: dbTrack.position_on_side };
          }
        }

        // Fall back to calculated side ends
        const sideEnds = getSideEndIndices(albumTracks, albumTpsRef.current);
        if (!sideEnds.length) return null;

        let sideIdx  = sideEnds.length - 1; // default: last side
        let sideStart = sideEnds.length > 1 ? sideEnds[sideEnds.length - 2] + 1 : 0;
        for (let i = 0; i < sideEnds.length; i++) {
          if (currentTrackIndex <= sideEnds[i]) {
            sideIdx   = i;
            sideStart = i === 0 ? 0 : sideEnds[i - 1] + 1;
            break;
          }
        }

        return {
          side:  "ABCDEFGH"[sideIdx] || "?",
          track: currentTrackIndex - sideStart + 1,
        };
      };

      const getSideEndIndices = (tracks, tps) => {
        if (tracks.length <= 1) return [];
        if (tps > 0) {
          // User told us exactly how many tracks per side
          const ends = [];
          for (let i = tps - 1; i < tracks.length; i += tps) ends.push(i);
          // Make sure the last track of the album is always included
          if (ends[ends.length - 1] !== tracks.length - 1) ends.push(tracks.length - 1);
          return ends;
        }
        // Auto: split into 2 sides by cumulative duration
        const totalMs = tracks.reduce((s, t) => s + (t.trackTimeMillis || 0), 0);
        if (!totalMs) return [Math.ceil(tracks.length / 2) - 1, tracks.length - 1];
        let cumulative = 0;
        for (let i = 0; i < tracks.length - 1; i++) {
          cumulative += (tracks[i].trackTimeMillis || 0);
          if (cumulative >= totalMs / 2) return [i, tracks.length - 1];
        }
        return [Math.ceil(tracks.length / 2) - 1, tracks.length - 1];
      };

      // ── Advance to the next track using the known tracklist (no re-listening) ──
      const advanceToNextTrack = async (tracks, idx) => {
        const nextIdx = idx + 1;

        // Stop the running sync interval immediately so stale playbackTime values
        // can't trigger a false auto-advance on the incoming track. Reset the
        // display to 0 so the UI reflects the new track from the start.
        clearInterval(syncIntervalRef.current);
        setPlaybackTime(0);

        // Use Liri DB side data (most accurate), then local learning, then heuristic
        const dbRelease = vinylDbReleaseRef.current;
        const effectiveTps = albumTpsRef.current > 0 ? albumTpsRef.current : 0; // 0 = use duration heuristic
        const sideEnds = dbRelease?.vinyl_tracks?.length > 0
          ? getDbSideEndIndices(tracks, dbRelease.vinyl_tracks)
          : getSideEndIndices(tracks, effectiveTps);
        const isLastTrack = idx === tracks.length - 1;
        const isSideEnd   = sideEnds.includes(idx);

        if (isLastTrack) {
          setSideEndReason("album-end");
          setMode("side-end");
          return;
        }
        if (isSideEnd) {
          setSideEndReason("flip");
          playFlipChime();
          showFlipPushNotification(detectedSong);

          // ── Log the flip event to analytics ──
          const sideIdx  = sideEnds.indexOf(idx); // 0 = first flip (A→B), 1 = B→C, etc.
          const method   = dbRelease?.vinyl_tracks?.length > 0 ? "db"
                         : albumTpsRef.current > 0             ? "learned"
                         : "heuristic";
          logFlipEvent({
            userId:       user?.id,
            vinylReleaseId:     dbRelease?.id || null,
            collectionId:       albumCollectionIdRef?.current || null,
            album:              detectedSong?.album,
            artist:             detectedSong?.artist,
            fromSide:           "ABCDEFGH"[sideIdx]     || null,
            toSide:             "ABCDEFGH"[sideIdx + 1] || null,
            method,
          });

          setMode("side-end");
          return;
        }
        const next = tracks[nextIdx];
        const nextTitle  = next.trackName;
        const nextArtist = next.artistName || detectedSong?.artist || "";
        const nextArtwork = next.artworkUrl100?.replace("100x100bb", "600x600bb") || detectedSong?.artwork;
        const nextDuration = next.trackTimeMillis ? next.trackTimeMillis / 1000 : null;
        const nextSong = { title: nextTitle, artist: nextArtist, album: next.collectionName || "", artwork: nextArtwork };

        setCurrentTrackIndex(nextIdx);
        // autoAdvanceFiredRef stays TRUE until startSync() runs — prevents any
        // stale playbackTime state updates from firing a double-advance.
        // Start slightly ahead to compensate for lyrics-fetch + state-update delay.
        detectedAtRef.current = Date.now();
        initialPosRef.current = AUTO_ADVANCE_OFFSET;

        setDetectedSong(nextSong);
        setSongDuration(nextDuration);
        await loadLyrics(nextTitle, nextArtist);

        saveToHistory(user, nextSong);
        fetchHistory(user);
        syncCastSession(nextSong, lyricsRef.current, 0);

        // ── Log auto-advance to analytics ──
        logListeningEvent({
          userId:       user?.id,
          title:        nextTitle,
          artist:       nextArtist,
          album:        next.collectionName || detectedSong?.album,
          artwork:      nextArtwork,
          itunesTrackId:      next.trackId,
          collectionId:       albumCollectionIdRef?.current || null,
          vinylReleaseId:     vinylDbReleaseRef.current?.id || null,
          vinylModeOn:        vinylMode,
          source:             "auto_advance",
          durationSecs:       nextDuration,
        });
        if (!isUnlimited(user)) {
          const newCount = usageCount + 1;
          await sb.from("user_usage").upsert({ user_id: user.id, recognition_count: newCount });
          setUsageCount(newCount);
        }
        setMode("confirmed"); // triggers startSync via useEffect
      };

      // ── Resync: re-listen briefly to fix timing without resetting the song ──
      const resync = async () => {
        if (isResyncing) return;
        setIsResyncing(true);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: { ideal: false },
              noiseSuppression: { ideal: false },
              autoGainControl: { ideal: false }
            }
          });
          const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
                         : MediaRecorder.isTypeSupported("audio/ogg")  ? "audio/ogg" : "";
          const recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          const chunks = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => stream.getTracks().forEach(t => t.stop());
          recorder.start(200);
          await new Promise(resolve => setTimeout(resolve, 6000));
          if (recorder.state === "recording") recorder.stop();
          const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          const uint8 = new Uint8Array(await blob.arrayBuffer());
          let binary = "";
          for (let i = 0; i < uint8.length; i += 8192)
            binary += String.fromCharCode(...uint8.subarray(i, i + 8192));
          const res = await fetch(PROXY_URL, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio: btoa(binary), mimeType: blob.type || "audio/webm" }),
          });
          if (res.ok) {
            const data = await res.json();
            if (data.status?.code === 0 && data.metadata?.music?.length > 0) {
              const m = data.metadata.music[0];
              initialPosRef.current = (m.play_offset_ms || 0) / 1000 + PLAYBACK_OFFSET_CORRECTION;
              syncStartRef.current  = Date.now();
            }
          }
        } catch {}
        setIsResyncing(false);
      };

      const reset = () => {
        clearInterval(syncIntervalRef.current); clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        autoAdvanceFiredRef.current = false;
        autoRetryCountRef.current = 0;
        setMode("idle"); setDetectedSong(null); setSongDuration(null); setLyrics([]);
        setCurrentIndex(0); setError(null); setListenProgress(0); setPlaybackTime(0);
        setAlbumTracks([]); setCurrentTrackIndex(-1);
        setShouldAdvanceTrack(false); setIsResyncing(false); setSideEndReason("failed");
        setAlbumCollectionId(null); setVinylDbRelease(null);
        albumTpsRef.current = 0; vinylDbReleaseRef.current = null;

      // ─────────────────────────────────────────

                    <button onClick={() => openSheet(authSheet === "signin" ? "signup" : "signin")} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"13px", fontFamily:"inherit" }}>
                      {authSheet === "signin" ? "New here? Create an account →" : "Already have an account? Sign in →"}
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      // ─────────────────────────────────────────
      // MAIN APP
      // ─────────────────────────────────────────
      const isSyncing = mode === "syncing";
      const artwork = detectedSong?.artwork;

      return (
        <div style={{ minHeight:"100vh", background:"#080810", color:"#f0e6d3", fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", position:"relative", overflow:"hidden" }}>

          {/* Blurred album art backdrop */}
          {artwork && (
            <div style={{ position:"fixed", inset:"-20px", zIndex:0, backgroundImage:`url(${artwork})`, backgroundSize:"cover", backgroundPosition:"center", filter:"blur(80px) brightness(0.15) saturate(2)", transition:"opacity 1s ease", opacity: isSyncing ? 1 : 0.4 }} />

          <div style={{ position:"fixed", inset:0, zIndex:1, background:"linear-gradient(to bottom, rgba(8,8,16,0.6) 0%, rgba(8,8,16,0.3) 40%, rgba(8,8,16,0.7) 100%)", pointerEvents:"none" }} />

          {/* ── ONBOARDING OVERLAY ── */}
          {showOnboarding && (
            <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(8,8,16,0.96)", backdropFilter:"blur(12px)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 32px" }}>

              {/* Skip button */}

              )}

              {/* Step 0: Welcome */}
              {onboardingStep === 0 && (
                <div style={{ textAlign:"center", animation:"fade-up 0.4s ease both" }}>
                  <Vinyl size={120} spinning={false} />
                  <div style={{ marginTop:"28px", fontSize:"13px", letterSpacing:"4px", color:"#d4a846", textTransform:"uppercase", marginBottom:"8px" }}>Welcome to</div>
                  <div style={{ fontSize:"40px", letterSpacing:"16px", color:"#d4a846", fontWeight:"300", marginBottom:"12px" }}>LIRI</div>
                  <div style={{ fontSize:"16px", color:"rgba(255,255,255,0.35)", letterSpacing:"2px", marginBottom:"40px" }}>Lyrics for Vinyl</div>
                  <p style={{ fontSize:"17px", color:"rgba(255,255,255,0.6)", lineHeight:"1.8", maxWidth:"280px", margin:"0 auto 48px" }}>

                  </p>
                  <button onClick={() => setOnboardingStep(1)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"18px 52px", fontSize:"15px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit", letterSpacing:"1px", boxShadow:"0 8px 32px rgba(212,168,70,0.3)" }}>

                    <button onClick={() => setOnboardingStep(2)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Next →</button>

                    {[{title:"Blue in Green", artist:"Miles Davis"}, {title:"God Only Knows", artist:"The Beach Boys"}, {title:"In the Aeroplane", artist:"Neutral Milk Hotel"}].map((s,i) => (

                    <div style={{ width:"52px", height:"30px", borderRadius:"15px", background:"linear-gradient(135deg, #d4a846, #c9807a)", position:"relative", flexShrink:0 }}>
                      <div style={{ position:"absolute", top:"5px", right:"5px", width:"20px", height:"20px", borderRadius:"50%", background:"white", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />

                        { name:"Discogs",     role:"Vinyl pressing database" },

                          <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>{c.role}</span>

                        </button>
                        <p style={{ fontSize:"12px", color:"rgba(255,255,255,0.15)", marginBottom:"28px" }}>

                    </div>
                  </div>

                  <p style={{ fontSize:"13px", color:"rgba(255,255,255,0.25)", marginBottom:"24px", lineHeight:"1.7" }}>
                    Direct Chromecast requires Chrome on Android or desktop.<br/>
                    <span style={{ color:"rgba(212,168,70,0.5)" }}>Use the room code below on any TV browser.</span>
                  </p>
                )}

                {/* ── QR / Room code fallback (always shown) ── */}

                <div style={{ fontSize:"44px", fontWeight:"800", letterSpacing:"10px", color:"#d4a846", marginBottom:"16px" }}>{roomCode}</div>
                <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:"10px", padding:"10px 14px", marginBottom:"8px" }}>

                </div>
                <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.18)", lineHeight:"1.7" }}>

                </div>

            </div>

                    {user?.email?.[0]?.toUpperCase() || "?"}
                  </div>
                  <div>
                    <div style={{ fontSize:"15px", fontWeight:"600", color:"#f0e6d3" }}>{user?.email}</div>

                      {isUnlimited(user) ? "✦ Unlimited access" : `${usageCount} of ${FREE_LIMIT} free songs used`}

                </div>

                {/* Usage bar */}
                {!isUnlimited(user) && (
                  <div style={{ marginBottom:"24px" }}>
                    <div style={{ height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.07)", overflow:"hidden" }}>
                      <div style={{ height:"100%", borderRadius:"2px", background:"linear-gradient(to right, #d4a846, #c9807a)", width:`${Math.min(usageCount / FREE_LIMIT * 100, 100)}%`, transition:"width 0.4s ease" }} />

                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:"6px", fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>
                      <span>{FREE_LIMIT - usageCount} remaining</span><span>{FREE_LIMIT} free</span>
                    </div>
                  </div>
                )}

                {/* Vinyl Auto Mode toggle */}

                    <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3" }}>Vinyl Auto Mode</div>

                      <div style={{ position:"absolute", top:"3px", left: vinylMode ? "21px" : "3px", width:"20px", height:"20px", borderRadius:"50%", background:"white", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
                    </div>
                  </div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)", lineHeight:"1.6" }}>
                    Auto-advances through the album tracklist without re-listening. Prompts you to flip at side boundaries. Set tracks per side below for multi-sided albums.
                  </div>
                </div>

                {/* Flip reminders — only shown when vinyl mode is on */}
                {vinylMode && (
                  <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:"16px", padding:"16px 18px", marginBottom:"16px" }}>
                    <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3", marginBottom:"12px" }}>Flip reminders</div>

                    {/* Sound chime */}
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"14px" }}>
                      <div>
                        <div style={{ fontSize:"13px", color:"#f0e6d3" }}>Sound chime</div>
                        <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.3)", marginTop:"2px" }}>Plays a tone when it's time to flip</div>
                      </div>
                      <div onClick={() => { const v = !flipSound; setFlipSound(v); localStorage.setItem("liri_flip_sound", String(v)); }}
                        style={{ width:"40px", height:"24px", borderRadius:"12px", background: flipSound ? "linear-gradient(135deg,#d4a846,#c9807a)" : "rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background 0.2s", flexShrink:0 }}>

                      </div>
                    </div>

                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <div>
                        <div style={{ fontSize:"13px", color:"#f0e6d3" }}>Push notification</div>

                      </div>
                      <div onClick={() => { if (!flipNotify) { enableFlipNotify(); } else { setFlipNotify(false); localStorage.setItem("liri_flip_notify","false"); } }}
                        style={{ width:"40px", height:"24px", borderRadius:"12px", background: flipNotify ? "linear-gradient(135deg,#d4a846,#c9807a)" : "rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background 0.2s", flexShrink:0 }}>
                        <div style={{ position:"absolute", top:"3px", left: flipNotify ? "19px" : "3px", width:"18px", height:"18px", borderRadius:"50%", background:"white", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
                      </div>
                    </div>
                    {notifyDenied && (
                      <div style={{ fontSize:"11px", color:"#e8a0a8", marginTop:"8px", lineHeight:"1.5" }}>Notifications were blocked. Enable them in your browser settings.</div>

                    {/* Link to Liri vinyl collection */}
                    <a href="/app/add-vinyl.html" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"16px", paddingTop:"14px", borderTop:"1px solid rgba(255,255,255,0.07)", textDecoration:"none" }}>
                      <div>
                        <div style={{ fontSize:"13px", color:"#d4a846" }}>Add a vinyl to Liri's collection</div>
                        <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.3)", marginTop:"2px" }}>Help improve flip detection for everyone</div>
                      </div>
                      <div style={{ color:"rgba(212,168,70,0.5)", fontSize:"18px" }}>›</div>
                    </a>
                  </div>
                )}

                {/* Pro section */}
                <div style={{ background:"rgba(212,168,70,0.07)", border:"1px solid rgba(212,168,70,0.15)", borderRadius:"16px", padding:"16px 18px", marginBottom:"20px" }}>
                  <div style={{ fontSize:"13px", fontWeight:"600", color:"#d4a846", marginBottom:"4px" }}>Liri Pro — Coming Soon</div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.35)", lineHeight:"1.6" }}>Unlimited songs, offline mode, and more.</div>
                  <div style={{ fontSize:"12px", color:"#d4a846", marginTop:"8px" }}>hello@getliri.com</div>
                </div>

                <div style={{ borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:"20px", marginBottom:"20px" }}>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px 16px", marginBottom:"14px" }}>

                      { name:"ACRCloud",     role:"Audio recognition" },
                      { name:"LRCLib",       role:"Synced lyrics" },
                      { name:"Apple iTunes", role:"Track &amp; artwork data" },
                      { name:"Discogs",      role:"Vinyl pressing database" },
                      { name:"OpenAI",       role:"Lyrics transcription" },

                      <div key={c.name}>

                      </div>
                    ))}
                  </div>

                  </div>
                </div>

                <button onClick={handleSignOut} style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.4)", borderRadius:"14px", padding:"14px", fontSize:"14px", cursor:"pointer", fontFamily:"inherit" }}>Sign Out</button>

                </div>{/* end inner padding div */}
              </div>
            </div>
          )}

          {/* ── HISTORY PANEL ── */}
          {showHistory && (
            <div onClick={() => setShowHistory(false)} style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(4px)" }}>
              <div onClick={e => e.stopPropagation()} style={{ position:"absolute", bottom:0, left:0, right:0, background:"#0f0f1c", borderRadius:"24px 24px 0 0", maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 -8px 48px rgba(0,0,0,0.6)", animation:"slide-up 0.3s ease" }}>
                <div style={{ padding:"12px 24px 0", flexShrink:0 }}>
                  <div style={{ width:"40px", height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.12)", margin:"0 auto 20px" }} />
                  <div style={{ fontSize:"11px", letterSpacing:"3px", color:"#d4a846", textTransform:"uppercase", marginBottom:"16px" }}>Recently Played</div>
                </div>
                <div style={{ overflowY:"auto", flex:1, padding:"0 24px max(24px, calc(env(safe-area-inset-bottom) + 16px))" }}>
                  {historyLoading ? (
                    <div style={{ textAlign:"center", color:"rgba(255,255,255,0.2)", padding:"32px 0" }}>Loading…</div>
                  ) : history.length === 0 ? (
                    <div style={{ textAlign:"center", color:"rgba(255,255,255,0.2)", padding:"32px 0", lineHeight:"1.8" }}>
                      No songs yet.<br/>Start listening to build your history.
                    </div>
                  ) : history.map((item, i) => (
                    <div key={item.id} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 0", borderBottom: i < history.length-1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>

                        ? <img src={item.artwork_url} alt="" style={{ width:"44px", height:"44px", borderRadius:"8px", flexShrink:0, objectFit:"cover" }} />
                        : <div style={{ width:"44px", height:"44px", borderRadius:"8px", background:"rgba(255,255,255,0.06)", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px" }}>♪</div>

                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.title}</div>
                        <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.artist}</div>
                      </div>
                      <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", flexShrink:0 }}>{timeAgo(item.listened_at)}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── SYNCING SCREEN ── */}
          {isSyncing && (
            <div style={{ position:"fixed", inset:0, zIndex:10, display:"flex", flexDirection:"column" }}>
              <div className="safe-top" style={{ padding:"0 20px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", flex:1, minWidth:0 }}>
                  {artwork && <img src={artwork} alt="" style={{ width:"36px", height:"36px", borderRadius:"8px", flexShrink:0, boxShadow:"0 4px 16px rgba(0,0,0,0.5)" }} />}

                    <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{detectedSong?.title}</div>
                    <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{detectedSong?.artist}</div>
                    {(() => { const si = getSideInfo(); return si ? (
                      <div style={{ fontSize:"10px", color:"rgba(212,168,70,0.65)", letterSpacing:"1.5px", textTransform:"uppercase", marginTop:"2px" }}>
                        Side {si.side} · Track {si.track}
                      </div>
                    ) : null; })()}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"12px", marginLeft:"12px", flexShrink:0 }}>
                  {songDuration && (
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>
                      {formatTime(playbackTime)} / {formatTime(songDuration)}
                    </div>
                  )}
                  {!songDuration && <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)", fontVariantNumeric:"tabular-nums" }}>{formatTime(playbackTime)}</div>}
