<!--
  app/index.html — Liri Main App
  ──────────────────────────────────────────────────────────────────────────────
  The entire Liri web app lives in this single file (React 18 + Babel, no build).

  What it does:
  • Captures ~8s of audio via the device microphone and sends it to /api/recognize
  • ACRCloud identifies the song and returns the title, artist, and exact playback offset
  • Fetches timestamped LRC lyrics from lrclib.net and syncs them in real time
  • Vinyl Auto Mode: pulls the full album tracklist from iTunes, auto-advances
    through tracks, and detects side-flip points using:
      1. Liri Vinyl Database (Supabase) — most accurate, community-verified
      2. User-confirmed localStorage data — improves with use per-album
      3. Duration heuristic — fallback for unknown albums
  • TV Cast: broadcasts the current lyric line to tv.html via Supabase Realtime
  • Flip reminders: Web Audio API chime + push notification when a side ends

  Key dependencies (all loaded from CDN, no build step required):
  • React 18 + ReactDOM
  • Babel standalone (transpiles JSX in-browser)
  • Supabase JS client

  Supabase tables used:
  • user_usage       — tracks listen counts per user
  • song_history     — per-user history of identified songs
  • cast_sessions    — real-time TV cast state
  • vinyl_releases   — community vinyl pressing data
  • vinyl_tracks     — per-track side/position data for flip detection

  No environment variables needed client-side — all secrets live server-side
  in api/recognize.js (Vercel environment variables).
-->

  <script type="text/babel">

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",

    const APP_VERSION = "1.48";

    const PROXY_URL = window.Capacitor
      ? "https://getliri.app/api/recognize"

    // ── Google Cast ───────────────────────────────────────────────────────────
    // Replace with your App ID from cast.google.com/publish after registering.
    // Receiver URL to register: https://getliri.app/tv (or your Vercel URL/tv)
    const CAST_APP_ID = "2FBB66AA";
    const CAST_NS     = "urn:x-cast:com.getliri.lyrics";

    // ── ART TODO — replace all emoji placeholders with original Liri illustrations ──────────────
    // Search "TODO ART" to find all locations. Priority order:
    //   1. Onboarding Step 2 (⏱)  → custom "song history / time" illustration
    //   2. Onboarding Step 4 (📺)  → custom "cast to TV" illustration
    //   3. Landing page feature cards (🎵 → sound/wave art, 💿 → vinyl art)
    //      Note: ✦ (sparkle character) is intentional Liri type — keep it
    //   4. Settings panel — consider a custom Liri icon or wordmark instead of generic text
    // All original artwork should match the dark palette: deep navy #080810, gold #d4a846, rose #c9807a
    // ─────────────────────────────────────────────────────────────────────────────────────────────

    // How many seconds we add to ACRCloud's offset to correct for processing lag
    const PLAYBACK_OFFSET_CORRECTION = 4.0;
    // Extra offset added when auto-advancing to next track (no re-listen),
    // accounting for lyrics-fetch + state-update delay. Tune if still drifting.
    const AUTO_ADVANCE_OFFSET = 2.0;

    function parseLRC(lrc) {
      const re = /\[(\d{2}):(\d{2})[.:](\d{2,3})\](.*)/;
      return lrc.split("\n").reduce((acc, line) => {
        const m = line.match(re);
        if (!m) return acc;
        const t = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3].padEnd(3,"0").slice(0,3)) / 1000;
        const text = m[4].trim();
        if (text) acc.push({ time: t, text });
        return acc;
      }, []).sort((a, b) => a.time - b.time);
    }

    function formatTime(s) {
      return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;
    }

    function timeAgo(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    const styleEl = document.createElement("style");
    styleEl.textContent = `
      @keyframes vinyl-spin { to { transform: rotate(360deg); } }
      @keyframes wave-0 { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
      @keyframes wave-1 { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
      @keyframes wave-2 { from { transform: scaleY(0.2); } to { transform: scaleY(0.9); } }
      @keyframes wave-3 { from { transform: scaleY(0.6); } to { transform: scaleY(1); } }
      @keyframes fade-up  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes pulse    { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
      .safe-top { padding-top: max(56px, calc(env(safe-area-inset-top) + 16px)) !important; }
      .safe-bottom { padding-bottom: max(32px, calc(env(safe-area-inset-bottom) + 16px)) !important; }
    `;
    document.head.appendChild(styleEl);

    function Vinyl({ size = 120, spinning = false }) {
      return (
        <div style={{ width:size, height:size, margin:"0 auto", animation: spinning ? "vinyl-spin 2s linear infinite" : "none", flexShrink:0 }}>
          <svg viewBox="0 0 100 100" style={{ width:"100%", height:"100%" }}>
            <defs>
              <radialGradient id="vg2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#1e1828" />
                <stop offset="70%" stopColor="#0a0812" />
                <stop offset="100%" stopColor="#050508" />
              </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="49" fill="url(#vg2)" />
            {[46,42,38,34,30,26,22].map((r,i) => (
              <circle key={i} cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="0.8" />
            ))}
            <circle cx="50" cy="50" r="10" fill="#d4a846" opacity="0.85" />
            <circle cx="50" cy="50" r="3.5" fill="#080810" />
          </svg>
        </div>
      );
    }

    // level: 0–1 real mic amplitude. When > 0 the bars are driven by actual audio.
    // Falls back to CSS animation when level === undefined (e.g. onboarding demo).
    const BAR_MULTS = [0.55, 0.85, 1.0, 0.75, 0.95, 0.65, 0.90, 0.70, 1.0, 0.60, 0.80, 0.50];
    function WaveAnimation({ active, size = 1, level }) {
      const [tick, setTick] = useState(0);
      useEffect(() => {
        if (!active) return;
        const id = setInterval(() => setTick(t => t + 1), 50);
        return () => clearInterval(id);
      }, [active]);

      const hasLevel = typeof level === "number";
      // Amplitude: always animate, but scale with level. Floor at 0.12 so bars never go flat.
      const amp = hasLevel ? Math.max(0.12, level) : 0.6;
      // Color: gold when audible, rose/pink when too quiet, plain gold when no level data
      const color = hasLevel
        ? (level > 0.05 ? "#d4a846" : "#c9807a")
        : "#d4a846";
      const t = tick * 0.05;

      return (
        <div style={{ display:"flex", gap:`${4*size}px`, alignItems:"center", height:`${52*size}px`, justifyContent:"center" }}>
          {BAR_MULTS.map((mult, i) => {
            const phase   = i * 0.72;
            const sinVal  = (Math.sin(t * (1.8 + i * 0.18) + phase) + 1) / 2; // 0→1
            const minH    = 4;
            const maxH    = 48 * amp * mult;
            const h       = active ? Math.max(minH, minH + (maxH - minH) * sinVal) : 3;
            return (
              <div key={i} style={{
                width:`${3*size}px`, borderRadius:"2px",
                background: `linear-gradient(to top, ${color}, ${color}88)`,
                height: `${h * size}px`,
                transition: "background 0.3s ease",
                opacity: active ? 1 : 0.3,
              }} />
            );
          })}
        </div>
      );
    }

    function ProgressRing({ progress, size = 96 }) {
      const r = size/2 - 5, circ = 2 * Math.PI * r;
      return (
        <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3" />
          <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth="3" strokeLinecap="round"
            stroke="url(#pg2)" strokeDasharray={`${circ*progress} ${circ}`}
            style={{ transition:"stroke-dasharray 0.1s linear" }} />
          <defs>
            <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#d4a846" /><stop offset="100%" stopColor="#e8a0a8" />
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function Liri() {
      // ── Core state ──
      const [mode, setMode]                   = useState("idle");
      const [detectedSong, setDetectedSong]   = useState(null);
      const [identifiedBy, setIdentifiedBy]   = useState(null); // "acr" | "whisper"
      const [songDuration, setSongDuration]   = useState(null); // seconds
      const [lyrics, setLyrics]               = useState([]);
      const [currentIndex, setCurrentIndex]   = useState(0);
      const [playbackTime, setPlaybackTime]   = useState(0);
      const [error, setError]                 = useState(null);
      const [listenProgress, setListenProgress]   = useState(0);
      const [listenAttempt, setListenAttempt]     = useState(0); // which rolling attempt we're on
      const [listenSecs, setListenSecs]           = useState(0); // real-time seconds counter (UI only)

      // ── UI panels ──
      const [showSettings, setShowSettings]   = useState(false);
      const [showHistory, setShowHistory]     = useState(false);

      // ── Auth ──
      const [user, setUser]                   = useState(null);
      const [authLoading, setAuthLoading]     = useState(true);
      const [authMode, setAuthMode]           = useState("signin");
      const [authEmail, setAuthEmail]         = useState("");
      const [authPassword, setAuthPassword]   = useState("");
      const [authError, setAuthError]         = useState(null);
      const [authWorking, setAuthWorking]     = useState(false);
      const [authSheet, setAuthSheet]         = useState(null);

      // ── Usage ──
      const [usageCount, setUsageCount]       = useState(0);
      const FREE_LIMIT = 10;
      const isUnlimited = (u) => u?.email === "test@test.com";

      // ── History ──
      const [history, setHistory]             = useState([]);
      const [historyLoading, setHistoryLoading] = useState(false);

      // ── Vinyl auto mode ──
      const [vinylMode, setVinylMode]         = useState(() => localStorage.getItem("liri_vinyl_mode") === "true");
      const autoAdvanceFiredRef               = useRef(false);

      // ── Turntable: album the user has selected before listening ──
      const [turntableAlbum, setTurntableAlbum] = useState(() => {
        try { return JSON.parse(localStorage.getItem("liri_turntable") || "null"); }
        catch { return null; }
      });
      const [showAlbumPicker, setShowAlbumPicker]       = useState(false);
      const [userLibrary, setUserLibrary]               = useState([]);
      const [libLoading, setLibLoading]                 = useState(false);
      const [turntableTracksLoading, setTurntableTracksLoading] = useState(false);
      const turntableAlbumRef       = useRef(turntableAlbum);
      const turntableTracksRef      = useRef([]); // iTunes tracks for selected album (pre-fetched)
      const turntableMatchedIdxRef  = useRef(-1);  // 0-based index of last vinyl-matched track
      const turntableLyricsCacheRef = useRef({});  // trackId → syncedLyrics string (from Supabase cache)
      const autoRetryCountRef                 = useRef(0);

      // ── Album tracklist (for vinyl auto-advance without re-listening) ──
      const [albumTracks, setAlbumTracks]             = useState([]);
      const [currentTrackIndex, setCurrentTrackIndex] = useState(-1);
      const albumTracksRef                            = useRef([]);
      const currentTrackIndexRef                      = useRef(-1);

      // ── Resync / advance flags ──
      const [isResyncing, setIsResyncing]             = useState(false);
      const [shouldAdvanceTrack, setShouldAdvanceTrack] = useState(false);
      const [sideEndReason, setSideEndReason]         = useState("failed"); // "failed" | "flip" | "album-end"

      // ── Per-album side learning (silent — no user-facing UI) ──
      const [albumCollectionId, setAlbumCollectionId] = useState(null);
      const albumCollectionIdRef                      = useRef(null);
      const albumTpsRef                               = useRef(0); // effective tps from localStorage learning or heuristic

      // ── Liri vinyl database ──
      const [vinylDbRelease, setVinylDbRelease]       = useState(null);
      const vinylDbReleaseRef                         = useRef(null);

      // ── Flip notifications ──
      const [flipSound, setFlipSound]   = useState(() => localStorage.getItem("liri_flip_sound") !== "false");
      const [flipNotify, setFlipNotify] = useState(() => localStorage.getItem("liri_flip_notify") === "true");
      const [notifyDenied, setNotifyDenied] = useState(false);

      // ── Nudge expand ──
      const [nudgeMenu, setNudgeMenu]         = useState(null); // null | "left" | "right"
      const nudgeMenuTimerRef                 = useRef(null);

      // ── Onboarding ──
      const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem("liri_onboarding_done"));
      const [onboardingStep, setOnboardingStep] = useState(0);
      const ONBOARDING_STEPS = 6;
      const dismissOnboarding = () => { localStorage.setItem("liri_onboarding_done", "true"); setShowOnboarding(false); };

      // ── Analytics: persistent anonymous session ID ──
      // Stays in localStorage forever so we can track listening patterns even
      // before a user creates an account. Once logged in, user_id takes over.
      const sessionId = React.useMemo(() => {
        let sid = localStorage.getItem("liri_session_id");
        if (!sid) {
          sid = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,
            c => (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
          localStorage.setItem("liri_session_id", sid);
        }
        return sid;
      }, []);

      // ── Cast ──
      const [showCast, setShowCast]                 = useState(false);
      const [castReady, setCastReady]               = useState(false);   // Cast SDK loaded + App ID set
      const [castConnected, setCastConnected]       = useState(false);   // Active Cast session
      const [castDeviceName, setCastDeviceName]     = useState(null);    // e.g. "Living Room TV"

      // Browser-mode fallback (QR code)
      const roomCode = user?.id ? user.id.replace(/-/g, "").slice(0, 6).toUpperCase() : null;
      const tvUrl = roomCode ? `${location.origin}/tv?room=${roomCode}` : null;
      const qrUrl = tvUrl ? `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(tvUrl)}&size=220x220&bgcolor=0f0f1c&color=d4a846&margin=12&qzone=1` : null;

      // Listen for Cast SDK becoming ready
      useEffect(() => {
        const onReady = () => setCastReady(true);
        window.addEventListener("liri-cast-ready", onReady);
        if (castAvailable) setCastReady(true);
        return () => window.removeEventListener("liri-cast-ready", onReady);
      }, []);

      // Track Cast session state
      useEffect(() => {
        if (!castReady || !castContext) return;
        const onSessionChange = () => {
          const session = castContext.getCurrentSession();
          setCastConnected(!!session);
          setCastDeviceName(session?.getCastDevice()?.friendlyName || null);
        };
        castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onSessionChange);
        return () => castContext.removeEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onSessionChange);
      }, [castReady]);

      // Send lyrics to Chromecast whenever a song is detected/advanced
      const sendToCast = useCallback((song, lyricsArr, initialPos, detectedAt) => {
        if (!castReady || !castConnected) return;
        try {
          const session = castContext.getCurrentSession();
          if (!session) return;
          session.sendMessage(CAST_NS, {
            type:       "SESSION_START",
            songTitle:  song.title,
            songArtist: song.artist,
            artworkUrl: song.artwork || null,
            lyrics:     lyricsArr,
            initialPos,
            detectedAt: detectedAt || Date.now(),
          });
        } catch (e) { console.warn("Cast send failed:", e); }
      }, [castReady, castConnected]);

      const stopCast = useCallback(() => {
        if (!castReady || !castConnected) return;
        try {
          const session = castContext.getCurrentSession();
          session?.sendMessage(CAST_NS, { type: "SESSION_END" });
          castContext.endCurrentSession(true);
        } catch (e) {}
        setCastConnected(false);
      }, [castReady, castConnected]);

      const syncCastSession = async (song, lyricsArr, initialPos) => {
        const now = Date.now();
        // 1. Google Cast (Chromecast) — direct, instant, no server needed
        sendToCast(song, lyricsArr, initialPos, now);
        // 2. Supabase Realtime — fallback for TV browsers / QR code approach
        if (!user || !roomCode) return;
        await sb.from("cast_sessions").upsert({
          room_code: roomCode,
          user_id: user.id,
          song_title: song.title,
          song_artist: song.artist,
          artwork_url: song.artwork || null,
          lyrics_json: lyricsArr,
          initial_position: initialPos,
          detected_at: new Date(now).toISOString(),
          is_active: true,
        });
      };

      // ── Refs ──
      const streamRef           = useRef(null);
      const syncIntervalRef     = useRef(null);
      const syncStartRef        = useRef(null);
      const detectedAtRef       = useRef(null);
      const initialPosRef       = useRef(0);
      const recordingStartRef   = useRef(null); // wall-clock time when mic started recording
      const lyricsRef        = useRef([]);
      const progressTimerRef    = useRef(null);
      const currentLineRef      = useRef(null);
      const creditsRef          = useRef(null);
      const userScrollingRef    = useRef(false); // true while user is browsing lyrics manually
      const scrollInhibitTimer  = useRef(null);
      const listenSessionRef    = useRef(0); // increments on each startListening; guards stale async callbacks
      const attemptLogRef       = useRef([]); // collects per-attempt debug info for the error screen
      const lastRecordingRef    = useRef(null); // stores last recorded blob for debug download
      const recognitionWonRef   = useRef(false); // true once ACRCloud or Whisper wins — prevents double-set
      const [audioLevel, setAudioLevel] = useState(0); // 0–1 live mic amplitude (chunk-size proxy)

      useEffect(() => { lyricsRef.current = lyrics; }, [lyrics]);
      useEffect(() => { albumTracksRef.current = albumTracks; }, [albumTracks]);
      useEffect(() => { currentTrackIndexRef.current = currentTrackIndex; }, [currentTrackIndex]);
      useEffect(() => { vinylDbReleaseRef.current    = vinylDbRelease;    }, [vinylDbRelease]);
      useEffect(() => { albumCollectionIdRef.current = albumCollectionId; }, [albumCollectionId]);


      // ── Vinyl mode persistence ──
      const toggleVinylMode = (val) => {
        setVinylMode(val);
        localStorage.setItem("liri_vinyl_mode", String(val));
      };

      // ── Per-album side data (localStorage, keyed by iTunes collectionId) ──
      const getAlbumSideData = (cid) => {
        if (!cid) return null;
        try { return JSON.parse(localStorage.getItem(`liri_album_sides_${cid}`) || "null"); }
        catch { return null; }
      };
      const saveAlbumSideData = (cid, sides, totalTracks) => {
        if (!cid || !totalTracks) return;
        const tps = Math.ceil(totalTracks / sides);
        const existing = getAlbumSideData(cid) || {};
        const data = { ...existing, tps, sides, totalTracks, confirmed: (existing.confirmed || 0) + 1 };
        localStorage.setItem(`liri_album_sides_${cid}`, JSON.stringify(data));
        albumTpsRef.current = tps;
      };
      // ── Liri vinyl DB lookup ──
      const fetchVinylRelease = async (collectionId) => {
        try {
          const { data } = await sb
            .from("vinyl_releases")
            .select("*, vinyl_tracks(*)")
            .eq("itunes_collection_id", collectionId)
            .order("confirmed_count", { ascending: false })
            .limit(1)
            .single();
          return data || null;
        } catch { return null; }
      };

      // ── Auto-populate vinyl side data from MusicBrainz ──────────────────────────────
      // When an album is selected, query MusicBrainz for its vinyl tracklist (A1, B2…)
      // and store it in vinyl_releases + vinyl_tracks so getSideInfo can use real data.
      // Fire-and-forget — runs in background, silent on failure.
      const autoPopulateVinylSides = async (collectionId, albumName, artistName) => {
        try {
          // Already in DB? Skip.
          const { data: existing } = await sb.from("vinyl_releases")
            .select("id").eq("itunes_collection_id", String(collectionId)).maybeSingle();
          if (existing) return existing.id;

          const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
          const normAlbum     = norm(albumName);
          const normArtist    = norm(artistName);
          const normAlbumBase = norm(albumName.split("(")[0].trim());

          // 1. Search Discogs
          const search = await fetch(
            `/api/discogs-lookup?q=${encodeURIComponent(artistName + " " + albumName)}&per_page=10`
          ).then(r => r.json()).catch(() => null);

      const matchTranscriptToTracks = async (transcript, tracks, logRef, lyricsCache = {}) => {

        // to one section of one song and far harder to match by coincidence.
        const allWords = transcript.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 1);
        const bigrams = [];
        for (let i = 0; i < allWords.length - 1; i++) {

        const winnerBase = bestTrack ? baseTitle(bestTrack) : "";
        let secondScore = 0;
        for (const [t, score] of trackScores) {
          if (t === bestTrack) continue;
          if (baseTitle(t) === winnerBase) continue; // same song, different arrangement
          if (score > secondScore) secondScore = score;
        }

        // Require at least 2 bigram matches AND a clear margin over the best different song.
        if (!bestTrack || bestScore < 2 || (bestScore - secondScore) < 2) return null;

        // Window-based position finding.
        // Use longer/distinctive words only (> 4 chars) — short words like "the", "you", "and"
        // appear in every 20s window and make the score uniform, producing random results.
        // Longer words (e.g. "forever", "trouble", "dancing") are specific enough to peak
        // in the correct window even when shorter words repeat across choruses.
        const lyrics = parseLRC(bestTrack.lrcMatch.syncedLyrics);
        // Use transcript bigrams for position — consecutive word pairs are far more
        // location-specific than individual words that repeat across verses/chorus.
        const LISTEN_WINDOW = 20; // seconds of audio captured
        let bestWindowScore = 0, startPos = 0;
        for (let wi = 0; wi < lyrics.length; wi++) {
          const windowEnd   = lyrics[wi].time;
          const windowStart = windowEnd - LISTEN_WINDOW;
          const windowText  = lyrics
            .filter(l => l.time >= windowStart && l.time <= windowEnd)
            .map(l => l.text).join(" ")
            .toLowerCase().replace(/[^\w\s]/g, "");
          const score = bigrams.filter(bg => windowText.includes(bg)).length;
          if (score > bestWindowScore) {
            bestWindowScore = score;
            startPos = Math.max(0, windowEnd + 2);
          }
        }
        if (logRef) logRef.push(`stratV: position window score ${bestWindowScore}, startPos ${startPos.toFixed(1)}s`);

        return { track: bestTrack, lrcMatch: bestTrack.lrcMatch, lyrics, startPos, score: bestScore };
      };

      // ── Whisper transcription → LRCLib lyrics match (fallback when ACRCloud fails) ──
      // Sends audio to /api/transcribe (Whisper), searches LRCLib by the
      // transcribed words, finds which line matches to get the playback position.
      const tryLyricsTranscription = async (blob, isAutoAdvance) => {
        try {
          // 1. Transcribe with Whisper
          const audio = await blobToBase64(blob);

          const transcribeUrl = window.Capacitor
            ? "https://getliri.app/api/transcribe"
            : "/api/transcribe";

          const tr = await fetch(transcribeUrl, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio, mimeType: blob.type || "audio/webm" }),
          });
          if (!tr.ok) {
            const errBody = await tr.json().catch(() => ({}));
            attemptLogRef.current.push(`whisper: HTTP ${tr.status} — ${errBody.error || "failed"}`);
            return false;
          }
          const { text: transcribed } = await tr.json();
          if (!transcribed || transcribed.trim().length < 4) {
            attemptLogRef.current.push(`whisper: got empty/short transcript — "${transcribed || ""}"`);
            return false;
          }
          attemptLogRef.current.push(`whisper: transcribed "${transcribed.slice(0, 40)}…"`);

          // ── Strategy V: Vinyl-aware match against known tracklist ──
          // Only fires when the user has pre-selected their album ("what's on the turntable?").
          // Skips GPT — directly matches transcript against every track's LRC lyrics.
          // Best path for obscure tracks, re-recordings, anything ACR misses.
          // If turntable album is set but tracks are empty (iTunes fetch failed or race),
          // retry the fetch now so this attempt isn't wasted.
          if (turntableAlbumRef.current && turntableTracksRef.current.length === 0) {
            attemptLogRef.current.push(`turntable: tracks empty, retrying iTunes fetch…`);
            await fetchTurntableTracks(turntableAlbumRef.current.itunes_collection_id);
          }

          const turntableTracks = turntableTracksRef.current;
          attemptLogRef.current.push(`turntable: ${turntableTracks.length} tracks loaded`);
          if (turntableTracks.length > 0) {
            attemptLogRef.current.push(`whisper: trying vinyl-aware match against ${turntableTracks.length} tracks`);
            const vmResult = await matchTranscriptToTracks(transcribed, turntableTracks, attemptLogRef.current, turntableLyricsCacheRef.current);
            if (vmResult) {
              if (recognitionWonRef.current) return false;
              recognitionWonRef.current = true;
              const { track, lrcMatch, lyrics, startPos, score } = vmResult;
              attemptLogRef.current.push(`whisper: vinyl match "${track.trackName}" (score ${score})`);
              // Store matched track index so getSideInfo can show side/track before albumTracks loads
              const matchedIdx = turntableTracksRef.current.findIndex(
                t => t.trackName?.toLowerCase() === track.trackName?.toLowerCase()
              );
              turntableMatchedIdxRef.current = matchedIdx >= 0 ? matchedIdx
                : (track.trackNumber ? track.trackNumber - 1 : 0);
              const ta = turntableAlbumRef.current;
              const song = {
                title:   track.trackName,
                artist:  track.artistName || ta?.artist_name || "",
                album:   ta?.album_name   || lrcMatch.albumName || "",
                artwork: ta?.artwork_url  || null,
              };
              setIdentifiedBy("whisper");
              detectedAtRef.current      = Date.now();
              initialPosRef.current      = startPos;
              autoAdvanceFiredRef.current = false;
              autoRetryCountRef.current  = 0;
              setDetectedSong(song);
              setSongDuration(lrcMatch.duration || null);
              setLyrics(lyrics); lyricsRef.current = lyrics;
              setMode("confirmed");
              saveToHistory(user, song); fetchHistory(user);
              syncCastSession(song, lyrics, startPos);
              // Cache the LRC to Supabase so future matches for this track skip LRCLib
              if (track.trackId && lrcMatch?.syncedLyrics) {
                const ta2 = turntableAlbumRef.current;
                sb.from("liri_lyric_cache").upsert({
                  itunes_track_id:      track.trackId,
                  itunes_collection_id: ta2?.itunes_collection_id || track.collectionId,
                  track_name:    track.trackName,
                  artist_name:   track.artistName,
                  album_name:    ta2?.album_name,
                  track_number:  track.trackNumber,
                  disc_number:   track.discNumber,
                  synced_lyrics: lrcMatch.syncedLyrics,
                }, { onConflict: "itunes_track_id" }).then(() => {
                  turntableLyricsCacheRef.current[track.trackId] = lrcMatch.syncedLyrics;
                  attemptLogRef.current.push(`cache: saved LRC for "${track.trackName}"`);
                }).catch(() => {});
              }
              // Load full tracklist for vinyl auto-advance
              fetchAlbumTracks(track.trackName, track.artistName || "").then(({ tracks: at, collectionId }) => {
                setAlbumTracks(at); setAlbumCollectionId(collectionId);
                const tIdx = at.findIndex(t => t.trackName?.toLowerCase() === track.trackName.toLowerCase());
                setCurrentTrackIndex(tIdx >= 0 ? tIdx : 0);
                if (collectionId) fetchVinylRelease(collectionId).then(db => {
                  if (db?.vinyl_tracks?.length > 0) { setVinylDbRelease(db); albumTpsRef.current = 0; }
                });
              }).catch(() => {});
              return true;
            }
            attemptLogRef.current.push(`whisper: vinyl-aware match failed — stopping (turntable set, not guessing)`);
            return false;
          }

          // 2. Find the song on LRCLib
          // Strategy A (vinyl mode): we know the artist + expected track — search directly
          // Strategy B (fallback): search by transcribed lyrics text
          let match = null;

          const knownTracks = albumTracksRef.current;
          const knownIdx    = currentTrackIndexRef.current;
          const knownArtist = detectedSong?.artist || knownTracks[knownIdx]?.artistName || "";
          const knownTitle  = knownTracks[knownIdx]?.trackName || "";

          if (knownArtist && knownTitle) {
            // Search LRCLib directly by artist + track name — much more reliable than lyrics search
            const candidates = await Promise.all(
              // also try adjacent tracks in case auto-advance index is off by one
              [knownIdx - 1, knownIdx, knownIdx + 1]
                .filter(i => i >= 0 && i < knownTracks.length)
                .map(i => {
                  const t = knownTracks[i];
                  const q = `${t.artistName || knownArtist} ${t.trackName}`;
                  return fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`)
                    .then(r => r.json()).catch(() => []);
                })
            );
            const flat = candidates.flat().filter(c => c.syncedLyrics);
            // Pick whichever result has lyrics that best match the Whisper transcript
            const words = transcribed.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 3);
            let bestScore = 0;
            for (const c of flat) {
              const lyricText = c.syncedLyrics.toLowerCase().replace(/\[[\d:\.]+\]/g, "");
              const hits = words.filter(w => lyricText.includes(w)).length;
              if (hits > bestScore) { bestScore = hits; match = c; }
            }
            if (!match) match = flat[0] || null;
            if (match) attemptLogRef.current.push(`whisper: matched via track context "${match.trackName}"`);
          }

          if (!match) {
            // Strategy B: ask GPT to identify the song from the transcript, then look it up on LRCLib.
            // Cross-validate: the matched lyrics must actually contain enough of the transcribed words —
            // otherwise GPT guessed wrong and we fall through to Strategy C.
            try {
              const identifyUrl = window.Capacitor
                ? "https://getliri.app/api/identify-lyrics"
                : "/api/identify-lyrics";
              const gptRes = await fetch(identifyUrl, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: transcribed }),
              });
              if (gptRes.ok) {
                const { title: gptTitle, artist: gptArtist } = await gptRes.json();
                if (gptTitle) {
                  attemptLogRef.current.push(`whisper: GPT identified "${gptTitle}" by ${gptArtist || "?"}`);
                  const q = `${gptArtist || ""} ${gptTitle}`.trim();
                  const lrcRes = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`)
                    .then(r => r.json()).catch(() => []);
                  const candidates = Array.isArray(lrcRes) ? lrcRes : [];
                  const gptMatch = candidates.find(c => c.syncedLyrics) || null;
                  // Cross-validate: check the transcribed words actually appear in the lyrics
                  if (gptMatch?.syncedLyrics) {
                    const vWords = transcribed.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 3);
                    const lyricText = gptMatch.syncedLyrics.toLowerCase().replace(/\[[\d:\.]+\]/g, "");
                    const vHits = vWords.filter(w => lyricText.includes(w)).length;
                    if (vHits >= 3) {
                      match = gptMatch;
                      attemptLogRef.current.push(`whisper: GPT match cross-validated (score ${vHits})`);
                    } else {
                      attemptLogRef.current.push(`whisper: GPT match rejected — lyrics don't match transcript (score ${vHits})`);
                    }
                  }
                }
              }
            } catch {}
          }

          if (!match) {
            // Strategy C: search LRCLib directly using the raw transcribed words.
            // Last resort — works when GPT can't identify the song but the transcript
            // has enough lyric fragments for LRCLib's search to surface the right track.
            try {
              const q = transcribed.slice(0, 120).trim();
              const lrcRes = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`)
                .then(r => r.json()).catch(() => []);
              const candidates = (Array.isArray(lrcRes) ? lrcRes : []).filter(c => c.syncedLyrics);
              if (candidates.length) {
                const words = transcribed.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 3);
                let bestScore = 0;
                for (const c of candidates) {
                  const lyricText = c.syncedLyrics.toLowerCase().replace(/\[[\d:\.]+\]/g, "");
                  const hits = words.filter(w => lyricText.includes(w)).length;
                  if (hits > bestScore) { bestScore = hits; match = c; }
                }
                // Require at least 3 word hits — prevents weak matches on coincidental shared words
                if (bestScore < 3) match = null;
                if (match) attemptLogRef.current.push(`whisper: strategy C matched "${match.trackName}" (score ${bestScore})`);
              }
            } catch {}
          }

          if (!match) return false;

          // 3. Parse lyrics
          const lyrics = match.syncedLyrics
            ? parseLRC(match.syncedLyrics)
            : (match.plainLyrics || "").split("\n").filter(l => l.trim()).map((text, i) => ({ time: i * 4, text }));
          if (!lyrics.length) return false;

          // 4. Find playback position: match transcribed words against lyric lines
          const words = transcribed.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(Boolean);
          let startPos = 0;
          let bestScore = 0;
          for (const line of lyrics) {
            const lineWords = line.text.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/);
            const hits = words.filter(w => w.length > 3 && lineWords.includes(w)).length;
            if (hits > bestScore) { bestScore = hits; startPos = Math.max(0, line.time - 0.5); }
          }

          // 5. Fetch artwork from iTunes
          const title  = match.trackName  || "";
          const artist = match.artistName || "";
          let artwork = null;
          try {
            const it = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`).then(r => r.json());
            artwork = it.results?.[0]?.artworkUrl100?.replace("100x100bb", "600x600bb") || null;
          } catch {}

          // 6. Wire it up exactly like a normal recognition match
          // Guard: if ACRCloud already won the race, don't overwrite its result
          if (recognitionWonRef.current) return false;
          recognitionWonRef.current = true;

          const song = { title, artist, album: match.albumName || "", artwork };
          setIdentifiedBy("whisper");
          detectedAtRef.current      = Date.now();
          initialPosRef.current      = startPos;
          autoAdvanceFiredRef.current = false;
          autoRetryCountRef.current  = 0;

          setDetectedSong(song);
          setSongDuration(match.duration || null);
          setLyrics(lyrics);
          lyricsRef.current = lyrics;
          setMode("confirmed");

          saveToHistory(user, song);
          fetchHistory(user);
          syncCastSession(song, lyrics, startPos);

          // Non-blocking: fetch album tracklist for vinyl auto-advance
          fetchAlbumTracks(title, artist).then(({ tracks, collectionId }) => {
            setAlbumTracks(tracks);
            setAlbumCollectionId(collectionId);
            const tIdx = tracks.findIndex(t => t.trackName?.toLowerCase() === title.toLowerCase());
            setCurrentTrackIndex(tIdx >= 0 ? tIdx : 0);
            if (!collectionId) return;
            fetchVinylRelease(collectionId).then(db => {
              if (db?.vinyl_tracks?.length > 0) { setVinylDbRelease(db); albumTpsRef.current = 0; }
            });
          }).catch(() => {});

          return true;
        } catch { return false; }
      };

      // ── Handle final recognition failure ──
      const handleNoMatch = (isAutoAdvance, stage = "acr") => {
        if (isAutoAdvance) {
          autoRetryCountRef.current += 1;
          if (autoRetryCountRef.current < 2) {
            setTimeout(() => startListening(true), 4000);
          } else {
            autoRetryCountRef.current = 0;
            setSideEndReason("failed");
            setMode("side-end");
          }
        } else {
          const log = attemptLogRef.current;
          const summary = log.length
            ? log.join("\n")
            : "No attempts logged";
          // Check ACR codes to give a more helpful message
          const acrCodes = log.filter(l => l.includes("ACR")).map(l => {
            const m = l.match(/ACR (\d+)/); return m ? Number(m[1]) : null;
          }).filter(Boolean);
          const allSameCode = acrCodes.length > 0 && acrCodes.every(c => c === acrCodes[0]);
          let stageMsg = stage === "whisper_failed"
            ? "ACRCloud: no match · Whisper fallback: also failed"
            : "ACRCloud: no match after all attempts";
          let hint = "Move closer to your speakers and try again.";
          if (allSameCode && acrCodes[0] === 2004) hint = "ACR couldn't fingerprint the audio. Check volume levels or ACRCloud trial status.";
          else if (allSameCode && (acrCodes[0] === 3000 || acrCodes[0] === 3002)) hint = "ACRCloud credentials are invalid. Check Vercel env vars.";
          else if (allSameCode && (acrCodes[0] === 3003 || acrCodes[0] === 3015)) hint = "ACRCloud rate limit reached.";
          setError(`${stageMsg}\n\n${summary}\n\n${hint}`);
          setMode("error");
        }
      };

      // ── Record audio and detect — rolling 5s attempts ──
      // Sends a recognition request every 5 seconds using ALL accumulated audio.
      // On match: stops immediately. On miss: keeps recording and tries a longer clip.
      // Fast songs get identified in 5s. Quiet/tricky ones keep accumulating up to 30s.
      const ATTEMPT_INTERVAL = 5000; // ms between attempts
      const MAX_ATTEMPTS     = 6;    // 5s, 10s, 15s, 20s, 25s, 30s max

      const startListening = async (isAutoAdvance = false) => {
        if (!isAutoAdvance && !isUnlimited(user) && usageCount >= FREE_LIMIT) { setMode("limit"); return; }
        // Kill any leftover interval from a previous session immediately — before awaiting mic
        // so a resumed stale callback can't accidentally clear the new session's interval.
        clearInterval(progressTimerRef.current);
        const session = ++listenSessionRef.current; // unique id for this listen attempt
        attemptLogRef.current = [];
        recognitionWonRef.current = false;
        turntableMatchedIdxRef.current = -1; // clear stale side/track display during new listen
        setError(null);
        setMode("listening");
        setListenProgress(0);
        setListenAttempt(0);
        clearInterval(syncIntervalRef.current);

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            // echoCancellation + noiseSuppression off: don't process the music signal.
            // autoGainControl left as default (on): lets the device boost ambient music
            // so ACRCloud gets a loud-enough signal to fingerprint.
            audio: { echoCancellation: false, noiseSuppression: false }
          });
          streamRef.current = stream;

          // ── Live mic level metering via chunk-size proxy ──
          // Uses the size of each 200ms audio chunk as a proxy for amplitude.
          // Avoids creating an AudioContext (which can interfere with MediaRecorder on iOS Safari).
          let smoothedLevel = 0;
          const stopMetering = () => { setAudioLevel(0); };

          const preferredMime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
                             : MediaRecorder.isTypeSupported("audio/ogg")  ? "audio/ogg"
                             : MediaRecorder.isTypeSupported("audio/mp4")  ? "audio/mp4"
                             : "";
          const recorder = preferredMime ? new MediaRecorder(stream, { mimeType: preferredMime }) : new MediaRecorder(stream);
          // Read the actual mimeType back from the recorder — on iOS Safari this may
          // differ from preferredMime (e.g. browser picks audio/mp4 when we asked for "").
          // Strip any codec suffix (e.g. "audio/mp4;codecs=mp4a.40.2" → "audio/mp4")
          // because ACRCloud doesn't recognise the long form.
          const rawMime  = recorder.mimeType || preferredMime || "audio/webm";
          const mimeType = rawMime.split(";")[0].trim();
          const allChunks  = [];
          let attempts     = 0;
          let sending      = false;
          let nextAttemptAt = ATTEMPT_INTERVAL;

          recorder.ondataavailable = e => {
            if (e.data.size > 0) {
              allChunks.push(e.data);
              // Chunk-size proxy for amplitude: 200ms @ 128kbps ≈ 3200 bytes silence → 6000+ bytes music
              // Normalise to 0–1, fast attack (0.4), slow release (0.07)
              const raw = Math.min(1, e.data.size / 5000);
              smoothedLevel = raw > smoothedLevel
                ? smoothedLevel + (raw - smoothedLevel) * 0.4
                : smoothedLevel + (raw - smoothedLevel) * 0.07;
              setAudioLevel(smoothedLevel);
            }
          };
          recorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); stopMetering(); };
          recorder.start(200);
          recordingStartRef.current = Date.now();
          // Log the detected audio format so it shows in the error screen if things go wrong
          attemptLogRef.current.push(`format: ${mimeType}`);

          let elapsed = 0;
          let bgWhisperStarted = false; // background Whisper fired at attempt 3
          progressTimerRef.current = setInterval(async () => {
            elapsed += 100;

            // Fill the progress ring smoothly over the full 30s max listen window
            setListenProgress(Math.min(elapsed / (MAX_ATTEMPTS * ATTEMPT_INTERVAL), 1));

            if (elapsed >= nextAttemptAt && !sending) {
              sending = true;
              attempts++;
              setListenAttempt(attempts);
              nextAttemptAt = (attempts + 1) * ATTEMPT_INTERVAL;

              // ── Background Whisper: fire starting at attempt 4 (20s), retry each attempt ──
              // In turntable mode: retry every 5s (at 20s, 25s, 30s) — the first blob may have
              // landed in an intro/instrumental; a later blob with more lyric content often succeeds.
              // In non-turntable mode: fire once at 20s only (GPT/Strategy C need a good transcript).
              const hasTurntable = turntableTracksRef.current.length > 0;
              const shouldFireWhisper = hasTurntable
                ? (attempts >= 1 && !bgWhisperStarted && !recognitionWonRef.current)
                : (attempts === 4 && !bgWhisperStarted);
              if (shouldFireWhisper) {
                bgWhisperStarted = true;
                const bgBlob = new Blob([...allChunks], { type: mimeType || "audio/webm" });
                tryLyricsTranscription(bgBlob, isAutoAdvance).then(found => {
                  bgWhisperStarted = false; // allow retry on next attempt if this one failed
                  if (found && listenSessionRef.current === session) {
                    // Whisper won the race — shut down ACRCloud loop
                    clearInterval(progressTimerRef.current);
                    if (recorder.state === "recording") recorder.stop();
                  }
                });
              }

              // If background Whisper already won, skip remaining ACRCloud attempts
              if (recognitionWonRef.current) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                return;
              }

              // Snapshot ALL audio accumulated so far — clip grows with each attempt
              const blob = new Blob([...allChunks], { type: mimeType || "audio/webm" });
              const blobKB = Math.round(blob.size / 1024);

              // If blob is empty, MediaRecorder isn't producing audio (common on some iOS versions)
              if (blob.size < 500) {
                attemptLogRef.current.push(`#${attempts} (${attempts*5}s, ${blobKB}KB): no audio captured — MediaRecorder may not be supported on this device`);
                sending = false;
                return;
              }

              const data = await sendAudioToACR(blob);

              // Log this attempt for the error screen
              attemptLogRef.current.push(
                data
                  ? `#${attempts} (${attempts*5}s, ${blobKB}KB): ACR ${data.status?.code} — ${data.status?.msg || "?"}`
                  : `#${attempts} (${attempts*5}s, ${blobKB}KB): network error`
              );

              // Abort if the user restarted while we were awaiting — do NOT clear
              // progressTimerRef here since it now belongs to the new session.
              if (listenSessionRef.current !== session) {
                if (recorder.state === "recording") recorder.stop();
                return;
              }
              // Whisper won the race for this session — stop ACRCloud loop
              if (recognitionWonRef.current) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                return;
              }

              // Rate limit
              if (data?.status?.code === 3003 || data?.status?.code === 3015) {
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                setError("Recognition limit reached. Visit acrcloud.com.");
                setMode("error");
                return;
              }

              // ACRCloud match found — ACRCloud wins the race
              if (data?.status?.code === 0 && data?.metadata?.music?.length > 0) {
                recognitionWonRef.current = true;
                clearInterval(progressTimerRef.current);
                if (recorder.state === "recording") recorder.stop();
                setMode("detecting");
                await handleMatch(data, isAutoAdvance);
                return;
              }

              // All ACRCloud attempts exhausted — wait for background Whisper or give up
              if (attempts >= MAX_ATTEMPTS) {
                clearInterval(progressTimerRef.current);
                setListenAttempt(MAX_ATTEMPTS + 1);
                // Give background Whisper up to 40s to complete before giving up
                const deadline = Date.now() + 40000;
                while (!recognitionWonRef.current && Date.now() < deadline) {
                  await new Promise(resolve => setTimeout(resolve, 500));
                  if (listenSessionRef.current !== session) return;
                }
                if (recorder.state === "recording") recorder.stop();
                if (!recognitionWonRef.current) handleNoMatch(isAutoAdvance, "whisper_failed");
                return;
              }

              sending = false; // ready for next attempt
            }
          }, 100);
        } catch { setError("Microphone access denied."); setMode("error"); }
      };

      // ── Kept for legacy reference — no longer called directly ──
      const detectSong = async (blob, isAutoAdvance = false) => {
        setMode("detecting");
        try {
          const data = await sendAudioToACR(blob);
          if (!data) { handleNoMatch(isAutoAdvance); return false; }
          if (data.status?.code === 3003 || data.status?.code === 3015) {
            setError("Recognition limit reached. Visit acrcloud.com."); setMode("error"); return false;
          }
          if (data.status?.code === 0 && data.metadata?.music?.length > 0) {
            await handleMatch(data, isAutoAdvance); return true;
          }
          handleNoMatch(isAutoAdvance); return false;
        } catch (err) {
          if (isAutoAdvance) {
            autoRetryCountRef.current += 1;
            if (autoRetryCountRef.current < 2) {
              setTimeout(() => startListening(true), 4000);
            } else {
              autoRetryCountRef.current = 0;
              setSideEndReason("failed");
              setMode("side-end");
            }
            return false;
          }
          setError(`Connection failed: ${err.message}`); setMode("error"); return false;
        }
      };

      const loadLyrics = async (title, artist) => {
        try {
          const [a, b] = await Promise.all([
            fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`).then(r => r.json()),
            fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`).then(r => r.json()),
          ]);
          const synced = [...a, ...b].find(x => x.syncedLyrics);
          if (synced) { setLyrics(parseLRC(synced.syncedLyrics)); return; }
          const plain = [...a, ...b].find(x => x.plainLyrics);
          if (plain) setLyrics(plain.plainLyrics.split("\n").filter(l => l.trim()).map((text, i) => ({ time: i * 4, text })));
          else setLyrics([]);
        } catch { setLyrics([]); }
      };

      const startSync = useCallback(() => {
        // Safe to re-arm auto-advance now — new sync is actually starting
        autoAdvanceFiredRef.current = false;
        const delay = detectedAtRef.current ? (Date.now() - detectedAtRef.current) / 1000 : 0;
        initialPosRef.current += delay;
        syncStartRef.current = Date.now();
        // Jump to correct starting index immediately so the scroll effect lands on the right
        // line without smooth-scrolling from 0 (which caused a ~3s visual lag on load).
        const lrc0 = lyricsRef.current;
        const t0   = initialPosRef.current;
        let initIdx = 0;
        for (let i = 0; i < lrc0.length; i++) { if (lrc0[i].time <= t0) initIdx = i; else break; }
        setMode("syncing"); setCurrentIndex(initIdx);
        clearInterval(syncIntervalRef.current);
        syncIntervalRef.current = setInterval(() => {
          const t = initialPosRef.current + (Date.now() - syncStartRef.current) / 1000;
          setPlaybackTime(t);
          const lrc = lyricsRef.current;
          if (!lrc.length) return;
          let idx = 0;
          for (let i = 0; i < lrc.length; i++) { if (lrc[i].time <= t) idx = i; else break; }
          setCurrentIndex(idx);
        }, 80);
      }, []);

      const nudge = (s) => {
        initialPosRef.current = Math.max(0, initialPosRef.current + s);
        // Push updated position to TV
        if (roomCode && detectedSong) {
          sb.from("cast_sessions").update({
            initial_position: initialPosRef.current,
            detected_at: new Date().toISOString(),
          }).eq("room_code", roomCode);
        }
      };

      const handleNudge = (s) => {
        nudge(s);
        const side = s < 0 ? "left" : "right";
        clearTimeout(nudgeMenuTimerRef.current);
        setNudgeMenu(side);
        nudgeMenuTimerRef.current = setTimeout(() => setNudgeMenu(null), 2500);
      };

      // ── Fetch full album tracklist from iTunes ──
      // Returns { tracks: [...], collectionId: "12345" | null }
      const fetchAlbumTracks = async (title, artist) => {
        try {
          const search = await fetch(
            `https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=10`
          ).then(r => r.json());
          const results = (search.results || []).filter(r => r.wrapperType === "track");
          if (!results.length) return { tracks: [], collectionId: null };
          // Prefer the LP: sort by trackCount descending so we get the full album
          // rather than a single (which would only have 1–2 tracks and break side detection)
          results.sort((a, b) => (b.trackCount || 0) - (a.trackCount || 0));
          const hit = results[0];
          if (!hit?.collectionId) return { tracks: [], collectionId: null };
          const lookup = await fetch(
            `https://itunes.apple.com/lookup?id=${hit.collectionId}&entity=song`
          ).then(r => r.json());
          const tracks = (lookup.results || [])
            .filter(t => t.wrapperType === "track")
            .sort((a, b) => a.trackNumber - b.trackNumber);
          return { tracks, collectionId: String(hit.collectionId) };
        } catch { return { tracks: [], collectionId: null }; }
      };

      // ── Determine side-flip points ──
      // Returns an array of track indices that are the LAST track of each side.
      // e.g. for 12 tracks / 3 per side → [2, 5, 8, 11]
      // tracksPerSide=0 means auto-detect via duration (assumes 2 sides).
      // Returns { side: "A", track: 2 } for the current position when vinyl mode is on.
      // Uses Liri DB side data if available, otherwise derives from getSideEndIndices.
      // Derives a small helper from an index + track array — no state needed.
      const deriveSideFromIndex = (idx, tracks) => {
        if (tracks.length === 0 || idx < 0) return null;
        const t = tracks[idx];
        // Multi-disc release (e.g. 2-LP set): split each disc in half for A/B, C/D, E/F…
        const hasMultiDisc = tracks.some(x => x.discNumber > 1);
        if (hasMultiDisc && t?.discNumber) {
          const discTracks = tracks
            .filter(x => x.discNumber === t.discNumber)
            .sort((a, b) => a.trackNumber - b.trackNumber);
          const posInDisc = discTracks.findIndex(x => x.trackId === t.trackId);
          // Find duration midpoint of this disc
          const totalMs = discTracks.reduce((s, x) => s + (x.trackTimeMillis || 0), 0);
          let sideBreak = Math.ceil(discTracks.length / 2) - 1;
          if (totalMs > 0) {
            let cumMs = 0;
            for (let i = 0; i < discTracks.length - 1; i++) {
              cumMs += discTracks[i].trackTimeMillis || 0;
              if (cumMs >= totalMs / 2) { sideBreak = i; break; }
            }
          }
          const isSecondHalf = posInDisc > sideBreak;
          const sideLetter   = String.fromCharCode(65 + (t.discNumber - 1) * 2 + (isSecondHalf ? 1 : 0));
          const trackOnSide  = isSecondHalf ? posInDisc - sideBreak : posInDisc + 1;
          return { side: sideLetter, track: trackOnSide };
        }
        // Single-disc: split by cumulative duration
        const sideEnds = getSideEndIndices(tracks, 0);
        for (let s = 0; s < sideEnds.length; s++) {
          if (idx <= sideEnds[s]) {
            const side        = String.fromCharCode(65 + s);
            const prevEnd     = s === 0 ? -1 : sideEnds[s - 1];
            const trackOnSide = idx - prevEnd;
            return { side, track: trackOnSide };
          }
        }
        return { track: idx + 1 };
      };

      // ── SOURCE OF TRUTH for side/track display ──────────────────────────────
      // This is the single source of truth for which side + track the user is on.
      // library.html uses the same norm() function and the same isSequential logic
      // to merge Discogs data — if you change the logic here, update library.html too.
      const getSideInfo = () => {
        // Strip punctuation + lowercase for reliable title matching (Discogs titles ≠ iTunes titles)
        const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");

        // Resolve a vinyl DB entry for a given iTunes track name + 0-based index.
        // Handles sequential Discogs numbering (B5, F23 → match by index) vs per-side (B1, B2 → match by title).
        const resolveVinylTrack = (trackName, idx, vinylTracks) => {
          if (!vinylTracks?.length) return null;
          const maxNum = Math.max(...vinylTracks.map(v => v.track_number_on_side || 0));
          const isSeq  = maxNum > 0 && maxNum === vinylTracks.length;
          if (isSeq) return vinylTracks.find(v => v.track_number_on_side === idx + 1) || null;
          const normTitle = norm(trackName);
          return vinylTracks.find(v => norm(v.title) === normTitle)
              || vinylTracks.find(v => v.track_number_on_side === idx + 1)
              || null;
        };

        // Convert a vinyl DB row to { side, track } for display.
        // For sequential numbering, recounts per-side position (B5 is shown as Side B · track 1).
        const vinylTrackToSideInfo = (vt, vinylTracks) => {
          if (!vt?.side) return null;
          const maxNum = Math.max(...vinylTracks.map(v => v.track_number_on_side || 0));
          const isSeq  = maxNum > 0 && maxNum === vinylTracks.length;
          const track  = isSeq
            ? vinylTracks.filter(v => v.side === vt.side && v.track_number_on_side <= vt.track_number_on_side).length
            : vt.track_number_on_side;
          return { side: vt.side.toUpperCase(), track };
        };

        // ── Path 2 first: Turntable mode — album pre-selected, track matched by vinyl-aware scan ──
        // Must check this before Path 1 — fetchAlbumTracks may load the wrong album version
        // (e.g. original instead of Taylor's Version) and produce the wrong track index.
        const tTracks = turntableTracksRef.current;
        const tIdx    = turntableMatchedIdxRef.current;
        if (turntableAlbum && tTracks.length > 0 && tIdx >= 0) {
          const vinylTracks = vinylDbRelease?.vinyl_tracks;
          if (vinylTracks?.length > 0) {
            const vt = resolveVinylTrack(tTracks[tIdx]?.trackName, tIdx, vinylTracks);
            const si = vinylTrackToSideInfo(vt, vinylTracks);
            if (si) return si;
          }
          return deriveSideFromIndex(tIdx, tTracks) || { track: tIdx + 1 };
        }

        // ── Path 1: Full vinyl auto-mode — albumTracks + currentTrackIndex ──
        if (albumTracks.length > 0 && currentTrackIndex >= 0) {
          const vinylTracks = vinylDbRelease?.vinyl_tracks;
          if (vinylTracks?.length > 0) {
            const vt = resolveVinylTrack(albumTracks[currentTrackIndex]?.trackName, currentTrackIndex, vinylTracks);
            const si = vinylTrackToSideInfo(vt, vinylTracks);
            if (si) return si;
          }
          // No DB data — derive side from duration heuristic
          return deriveSideFromIndex(currentTrackIndex, albumTracks) || { track: currentTrackIndex + 1 };
        }

        return null;
      };

      const getSideEndIndices = (tracks, tps) => {
        if (tracks.length <= 1) return [];
        if (tps > 0) {
          // User told us exactly how many tracks per side
          const ends = [];
          for (let i = tps - 1; i < tracks.length; i += tps) ends.push(i);
          // Make sure the last track of the album is always included
          if (ends[ends.length - 1] !== tracks.length - 1) ends.push(tracks.length - 1);
          return ends;
        }
        // Short releases (singles, EPs ≤4 tracks) are single-sided — just mark album-end
        if (tracks.length <= 4) return [tracks.length - 1];
        // Estimate number of sides from total runtime: typical vinyl side = ~20 min
        const totalMs = tracks.reduce((s, t) => s + (t.trackTimeMillis || 0), 0);
        const SIDE_MS  = 20 * 60 * 1000;
        const numSides = totalMs > 0 ? Math.max(2, Math.round(totalMs / SIDE_MS)) : 2;
        if (!totalMs) {
          // No duration data — split evenly by track count
          const perSide = Math.ceil(tracks.length / numSides);
          const ends = [];
          for (let i = perSide - 1; i < tracks.length - 1; i += perSide) ends.push(i);
          ends.push(tracks.length - 1);
          return ends;
        }
        // Split by cumulative duration, targeting totalMs/numSides per side
        const targetMs = totalMs / numSides;
        const ends = [];
        let cumulative = 0;
        for (let i = 0; i < tracks.length - 1; i++) {
          cumulative += tracks[i].trackTimeMillis || 0;
          if (cumulative >= targetMs * (ends.length + 1) && ends.length < numSides - 1) ends.push(i);
        }
        ends.push(tracks.length - 1);
        return ends;
      };

      // ── Advance to the next track using the known tracklist (no re-listening) ──
      const advanceToNextTrack = async (tracks, idx) => {
        const nextIdx = idx + 1;

        // Stop the running sync interval immediately so stale playbackTime values
        // can't trigger a false auto-advance on the incoming track. Reset the
        // display to 0 so the UI reflects the new track from the start.
        clearInterval(syncIntervalRef.current);
        setPlaybackTime(0);

        // Use Liri DB side data (most accurate), then local learning, then heuristic
        const dbRelease = vinylDbReleaseRef.current;
        const effectiveTps = albumTpsRef.current > 0 ? albumTpsRef.current : 0; // 0 = use duration heuristic
        const sideEnds = dbRelease?.vinyl_tracks?.length > 0
          ? getDbSideEndIndices(tracks, dbRelease.vinyl_tracks)
          : getSideEndIndices(tracks, effectiveTps);
        const isLastTrack = idx === tracks.length - 1;
        const isSideEnd   = sideEnds.includes(idx);

        if (isLastTrack) {
          setSideEndReason("album-end");
          setMode("side-end");
          return;
        }
        if (isSideEnd) {
          setSideEndReason("flip");
          playFlipChime();
          showFlipPushNotification(detectedSong);

          // ── Log the flip event to analytics ──
          const sideIdx  = sideEnds.indexOf(idx); // 0 = first flip (A→B), 1 = B→C, etc.
          const method   = dbRelease?.vinyl_tracks?.length > 0 ? "db"
                         : albumTpsRef.current > 0             ? "learned"
                         : "heuristic";
          logFlipEvent({
            userId:       user?.id,
            vinylReleaseId:     dbRelease?.id || null,
            collectionId:       albumCollectionIdRef?.current || null,
            album:              detectedSong?.album,
            artist:             detectedSong?.artist,
            fromSide:           "ABCDEFGH"[sideIdx]     || null,
            toSide:             "ABCDEFGH"[sideIdx + 1] || null,
            method,
          });

          setMode("side-end");
          return;
        }
        const next = tracks[nextIdx];
        const nextTitle  = next.trackName;
        const nextArtist = next.artistName || detectedSong?.artist || "";
        const nextArtwork = next.artworkUrl100?.replace("100x100bb", "600x600bb") || detectedSong?.artwork;
        const nextDuration = next.trackTimeMillis ? next.trackTimeMillis / 1000 : null;
        const nextSong = { title: nextTitle, artist: nextArtist, album: next.collectionName || "", artwork: nextArtwork };

        setCurrentTrackIndex(nextIdx);
        turntableMatchedIdxRef.current = nextIdx; // keep turntable index in sync
        detectedAtRef.current = Date.now();
        initialPosRef.current = AUTO_ADVANCE_OFFSET;

        setDetectedSong(nextSong);
        setSongDuration(nextDuration);
        // Use cached LRC if available — skips LRCLib entirely for known tracks
        const cachedLrc = turntableLyricsCacheRef.current?.[next.trackId];
        if (cachedLrc) {
          const parsed = parseLRC(cachedLrc);
          setLyrics(parsed); lyricsRef.current = parsed;
        } else {
          await loadLyrics(nextTitle, nextArtist);
        }

        saveToHistory(user, nextSong);
        fetchHistory(user);
        syncCastSession(nextSong, lyricsRef.current, 0);

        // ── Log auto-advance to analytics ──
        logListeningEvent({
          userId:       user?.id,
          title:        nextTitle,
          artist:       nextArtist,
          album:        next.collectionName || detectedSong?.album,
          artwork:      nextArtwork,
          itunesTrackId:      next.trackId,
          collectionId:       albumCollectionIdRef?.current || null,
          vinylReleaseId:     vinylDbReleaseRef.current?.id || null,
          vinylModeOn:        vinylMode,
          source:             "auto_advance",
          durationSecs:       nextDuration,
        });
        if (!isUnlimited(user)) {
          const newCount = usageCount + 1;
          await sb.from("user_usage").upsert({ user_id: user.id, recognition_count: newCount });
          setUsageCount(newCount);
        }
        setMode("confirmed"); // triggers startSync via useEffect
      };

      // ── Resync: re-listen briefly to fix timing without resetting the song ──
      const resync = async () => {
        if (isResyncing) return;
        setIsResyncing(true);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, noiseSuppression: false }
          });
          const preferredMimeR = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
                              : MediaRecorder.isTypeSupported("audio/ogg")  ? "audio/ogg"
                              : MediaRecorder.isTypeSupported("audio/mp4")  ? "audio/mp4"
                              : "";
          const recorder = preferredMimeR ? new MediaRecorder(stream, { mimeType: preferredMimeR }) : new MediaRecorder(stream);
          const rawMimeR = recorder.mimeType || preferredMimeR || "audio/webm";
          const mimeType = rawMimeR.split(";")[0].trim();
          const chunks = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => stream.getTracks().forEach(t => t.stop());
          const resyncStartTime = Date.now();
          recorder.start(200);
          await new Promise(resolve => setTimeout(resolve, 6000));
          if (recorder.state === "recording") recorder.stop();
          const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          const resyncElapsedMs = Date.now() - resyncStartTime;
          const audio = await blobToBase64(blob);
          const res = await fetch(PROXY_URL, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio, mimeType: blob.type || "audio/webm" }),
          });
          if (res.ok) {
            const data = await res.json();
            if (data.status?.code === 0 && data.metadata?.music?.length > 0) {
              const m = data.metadata.music[0];
              const totalElapsed = (Date.now() - resyncStartTime) / 1000;
              initialPosRef.current = (m.play_offset_ms || 0) / 1000 + totalElapsed;
              syncStartRef.current  = Date.now();
            }
          }
        } catch {}
        setIsResyncing(false);
      };

      const reset = () => {
        clearInterval(syncIntervalRef.current); clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        setAudioLevel(0);
        autoAdvanceFiredRef.current = false;
        autoRetryCountRef.current = 0;
        setMode("idle"); setDetectedSong(null); setIdentifiedBy(null); setSongDuration(null); setLyrics([]);
        setCurrentIndex(0); setError(null); setListenProgress(0); setPlaybackTime(0);
        setAlbumTracks([]); setCurrentTrackIndex(-1);
        setShouldAdvanceTrack(false); setIsResyncing(false); setSideEndReason("failed");
        setAlbumCollectionId(null); setVinylDbRelease(null);
        albumTpsRef.current = 0; vinylDbReleaseRef.current = null;
      };

      // ── Jump to a specific track index (vinyl mode back/forward) ──
      // Keeps the album context, resets sync state, then re-listens to
      // lock onto the right position in the new track.
      const jumpToTrack = (idx) => {
        clearInterval(syncIntervalRef.current); clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        autoAdvanceFiredRef.current = false;
        autoRetryCountRef.current = 0;
        setCurrentTrackIndex(idx);
        currentTrackIndexRef.current = idx;
        setDetectedSong(null); setIdentifiedBy(null); setSongDuration(null); setLyrics([]);
        setCurrentIndex(0); setError(null); setListenProgress(0); setPlaybackTime(0);
        setShouldAdvanceTrack(false); setIsResyncing(false);
        // Re-listen immediately so timing locks onto the right position
        setTimeout(() => startListening(false), 150);
      };

      // ─────────────────────────────────────────
      // AUTH LOADING
      // ─────────────────────────────────────────
      if (authLoading) return (
        <div style={{ minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Vinyl spinning={true} size={80} />
        </div>
      );

      // ─────────────────────────────────────────
      // LANDING + AUTH
      // ─────────────────────────────────────────
      if (!user) {
        const inp = { width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0e6d3", padding:"16px 18px", borderRadius:"14px", fontSize:"16px", fontFamily:"inherit", transition:"border-color 0.2s" };

        // authSheet: null | "signin" | "signup"
        const openSheet = (mode) => { setAuthMode(mode); setAuthError(null); setAuthEmail(""); setAuthPassword(""); setAuthSheet(mode); };

        // TODO ART: 🎵 → original sound/wave illustration, 💿 → original vinyl illustration
        // ✦ is an intentional Liri typographic mark — keep it
        const features = [
          { icon:"🎵", label:"Identify", sub:"8-second song fingerprinting" },
          { icon:"✦",  label:"Sync",     sub:"Real-time scrolling lyrics" },
          { icon:"💿", label:"Auto Mode",sub:"Tracks side flips automatically" },
        ];

        return (
          <div style={{ minHeight:"100vh", background:"#080810", color:"#f0e6d3", fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", position:"relative", overflow:"hidden" }}>

            {/* Subtle radial glow behind vinyl */}
            <div style={{ position:"fixed", top:"20%", left:"50%", transform:"translateX(-50%)", width:"400px", height:"400px", borderRadius:"50%", background:"radial-gradient(circle, rgba(212,168,70,0.07) 0%, transparent 70%)", pointerEvents:"none" }} />

            {/* ── Hero ── */}
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"max(60px,calc(env(safe-area-inset-top)+40px)) 32px max(120px,calc(env(safe-area-inset-bottom)+100px))", textAlign:"center" }}>

              <Vinyl size={130} spinning={false} />

              <div style={{ marginTop:"32px", fontSize:"11px", letterSpacing:"5px", color:"rgba(212,168,70,0.6)", textTransform:"uppercase", marginBottom:"10px" }}>Welcome to</div>
              <div style={{ fontSize:"52px", letterSpacing:"18px", color:"#d4a846", fontWeight:"300", lineHeight:1 }}>LIRI</div>
              <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.25)", letterSpacing:"3px", textTransform:"uppercase", marginTop:"10px", marginBottom:"52px" }}>Lyrics for Vinyl</div>

              {/* Feature row */}
              <div style={{ display:"flex", gap:"12px", marginBottom:"56px", flexWrap:"wrap", justifyContent:"center" }}>
                {features.map(f => (
                  <div key={f.label} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:"16px", padding:"16px 18px", minWidth:"100px", flex:"0 0 auto" }}>
                    <div style={{ fontSize:"22px", marginBottom:"6px" }}>{f.icon}</div>
                    <div style={{ fontSize:"12px", fontWeight:"600", color:"#f0e6d3", marginBottom:"3px" }}>{f.label}</div>
                    <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.25)", lineHeight:"1.4" }}>{f.sub}</div>
                  </div>
                ))}
              </div>

              {/* CTAs */}
              <div style={{ display:"flex", flexDirection:"column", gap:"12px", width:"100%", maxWidth:"320px" }}>
                <button onClick={() => openSheet("signup")} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"14px", padding:"18px", fontSize:"15px", fontWeight:"700", letterSpacing:"0.5px", cursor:"pointer", fontFamily:"inherit", boxShadow:"0 8px 32px rgba(212,168,70,0.25)" }}>
                  Get Started — it's free
                </button>
                <button onClick={() => openSheet("signin")} style={{ background:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.6)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"16px", fontSize:"14px", cursor:"pointer", fontFamily:"inherit" }}>
                  Sign In
                </button>
              </div>

            </div>

            {/* ── Auth sheet (slides up) ── */}
            {authSheet && (
              <div onClick={() => setAuthSheet(null)} style={{ position:"fixed", inset:0, zIndex:300, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(6px)" }}>
                <div onClick={e => e.stopPropagation()} style={{ position:"absolute", bottom:0, left:0, right:0, background:"#0f0f1c", borderRadius:"24px 24px 0 0", padding:"8px 28px max(40px,calc(env(safe-area-inset-bottom)+28px))", animation:"slide-up 0.3s ease", maxWidth:"520px", margin:"0 auto" }}>

                  {/* Drag handle */}
                  <div onClick={() => setAuthSheet(null)} style={{ padding:"12px 0 20px", cursor:"pointer", textAlign:"center" }}>
                    <div style={{ width:"40px", height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.12)", display:"inline-block" }} />
                  </div>

                  <h2 style={{ fontSize:"22px", fontWeight:"600", color:"#f0e6d3", textAlign:"center", marginBottom:"6px" }}>
                    {authSheet === "signin" ? "Welcome back" : "Create your account"}
                  </h2>
                  <p style={{ fontSize:"14px", color:"rgba(255,255,255,0.25)", textAlign:"center", marginBottom:"28px" }}>
                    {authSheet === "signin" ? "Sign in to continue listening" : "Free to start — no credit card"}
                  </p>

                  <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                    <input type="email" placeholder="Email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAuth()} style={inp} autoFocus />
                    <input type="password" placeholder="Password" value={authPassword} onChange={e => setAuthPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAuth()} style={inp} />
                  </div>

                  {authError && (
                    <div style={{ fontSize:"13px", color: authError.includes("Check") ? "#6aaa8a" : "#e8a0a8", textAlign:"center", margin:"14px 0 0", lineHeight:"1.6" }}>{authError}</div>
                  )}

                  <button onClick={handleAuth} disabled={authWorking} style={{ width:"100%", marginTop:"20px", background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"14px", padding:"18px", fontSize:"15px", fontWeight:"700", letterSpacing:"0.5px", cursor: authWorking ? "wait" : "pointer", opacity: authWorking ? 0.6 : 1, fontFamily:"inherit", transition:"opacity 0.2s" }}>
                    {authWorking ? "…" : authSheet === "signin" ? "Sign In" : "Create Account"}
                  </button>

                  <div style={{ textAlign:"center", marginTop:"16px" }}>
                    <button onClick={() => openSheet(authSheet === "signin" ? "signup" : "signin")} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"13px", fontFamily:"inherit" }}>
                      {authSheet === "signin" ? "New here? Create an account →" : "Already have an account? Sign in →"}
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      // ─────────────────────────────────────────
      // MAIN APP
      // ─────────────────────────────────────────
      const isSyncing = mode === "syncing";
      const artwork = detectedSong?.artwork;

      return (
