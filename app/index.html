<!--
  app/index.html — Liri Main App
  ──────────────────────────────────────────────────────────────────────────────
  The entire Liri web app lives in this single file (React 18 + Babel, no build).

  What it does:
  • Captures ~8s of audio via the device microphone and sends it to /api/recognize
  • ACRCloud identifies the song and returns the title, artist, and exact playback offset
  • Fetches timestamped LRC lyrics from lrclib.net and syncs them in real time
  • Vinyl Auto Mode: pulls the full album tracklist from iTunes, auto-advances
    through tracks, and detects side-flip points using:
      1. Liri Vinyl Database (Supabase) — most accurate, community-verified
      2. User-confirmed localStorage data — improves with use per-album
      3. Duration heuristic — fallback for unknown albums
  • TV Cast: broadcasts the current lyric line to tv.html via Supabase Realtime
  • Flip reminders: Web Audio API chime + push notification when a side ends

  Key dependencies (all loaded from CDN, no build step required):
  • React 18 + ReactDOM
  • Babel standalone (transpiles JSX in-browser)
  • Supabase JS client

  Supabase tables used:
  • user_usage       — tracks listen counts per user
  • song_history     — per-user history of identified songs
  • cast_sessions    — real-time TV cast state
  • vinyl_releases   — community vinyl pressing data
  • vinyl_tracks     — per-track side/position data for flip detection

  No environment variables needed client-side — all secrets live server-side
  in api/recognize.js (Vercel environment variables).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Liri — Lyrics for Vinyl</title>
  <link rel="preload" href="vendor/react.min.js" as="script">
  <link rel="preload" href="vendor/react-dom.min.js" as="script">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; overflow: hidden; }
    #root { min-height: 100vh; }
    input { outline: none; }
    input:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { display: none; }
    /* Press feedback — makes iOS :active states work + subtle scale/dim on tap */
    button, a, [role="button"] { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    button:active, a:active, [role="button"]:active { opacity: 0.65; transform: scale(0.97); transition: opacity 0s, transform 0s; }
  </style>
  <!-- iOS requires at least one touchstart listener for :active CSS states to fire -->
  <script>document.addEventListener('touchstart', function(){}, {passive: true});</script>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;background:#080810;display:flex;align-items:center;justify-content:center">
      <div style="width:40px;height:40px;border-radius:50%;border:2px solid #1a1a2e;border-top-color:#d4a846;animation:spin 0.8s linear infinite"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="vendor/app.js"></script>
</body>
</html>
