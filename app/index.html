<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Liri — Lyrics for Vinyl</title>
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" as="script">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" as="script">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; overflow: hidden; }
    #root { min-height: 100vh; }
    input { outline: none; }
    input:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;background:#080810;display:flex;align-items:center;justify-content:center">
      <div style="width:40px;height:40px;border-radius:50%;border:2px solid #1a1a2e;border-top-color:#d4a846;animation:spin 0.8s linear infinite"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    if (typeof supabase === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="min-height:100vh;background:#080810;display:flex;align-items:center;justify-content:center;font-family:system-ui;color:#e8a0a8;text-align:center;padding:32px">Could not load auth library.<br><small style="color:#333;margin-top:8px;display:block">Check your connection and reload</small></div>';
      throw new Error('Supabase not loaded');
    }

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    const PROXY_URL = window.Capacitor
      ? "https://liri-vert.vercel.app/api/recognize"
      : "/api/recognize";

    // How many seconds we add to ACRCloud's offset to correct for processing lag
    const PLAYBACK_OFFSET_CORRECTION = 3;

    function parseLRC(lrc) {
      const re = /\[(\d{2}):(\d{2})[.:](\d{2,3})\](.*)/;
      return lrc.split("\n").reduce((acc, line) => {
        const m = line.match(re);
        if (!m) return acc;
        const t = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3].padEnd(3,"0").slice(0,3)) / 1000;
        const text = m[4].trim();
        if (text) acc.push({ time: t, text });
        return acc;
      }, []).sort((a, b) => a.time - b.time);
    }

    function formatTime(s) {
      return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;
    }

    function timeAgo(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    const styleEl = document.createElement("style");
    styleEl.textContent = `
      @keyframes vinyl-spin { to { transform: rotate(360deg); } }
      @keyframes wave-0 { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
      @keyframes wave-1 { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
      @keyframes wave-2 { from { transform: scaleY(0.2); } to { transform: scaleY(0.9); } }
      @keyframes wave-3 { from { transform: scaleY(0.6); } to { transform: scaleY(1); } }
      @keyframes fade-up  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .safe-top { padding-top: max(56px, calc(env(safe-area-inset-top) + 16px)) !important; }
      .safe-bottom { padding-bottom: max(32px, calc(env(safe-area-inset-bottom) + 16px)) !important; }
    `;
    document.head.appendChild(styleEl);

    function Vinyl({ size = 120, spinning = false }) {
      return (
        <div style={{ width:size, height:size, margin:"0 auto", animation: spinning ? "vinyl-spin 2s linear infinite" : "none", flexShrink:0 }}>
          <svg viewBox="0 0 100 100" style={{ width:"100%", height:"100%" }}>
            <defs>
              <radialGradient id="vg2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#1e1828" />
                <stop offset="70%" stopColor="#0a0812" />
                <stop offset="100%" stopColor="#050508" />
              </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="49" fill="url(#vg2)" />
            {[46,42,38,34,30,26,22].map((r,i) => (
              <circle key={i} cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="0.8" />
            ))}
            <circle cx="50" cy="50" r="10" fill="#d4a846" opacity="0.85" />
            <circle cx="50" cy="50" r="3.5" fill="#080810" />
          </svg>
        </div>
      );
    }

    function WaveAnimation({ active, size = 1 }) {
      return (
        <div style={{ display:"flex", gap:`${4*size}px`, alignItems:"center", height:`${52*size}px`, justifyContent:"center" }}>
          {[20,34,48,40,28,44,32,48,36,24,40,30].map((h, i) => (
            <div key={i} style={{
              width:`${3*size}px`, borderRadius:"2px",
              background:"linear-gradient(to top, #d4a846, #e8a0a8)",
              height: active ? `${h*size}px` : `${3*size}px`,
              animation: active ? `wave-${i%4} ${0.5+i*0.07}s ease-in-out infinite alternate` : "none",
              transition:"height 0.3s ease",
              opacity: active ? 1 : 0.3,
            }} />
          ))}
        </div>
      );
    }

    function ProgressRing({ progress, size = 96 }) {
      const r = size/2 - 5, circ = 2 * Math.PI * r;
      return (
        <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3" />
          <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth="3" strokeLinecap="round"
            stroke="url(#pg2)" strokeDasharray={`${circ*progress} ${circ}`}
            style={{ transition:"stroke-dasharray 0.1s linear" }} />
          <defs>
            <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#d4a846" /><stop offset="100%" stopColor="#e8a0a8" />
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function Liri() {
      // ── Core state ──
      const [mode, setMode]                   = useState("idle");
      const [detectedSong, setDetectedSong]   = useState(null);
      const [songDuration, setSongDuration]   = useState(null); // seconds
      const [lyrics, setLyrics]               = useState([]);
      const [currentIndex, setCurrentIndex]   = useState(0);
      const [playbackTime, setPlaybackTime]   = useState(0);
      const [error, setError]                 = useState(null);
      const [listenProgress, setListenProgress] = useState(0);

      // ── UI panels ──
      const [showSettings, setShowSettings]   = useState(false);
      const [showHistory, setShowHistory]     = useState(false);

      // ── Auth ──
      const [user, setUser]                   = useState(null);
      const [authLoading, setAuthLoading]     = useState(true);
      const [authMode, setAuthMode]           = useState("signin");
      const [authEmail, setAuthEmail]         = useState("");
      const [authPassword, setAuthPassword]   = useState("");
      const [authError, setAuthError]         = useState(null);
      const [authWorking, setAuthWorking]     = useState(false);

      // ── Usage ──
      const [usageCount, setUsageCount]       = useState(0);
      const FREE_LIMIT = 10;
      const isUnlimited = (u) => u?.email === "test@test.com";

      // ── History ──
      const [history, setHistory]             = useState([]);
      const [historyLoading, setHistoryLoading] = useState(false);

      // ── Vinyl auto mode ──
      const [vinylMode, setVinylMode]         = useState(() => localStorage.getItem("liri_vinyl_mode") === "true");
      const autoAdvanceFiredRef               = useRef(false); // prevents double-firing
      const autoRetryCountRef                 = useRef(0);     // tracks failed auto-listens

      // ── Refs ──
      const streamRef        = useRef(null);
      const syncIntervalRef  = useRef(null);
      const syncStartRef     = useRef(null);
      const detectedAtRef    = useRef(null);
      const initialPosRef    = useRef(0);
      const lyricsRef        = useRef([]);
      const progressTimerRef = useRef(null);
      const currentLineRef   = useRef(null);

      useEffect(() => { lyricsRef.current = lyrics; }, [lyrics]);

      // ── Vinyl mode persistence ──
      const toggleVinylMode = (val) => {
        setVinylMode(val);
        localStorage.setItem("liri_vinyl_mode", String(val));
      };

      // ── Usage fetch ──
      const fetchUsage = async (u) => {
        if (!u || isUnlimited(u)) return;
        const { data } = await sb.from("user_usage").select("recognition_count").eq("user_id", u.id).single();
        if (data) setUsageCount(data.recognition_count);
        else { await sb.from("user_usage").insert({ user_id: u.id, recognition_count: 0 }); setUsageCount(0); }
      };

      // ── History fetch ──
      const fetchHistory = async (u) => {
        if (!u) return;
        setHistoryLoading(true);
        const { data } = await sb.from("song_history")
          .select("*").eq("user_id", u.id)
          .order("listened_at", { ascending: false }).limit(50);
        setHistory(data || []);
        setHistoryLoading(false);
      };

      // ── Save song to history ──
      const saveToHistory = async (u, song) => {
        if (!u) return;
        await sb.from("song_history").insert({
          user_id: u.id,
          title: song.title,
          artist: song.artist,
          album: song.album || null,
          artwork_url: song.artwork || null,
        });
      };

      // ── Auth setup ──
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          const u = session?.user || null;
          setUser(u); setAuthLoading(false);
          if (u) { fetchUsage(u); fetchHistory(u); }
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => {
          const u = s?.user || null;
          setUser(u);
          if (u) { fetchUsage(u); fetchHistory(u); }
        });
        return () => subscription.unsubscribe();
      }, []);

      const handleAuth = async () => {
        setAuthError(null); setAuthWorking(true);
        try {
          if (authMode === "signup") {
            const { error } = await sb.auth.signUp({ email: authEmail, password: authPassword });
            if (error) throw error;
            setAuthError("Check your email to confirm your account, then sign in.");
            setAuthMode("signin");
          } else {
            const { error } = await sb.auth.signInWithPassword({ email: authEmail, password: authPassword });
            if (error) throw error;
          }
        } catch (e) { setAuthError(e.message); }
        finally { setAuthWorking(false); }
      };

      const handleSignOut = async () => { await sb.auth.signOut(); setShowSettings(false); reset(); };

      // ── Auto-start sync after detection ──
      useEffect(() => { if (mode === "confirmed" && detectedSong) startSync(); }, [mode, detectedSong]);

      // ── Scroll to current lyric ──
      useEffect(() => {
        if (currentLineRef.current && mode === "syncing")
          currentLineRef.current.scrollIntoView({ behavior:"smooth", block:"center" });
      }, [currentIndex, mode]);

      // ── Vinyl auto-advance: trigger when song nears its end ──
      useEffect(() => {
        if (!vinylMode || mode !== "syncing" || !songDuration) return;
        // Fire when we're within 2s of the song end
        if (playbackTime >= songDuration - 2 && !autoAdvanceFiredRef.current) {
          autoAdvanceFiredRef.current = true;
          // Short pause then auto-listen for next track
          setTimeout(() => startListening(true), 3000);
        }
      }, [playbackTime, songDuration, vinylMode, mode]);

      // ── Cleanup on unmount ──
      useEffect(() => () => {
        clearInterval(syncIntervalRef.current);
        clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
      }, []);

      // ── Record audio and detect ──
      const startListening = async (isAutoAdvance = false) => {
        if (!isAutoAdvance && !isUnlimited(user) && usageCount >= FREE_LIMIT) { setMode("limit"); return; }
        setError(null);
        setMode("listening");
        setListenProgress(0);
        clearInterval(syncIntervalRef.current); // stop any active sync

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamRef.current = stream;
          const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
                         : MediaRecorder.isTypeSupported("audio/ogg")  ? "audio/ogg" : "";
          const recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          const chunks = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => stream.getTracks().forEach(t => t.stop());
          recorder.start(200);

          let elapsed = 0;
          const flags = { done: false };
          progressTimerRef.current = setInterval(() => {
            elapsed += 100;
            setListenProgress(Math.min(elapsed / 8000, 1));
            if (elapsed >= 8000 && !flags.done) {
              flags.done = true;
              clearInterval(progressTimerRef.current);
              if (recorder.state === "recording") recorder.stop();
              detectSong(new Blob(chunks, { type: recorder.mimeType || "audio/webm" }), isAutoAdvance);
            }
          }, 100);
        } catch { setError("Microphone access denied."); setMode("error"); }
      };

      // ── Send audio to ACRCloud ──
      const detectSong = async (blob, isAutoAdvance = false) => {
        setMode("detecting");
        try {
          const uint8 = new Uint8Array(await blob.arrayBuffer());
          let binary = "";
          for (let i = 0; i < uint8.length; i += 8192)
            binary += String.fromCharCode(...uint8.subarray(i, i + 8192));

          const res = await fetch(PROXY_URL, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ audio: btoa(binary), mimeType: blob.type || "audio/webm" }),
          });
          if (!res.ok) {
            let msg = `HTTP ${res.status}`;
            try { const e = await res.json(); msg += e.message ? `: ${e.message}` : e.error ? `: ${e.error}` : ""; } catch {}
            throw new Error(msg);
          }
          const data = await res.json();

          if (data.status?.code === 0 && data.metadata?.music?.length > 0) {
            const m = data.metadata.music[0];
            // Apply +2s correction for processing lag
            const tcSecs = (m.play_offset_ms || 0) / 1000 + PLAYBACK_OFFSET_CORRECTION;
            const duration = m.duration_ms ? m.duration_ms / 1000 : null;

            detectedAtRef.current = Date.now();
            initialPosRef.current = tcSecs;
            autoAdvanceFiredRef.current = false; // reset for next song
            autoRetryCountRef.current = 0;

            const spotifyArt = m.external_metadata?.spotify?.album?.images?.[0]?.url || null;
            const title  = m.title;
            const artist = m.artists?.[0]?.name || "Unknown Artist";

            let artwork = spotifyArt;
            if (!artwork) {
              try {
                const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`).then(r => r.json());
                artwork = itunes.results?.[0]?.artworkUrl100?.replace("100x100bb", "600x600bb") || null;
              } catch {}
            }

            const song = { title, artist, album: m.album?.name || "", artwork };
            setDetectedSong(song);
            setSongDuration(duration);
            await loadLyrics(title, artist);

            // Save to history + increment usage
            saveToHistory(user, song);
            fetchHistory(user); // refresh history list
            if (!isUnlimited(user)) {
              const newCount = usageCount + 1;
              await sb.from("user_usage").upsert({ user_id: user.id, recognition_count: newCount });
              setUsageCount(newCount);
            }

            setMode("confirmed");
            return true;
          }

          if (data.status?.code === 3003 || data.status?.code === 3015) {
            setError("Recognition limit reached. Visit acrcloud.com."); setMode("error"); return false;
          }

          // No match
          if (isAutoAdvance) {
            autoRetryCountRef.current += 1;
            if (autoRetryCountRef.current < 2) {
              // One retry after a short pause (might be mid-gap between tracks)
              setTimeout(() => startListening(true), 4000);
            } else {
              // Two failures = probably end of side
              autoRetryCountRef.current = 0;
              setMode("side-end");
            }
            return false;
          }

          setError("Couldn't identify the song. Make sure your record is playing clearly and try again.");
          setMode("error");
          return false;
        } catch (err) {
          if (isAutoAdvance) {
            autoRetryCountRef.current += 1;
            if (autoRetryCountRef.current < 2) {
              setTimeout(() => startListening(true), 4000);
            } else {
              autoRetryCountRef.current = 0;
              setMode("side-end");
            }
            return false;
          }
          setError(`Connection failed: ${err.message}`); setMode("error"); return false;
        }
      };

      const loadLyrics = async (title, artist) => {
        try {
          const [a, b] = await Promise.all([
            fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`).then(r => r.json()),
            fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`).then(r => r.json()),
          ]);
          const synced = [...a, ...b].find(x => x.syncedLyrics);
          if (synced) { setLyrics(parseLRC(synced.syncedLyrics)); return; }
          const plain = [...a, ...b].find(x => x.plainLyrics);
          if (plain) setLyrics(plain.plainLyrics.split("\n").filter(l => l.trim()).map((text, i) => ({ time: i * 4, text })));
          else setLyrics([]);
        } catch { setLyrics([]); }
      };

      const startSync = useCallback(() => {
        const delay = detectedAtRef.current ? (Date.now() - detectedAtRef.current) / 1000 : 0;
        initialPosRef.current += delay;
        syncStartRef.current = Date.now();
        setMode("syncing"); setCurrentIndex(0);
        clearInterval(syncIntervalRef.current);
        syncIntervalRef.current = setInterval(() => {
          const t = initialPosRef.current + (Date.now() - syncStartRef.current) / 1000;
          setPlaybackTime(t);
          const lrc = lyricsRef.current;
          if (!lrc.length) return;
          let idx = 0;
          for (let i = 0; i < lrc.length; i++) { if (lrc[i].time <= t) idx = i; else break; }
          setCurrentIndex(idx);
        }, 80);
      }, []);

      const nudge = (s) => { initialPosRef.current = Math.max(0, initialPosRef.current + s); };

      const reset = () => {
        clearInterval(syncIntervalRef.current); clearInterval(progressTimerRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        autoAdvanceFiredRef.current = false;
        autoRetryCountRef.current = 0;
        setMode("idle"); setDetectedSong(null); setSongDuration(null); setLyrics([]);
        setCurrentIndex(0); setError(null); setListenProgress(0); setPlaybackTime(0);
      };

      // ─────────────────────────────────────────
      // AUTH LOADING
      // ─────────────────────────────────────────
      if (authLoading) return (
        <div style={{ minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Vinyl spinning={true} size={80} />
        </div>
      );

      // ─────────────────────────────────────────
      // AUTH SCREEN
      // ─────────────────────────────────────────
      if (!user) {
        const inp = { width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0e6d3", padding:"16px 18px", borderRadius:"14px", fontSize:"16px", fontFamily:"inherit", transition:"border-color 0.2s" };
        return (
          <div style={{ minHeight:"100vh", background:"#080810", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 28px" }}>
            <Vinyl size={72} spinning={false} />
            <div style={{ marginTop:"20px", fontSize:"28px", letterSpacing:"14px", color:"#d4a846", fontWeight:"300" }}>LIRI</div>
            <div style={{ fontSize:"11px", color:"#2a2a4a", letterSpacing:"4px", textTransform:"uppercase", marginTop:"6px", marginBottom:"52px" }}>Lyrics for Vinyl</div>
            <div style={{ width:"100%", maxWidth:"360px", animation:"fade-up 0.4s ease both" }}>
              <h2 style={{ fontSize:"22px", fontWeight:"500", color:"#f0e6d3", textAlign:"center", marginBottom:"8px" }}>
                {authMode === "signin" ? "Welcome back" : "Create your account"}
              </h2>
              <p style={{ fontSize:"14px", color:"#3a3a5a", textAlign:"center", marginBottom:"32px" }}>
                {authMode === "signin" ? "Sign in to continue" : "It's free to start"}
              </p>
              <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                <input type="email" placeholder="Email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAuth()} style={inp} />
                <input type="password" placeholder="Password" value={authPassword} onChange={e => setAuthPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAuth()} style={inp} />
              </div>
              {authError && (
                <div style={{ fontSize:"13px", color: authError.includes("Check") ? "#6aaa8a" : "#e8a0a8", textAlign:"center", margin:"16px 0", lineHeight:"1.6" }}>{authError}</div>
              )}
              <button onClick={handleAuth} disabled={authWorking} style={{ width:"100%", marginTop:"20px", background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"14px", padding:"18px", fontSize:"15px", fontWeight:"700", letterSpacing:"1px", cursor: authWorking ? "wait" : "pointer", opacity: authWorking ? 0.6 : 1, fontFamily:"inherit", transition:"opacity 0.2s" }}>
                {authWorking ? "…" : authMode === "signin" ? "Sign In" : "Create Account"}
              </button>
              <div style={{ textAlign:"center", marginTop:"20px" }}>
                <button onClick={() => { setAuthMode(m => m === "signin" ? "signup" : "signin"); setAuthError(null); }} style={{ background:"none", border:"none", color:"#3a3a5a", cursor:"pointer", fontSize:"14px", fontFamily:"inherit" }}>
                  {authMode === "signin" ? "New here? Create an account →" : "Already have an account? Sign in →"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────
      // MAIN APP
      // ─────────────────────────────────────────
      const isSyncing = mode === "syncing";
      const artwork = detectedSong?.artwork;

      return (
        <div style={{ minHeight:"100vh", background:"#080810", color:"#f0e6d3", fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", position:"relative", overflow:"hidden" }}>

          {/* Blurred album art backdrop */}
          {artwork && (
            <div style={{ position:"fixed", inset:"-20px", zIndex:0, backgroundImage:`url(${artwork})`, backgroundSize:"cover", backgroundPosition:"center", filter:"blur(80px) brightness(0.15) saturate(2)", transition:"opacity 1s ease", opacity: isSyncing ? 1 : 0.4 }} />
          )}
          <div style={{ position:"fixed", inset:0, zIndex:1, background:"linear-gradient(to bottom, rgba(8,8,16,0.6) 0%, rgba(8,8,16,0.3) 40%, rgba(8,8,16,0.7) 100%)", pointerEvents:"none" }} />

          {/* ── SETTINGS PANEL ── */}
          {showSettings && (
            <div onClick={() => setShowSettings(false)} style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(4px)" }}>
              <div onClick={e => e.stopPropagation()} style={{ position:"absolute", bottom:0, left:0, right:0, background:"#0f0f1c", borderRadius:"24px 24px 0 0", padding:"12px 24px max(32px, calc(env(safe-area-inset-bottom) + 24px))", boxShadow:"0 -8px 48px rgba(0,0,0,0.6)", animation:"slide-up 0.3s ease" }}>
                <div style={{ width:"40px", height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.12)", margin:"0 auto 28px" }} />

                {/* Avatar + email */}
                <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"28px" }}>
                  <div style={{ width:"48px", height:"48px", borderRadius:"50%", background:"linear-gradient(135deg, #d4a846, #c9807a)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px", fontWeight:"700", color:"#080810", flexShrink:0 }}>
                    {user?.email?.[0]?.toUpperCase() || "?"}
                  </div>
                  <div>
                    <div style={{ fontSize:"15px", fontWeight:"600", color:"#f0e6d3" }}>{user?.email}</div>
                    <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)", marginTop:"2px" }}>
                      {isUnlimited(user) ? "✦ Unlimited access" : `${usageCount} of ${FREE_LIMIT} free songs used`}
                    </div>
                  </div>
                </div>

                {/* Usage bar */}
                {!isUnlimited(user) && (
                  <div style={{ marginBottom:"24px" }}>
                    <div style={{ height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.07)", overflow:"hidden" }}>
                      <div style={{ height:"100%", borderRadius:"2px", background:"linear-gradient(to right, #d4a846, #c9807a)", width:`${Math.min(usageCount / FREE_LIMIT * 100, 100)}%`, transition:"width 0.4s ease" }} />
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:"6px", fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>
                      <span>{FREE_LIMIT - usageCount} remaining</span><span>{FREE_LIMIT} free</span>
                    </div>
                  </div>
                )}

                {/* Vinyl Auto Mode toggle */}
                <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:"16px", padding:"16px 18px", marginBottom:"16px" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"8px" }}>
                    <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3" }}>Vinyl Auto Mode</div>
                    {/* Toggle switch */}
                    <div onClick={() => toggleVinylMode(!vinylMode)} style={{ width:"44px", height:"26px", borderRadius:"13px", background: vinylMode ? "linear-gradient(135deg, #d4a846, #c9807a)" : "rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background 0.2s", flexShrink:0 }}>
                      <div style={{ position:"absolute", top:"3px", left: vinylMode ? "21px" : "3px", width:"20px", height:"20px", borderRadius:"50%", background:"white", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
                    </div>
                  </div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)", lineHeight:"1.6" }}>
                    Auto-advance between tracks on a record. Listens at song end to detect the next one. Stops after two failed detections (end of side).
                  </div>
                </div>

                {/* Pro section */}
                <div style={{ background:"rgba(212,168,70,0.07)", border:"1px solid rgba(212,168,70,0.15)", borderRadius:"16px", padding:"16px 18px", marginBottom:"20px" }}>
                  <div style={{ fontSize:"13px", fontWeight:"600", color:"#d4a846", marginBottom:"4px" }}>Liri Pro — Coming Soon</div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.35)", lineHeight:"1.6" }}>Unlimited songs, offline mode, and more.</div>
                  <div style={{ fontSize:"12px", color:"#d4a846", marginTop:"8px" }}>hello@getliri.com</div>
                </div>

                <button onClick={handleSignOut} style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.4)", borderRadius:"14px", padding:"14px", fontSize:"14px", cursor:"pointer", fontFamily:"inherit" }}>Sign Out</button>
                <div style={{ textAlign:"center", marginTop:"16px", fontSize:"11px", color:"rgba(255,255,255,0.1)" }}>Liri v0.4 · getliri.com</div>
              </div>
            </div>
          )}

          {/* ── HISTORY PANEL ── */}
          {showHistory && (
            <div onClick={() => setShowHistory(false)} style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(4px)" }}>
              <div onClick={e => e.stopPropagation()} style={{ position:"absolute", bottom:0, left:0, right:0, background:"#0f0f1c", borderRadius:"24px 24px 0 0", maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 -8px 48px rgba(0,0,0,0.6)", animation:"slide-up 0.3s ease" }}>
                <div style={{ padding:"12px 24px 0", flexShrink:0 }}>
                  <div style={{ width:"40px", height:"4px", borderRadius:"2px", background:"rgba(255,255,255,0.12)", margin:"0 auto 20px" }} />
                  <div style={{ fontSize:"11px", letterSpacing:"3px", color:"#d4a846", textTransform:"uppercase", marginBottom:"16px" }}>Recently Played</div>
                </div>
                <div style={{ overflowY:"auto", flex:1, padding:"0 24px max(24px, calc(env(safe-area-inset-bottom) + 16px))" }}>
                  {historyLoading ? (
                    <div style={{ textAlign:"center", color:"rgba(255,255,255,0.2)", padding:"32px 0" }}>Loading…</div>
                  ) : history.length === 0 ? (
                    <div style={{ textAlign:"center", color:"rgba(255,255,255,0.2)", padding:"32px 0", lineHeight:"1.8" }}>
                      No songs yet.<br/>Start listening to build your history.
                    </div>
                  ) : history.map((item, i) => (
                    <div key={item.id} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 0", borderBottom: i < history.length-1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                      {item.artwork_url
                        ? <img src={item.artwork_url} alt="" style={{ width:"44px", height:"44px", borderRadius:"8px", flexShrink:0, objectFit:"cover" }} />
                        : <div style={{ width:"44px", height:"44px", borderRadius:"8px", background:"rgba(255,255,255,0.06)", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px" }}>♪</div>
                      }
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.title}</div>
                        <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.artist}</div>
                      </div>
                      <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", flexShrink:0 }}>{timeAgo(item.listened_at)}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── SYNCING SCREEN ── */}
          {isSyncing && (
            <div style={{ position:"fixed", inset:0, zIndex:10, display:"flex", flexDirection:"column" }}>
              <div className="safe-top" style={{ padding:"0 20px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", flex:1, minWidth:0 }}>
                  {artwork && <img src={artwork} alt="" style={{ width:"36px", height:"36px", borderRadius:"8px", flexShrink:0, boxShadow:"0 4px 16px rgba(0,0,0,0.5)" }} />}
                  <div style={{ minWidth:0 }}>
                    <div style={{ fontSize:"14px", fontWeight:"600", color:"#f0e6d3", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{detectedSong?.title}</div>
                    <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{detectedSong?.artist}</div>
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"12px", marginLeft:"12px", flexShrink:0 }}>
                  {songDuration && (
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)" }}>
                      {formatTime(playbackTime)} / {formatTime(songDuration)}
                    </div>
                  )}
                  {!songDuration && <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)", fontVariantNumeric:"tabular-nums" }}>{formatTime(playbackTime)}</div>}
                  <button onClick={() => setShowSettings(!showSettings)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"16px", padding:"4px" }}>⚙</button>
                </div>
              </div>

              {/* Song end progress bar (vinyl mode) */}
              {vinylMode && songDuration && (
                <div style={{ height:"2px", background:"rgba(255,255,255,0.05)", flexShrink:0, margin:"0 20px" }}>
                  <div style={{ height:"100%", background:"linear-gradient(to right, #d4a846, #c9807a)", width:`${Math.min(playbackTime/songDuration*100,100)}%`, transition:"width 0.5s linear" }} />
                </div>
              )}

              <div style={{ flex:1, overflow:"hidden", position:"relative" }}>
                <div style={{ overflowY:"auto", height:"100%", padding:"8vh 28px 0" }}>
                  {lyrics.length > 0 ? lyrics.map((line, i) => {
                    const dist = i - currentIndex;
                    if (dist < -5 || dist > 8) return null;
                    const cur = dist === 0;
                    const upcoming = dist > 0;
                    return (
                      <div key={i} ref={cur ? currentLineRef : null} style={{
                        textAlign:"center", padding:"6px 0",
                        fontSize: cur ? "32px" : Math.abs(dist) <= 1 ? "20px" : "16px",
                        fontWeight: cur ? "700" : "400",
                        color: cur ? "#ffffff" : upcoming ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.15)",
                        lineHeight:"1.4",
                        transition:"all 0.4s cubic-bezier(0.4,0,0.2,1)",
                        textShadow: cur ? "0 0 60px rgba(212,168,70,0.4), 0 2px 20px rgba(0,0,0,0.8)" : "none",
                      }}>
                        {line.text}
                      </div>
                    );
                  }) : (
                    <div style={{ textAlign:"center", color:"rgba(255,255,255,0.2)", fontSize:"16px", paddingTop:"30vh" }}>No lyrics found for this track</div>
                  )}
                </div>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:"15vh", background:"linear-gradient(to bottom, rgba(8,8,16,0.9), transparent)", pointerEvents:"none" }} />
                <div style={{ position:"absolute", bottom:0, left:0, right:0, height:"20vh", background:"linear-gradient(to top, rgba(8,8,16,1), transparent)", pointerEvents:"none" }} />
              </div>

              <div className="safe-bottom" style={{ padding:"12px 20px 0", flexShrink:0 }}>
                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:"8px", marginBottom:"12px" }}>
                  {[["−5s",-5],["−2s",-2],["−1s",-1]].map(([label,s]) => (
                    <button key={label} onClick={() => nudge(s)} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.5)", padding:"8px 14px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontFamily:"inherit" }}>{label}</button>
                  ))}
                  <button onClick={reset} style={{ background:"rgba(212,168,70,0.12)", border:"1px solid rgba(212,168,70,0.3)", color:"#d4a846", padding:"8px 20px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontFamily:"inherit", fontWeight:"600" }}>Stop</button>
                  {[["1s+",1],["2s+",2],["5s+",5]].map(([label,s]) => (
                    <button key={label} onClick={() => nudge(s)} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.5)", padding:"8px 14px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontFamily:"inherit" }}>{label}</button>
                  ))}
                </div>
                <div style={{ textAlign:"center" }}>
                  <button onClick={reset} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:"12px", fontFamily:"inherit" }}>Wrong song? Try again</button>
                </div>
              </div>
            </div>
          )}

          {/* ── NON-SYNCING SCREENS ── */}
          {!isSyncing && (
            <div style={{ position:"relative", zIndex:10, minHeight:"100vh", display:"flex", flexDirection:"column" }}>

              {/* Top bar */}
              <div className="safe-top" style={{ padding:"0 20px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
                <div style={{ fontSize:"16px", letterSpacing:"10px", color:"#d4a846", fontWeight:"300" }}>LIRI</div>
                <div style={{ display:"flex", gap:"16px", alignItems:"center" }}>
                  <button onClick={() => { fetchHistory(user); setShowHistory(true); }} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"18px", padding:"2px" }}>⏱</button>
                  <button onClick={() => setShowSettings(true)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"16px" }}>⚙</button>
                </div>
              </div>

              <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 32px", textAlign:"center" }}>

                {/* IDLE */}
                {mode === "idle" && (
                  <div style={{ animation:"fade-up 0.5s ease both" }}>
                    <Vinyl size={140} spinning={false} />
                    <div style={{ marginTop:"36px", fontSize:"13px", color:"rgba(255,255,255,0.25)", letterSpacing:"3px", textTransform:"uppercase", marginBottom:"16px" }}>Ready to listen</div>
                    <p style={{ fontSize:"15px", color:"rgba(255,255,255,0.35)", maxWidth:"240px", margin:"0 auto 40px", lineHeight:"1.7" }}>Put on a record and hold your phone near the speakers</p>
                    <button onClick={() => startListening(false)} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"18px 52px", fontSize:"15px", fontWeight:"700", letterSpacing:"1px", cursor:"pointer", fontFamily:"inherit", boxShadow:"0 8px 32px rgba(212,168,70,0.3)" }}>
                      Listen
                    </button>
                    {vinylMode && (
                      <div style={{ marginTop:"16px", fontSize:"12px", color:"rgba(212,168,70,0.5)", letterSpacing:"1px" }}>✦ Vinyl Auto Mode on</div>
                    )}
                    {!isUnlimited(user) && (
                      <div style={{ marginTop:"12px", fontSize:"12px", color:"rgba(255,255,255,0.2)" }}>
                        {FREE_LIMIT - usageCount} free {FREE_LIMIT - usageCount === 1 ? "song" : "songs"} remaining
                      </div>
                    )}
                  </div>
                )}

                {/* LISTENING */}
                {mode === "listening" && (
                  <div style={{ animation:"fade-up 0.3s ease both" }}>
                    <div style={{ position:"relative", width:"120px", height:"120px", margin:"0 auto 32px" }}>
                      <div style={{ position:"absolute", inset:0 }}><ProgressRing progress={listenProgress} size={120} /></div>
                      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}><WaveAnimation active={true} /></div>
                    </div>
                    <div style={{ fontSize:"22px", fontWeight:"600", color:"#f0e6d3", marginBottom:"10px" }}>Listening…</div>
                    <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.3)" }}>Hold near your speakers</div>
                  </div>
                )}

                {/* DETECTING */}
                {mode === "detecting" && (
                  <div style={{ animation:"fade-up 0.3s ease both" }}>
                    <Vinyl size={100} spinning={true} />
                    <div style={{ marginTop:"28px", fontSize:"20px", fontWeight:"600", color:"#f0e6d3", marginBottom:"8px" }}>Identifying…</div>
                    <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.3)" }}>Just a moment</div>
                  </div>
                )}

                {/* ERROR */}
                {mode === "error" && (
                  <div style={{ maxWidth:"300px", animation:"fade-up 0.3s ease both" }}>
                    <div style={{ fontSize:"48px", marginBottom:"24px" }}>🎵</div>
                    <div style={{ color:"#e8a0a8", marginBottom:"32px", lineHeight:"1.7", fontSize:"16px" }}>{error}</div>
                    <button onClick={reset} style={{ background:"none", border:"1px solid rgba(212,168,70,0.4)", color:"#d4a846", borderRadius:"50px", padding:"12px 32px", fontSize:"14px", cursor:"pointer", fontFamily:"inherit" }}>Try Again</button>
                  </div>
                )}

                {/* SIDE END — shown when vinyl auto mode can't find next track */}
                {mode === "side-end" && (
                  <div style={{ maxWidth:"300px", animation:"fade-up 0.3s ease both", textAlign:"center" }}>
                    <Vinyl size={100} spinning={false} />
                    <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>End of side?</div>
                    <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                      Couldn't detect another track.<br/>Flip your record and tap Listen to continue.
                    </div>
                    <button onClick={reset} style={{ background:"linear-gradient(135deg, #d4a846, #c9807a)", color:"#080810", border:"none", borderRadius:"50px", padding:"14px 36px", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit" }}>Start Side B</button>
                  </div>
                )}

                {/* LIMIT */}
                {mode === "limit" && (
                  <div style={{ maxWidth:"300px", animation:"fade-up 0.3s ease both", textAlign:"center" }}>
                    <Vinyl size={100} spinning={false} />
                    <div style={{ marginTop:"32px", fontSize:"22px", fontWeight:"700", color:"#f0e6d3", marginBottom:"12px" }}>You've played 10 records</div>
                    <div style={{ color:"rgba(255,255,255,0.4)", marginBottom:"36px", lineHeight:"1.8", fontSize:"15px" }}>
                      Your 10 free songs are up.<br/>Liri Pro is coming soon — stay tuned.
                    </div>
                    <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.2)", marginBottom:"24px" }}>
                      Want early access?<br/><span style={{ color:"#d4a846" }}>hello@getliri.com</span>
                    </div>
                    <button onClick={() => setMode("idle")} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.3)", borderRadius:"50px", padding:"10px 28px", fontSize:"13px", cursor:"pointer", fontFamily:"inherit" }}>Back</button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Liri />);
  </script>
</body>
</html>
