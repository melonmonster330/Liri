<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Records — Liri</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    #root { min-height: 100vh; max-width: 100vw; overflow-x: hidden; }
    input { outline: none; }
    input:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { display: none; }
    button, a, [role="button"] { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    button:active, a:active, [role="button"]:active { opacity: 0.65; transform: scale(0.97); transition: opacity 0s, transform 0s; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>

<body>
  <div id="root"></div>

  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="vendor/liri-auth-storage.js"></script>
  <script src="vendor/tabbar.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const APP_VERSION = "1.5.14";

    // On iOS Capacitor relative URLs don't resolve — route all API calls through the live domain.
    const API_BASE = window.Capacitor ? "https://www.getliri.com" : "";

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd",
      { auth: { storage: window.liriAuthStorage } }
    );

    // ── Shared styles ──────────────────────────────────────────────────────
    const inp = {
      width: "100%", background: "rgba(255,255,255,0.05)",
      border: "1px solid rgba(255,255,255,0.1)", color: "#f0e6d3",
      padding: "14px 16px", borderRadius: "12px", fontSize: "15px",
      fontFamily: "inherit", transition: "border-color 0.2s",
    };

    // ── Helpers ────────────────────────────────────────────────────────────

    function parseLRC(lrc) {
      if (!lrc) return [];
      const lines = [];
      for (const line of lrc.split("\n")) {
        const m = line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
        if (m) {
          const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
          const text = m[3].trim();
          if (text) lines.push({ time, text });
        }
      }
      return lines;
    }

    function formatDuration(ms) {
      const s = Math.round(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function deriveSideFromIndex(idx, tracks) {
      if (tracks.length === 0 || idx < 0) return { side: "A", track: idx + 1 };
      // Matches app.js getSideEndIndices: split by cumulative duration targeting 20-min sides
      if (tracks.length <= 4) return { side: "A", track: idx + 1 }; // short releases are single-sided
      const totalMs = tracks.reduce((s, t) => s + (t.trackTimeMillis || 0), 0);
      const SIDE_MS = 20 * 60 * 1000;
      const numSides = totalMs > 0 ? Math.max(2, Math.round(totalMs / SIDE_MS)) : 2;
      const sideEnds = [];
      if (totalMs > 0) {
        const targetMs = totalMs / numSides;
        let cumMs = 0;
        for (let i = 0; i < tracks.length - 1; i++) {
          cumMs += tracks[i].trackTimeMillis || 0;
          if (sideEnds.length < numSides - 1 && cumMs >= targetMs * (sideEnds.length + 1)) sideEnds.push(i);
        }
      } else {
        // No duration data — split evenly by track count
        const perSide = Math.ceil(tracks.length / numSides);
        for (let i = perSide - 1; i < tracks.length - 1; i += perSide) sideEnds.push(i);
      }
      sideEnds.push(tracks.length - 1);
      for (let s = 0; s < sideEnds.length; s++) {
        if (idx <= sideEnds[s]) {
          const prevEnd = s === 0 ? -1 : sideEnds[s - 1];
          return { side: String.fromCharCode(65 + s), track: idx - prevEnd };
        }
      }
      return { side: "A", track: idx + 1 };
    }

    // Parse "4:32" duration string → milliseconds (null if unparseable)
    function durationToMs(dur) {
      if (!dur) return null;
      const m = dur.match(/^(\d+):(\d+)$/);
      return m ? (parseInt(m[1]) * 60 + parseInt(m[2])) * 1000 : null;
    }

    // Parse Discogs tracklist into side/track data.
    function parseDiscogsTracklist(tracklist) {
      const results = [];
      let currentSide = null;
      const sideTrackCount = {};

      for (const entry of tracklist) {
        if (entry.type_ === "heading") {
          const title = (entry.title || "").trim();
          const numMatch = title.match(/(\d+)/);
          const letterMatch = title.match(/\b([A-Za-z])\b/);
          if (numMatch) {
            currentSide = String.fromCharCode(64 + parseInt(numMatch[1])); // 1→A, 2→B …
          } else if (letterMatch) {
            currentSide = letterMatch[1].toUpperCase();
          }
          continue;
        }

        const pos = (entry.position || "").trim();

        // Letter + number (A1, B12, AA1 — use first letter only)
        const letterNum = pos.match(/^([A-Za-z])(\d+)$/);
        if (letterNum) {
          results.push({
            side: letterNum[1].toUpperCase(),
            trackOnSide: parseInt(letterNum[2]),
            title: entry.title,
            duration_ms: durationToMs(entry.duration),
            position: pos.toUpperCase(),
          });
          continue;
        }

        // Pure number (works with heading context, or standalone)
        const numOnly = pos.match(/^(\d+)$/);
        if (numOnly && currentSide) {
          sideTrackCount[currentSide] = (sideTrackCount[currentSide] || 0) + 1;
          results.push({
            side: currentSide,
            trackOnSide: sideTrackCount[currentSide],
            title: entry.title,
            duration_ms: durationToMs(entry.duration),
            position: pos,
          });
          continue;
        }
        // anything else (intros, medleys without position, etc.) — skip
      }

      return results;
    }

    // Populate vinyl side data from Discogs.
    async function autoPopulateVinylSides(collectionId, albumName, artistName) {
      try {
        const { data: existing } = await sb.from("vinyl_releases")
          .select("id").eq("itunes_collection_id", String(collectionId)).maybeSingle();
        if (existing?.id) return existing.id;

        const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
        const normArtist = norm(artistName);
        const normAlbum  = norm(albumName);
        // Also try without edition suffix ("Taylor's Version", "Deluxe Edition", etc.)
        const normAlbumBase = normAlbum.replace(/taylorsversion|deluxeedition|specialedition|remaster(?:ed)?/g, "").trim();

        const q = `${artistName} ${albumName}`;
        const search = await fetch(`${API_BASE}/api/discogs-lookup?q=${encodeURIComponent(q)}&per_page=8`)
          .then(r => r.json()).catch(() => null);
        if (!search?.results?.length) return null;

        // Filter to releases that mention both artist and album
        const candidates = search.results.filter(r => {
          const t = norm(r.title || "");
          return t.includes(normArtist) && (t.includes(normAlbum) || t.includes(normAlbumBase));
        }).slice(0, 5);
        // Fallback: if title matching fails, try the top 3 raw results
        if (!candidates.length) candidates.push(...search.results.slice(0, 3));

        // Pick candidate with the most unique sides (e.g. 6-sided 3LP beats 2-sided 1LP)
        let bestParsed = null;
        let bestSideCount = 0;
        let bestDetail = null;

        for (const candidate of candidates) {
          const detail = await fetch(`${API_BASE}/api/discogs-lookup?id=${candidate.id}`)
            .then(r => r.json()).catch(() => null);
          if (!detail?.tracklist?.length) continue;

          const parsed = parseDiscogsTracklist(detail.tracklist);
          if (!parsed.length) continue;

          const sideCount = new Set(parsed.map(t => t.side)).size;
          if (sideCount > bestSideCount) {
            bestSideCount = sideCount;
            bestParsed    = parsed;
            bestDetail    = detail;
          }
          if (bestSideCount >= 6) break; // can't do better than 3LP
        }

        if (!bestParsed?.length) return null;

        const { data: releaseRow, error: relErr } = await sb.from("vinyl_releases").insert({
          itunes_collection_id: String(collectionId),
          album_name:  albumName,
          artist_name: artistName,
          release_year: bestDetail.year || null,
          record_label: bestDetail.labels?.[0]?.name || null,
          disc_count: Math.ceil(bestSideCount / 2),
        }).select("id").single();
        if (relErr || !releaseRow?.id) return null;

        const trackRows = bestParsed.map((t, i) => ({
          release_id: releaseRow.id,
          disc_number: Math.ceil((t.side.charCodeAt(0) - 64) / 2),
          side: t.side,
          position: t.position || (t.side + t.trackOnSide),
          track_number_on_side: t.trackOnSide,
          title: t.title,
          duration_ms: t.duration_ms || null,
        }));

        if (trackRows.length > 0) await sb.from("vinyl_tracks").insert(trackRows);
        return releaseRow.id;
      } catch { return null; }
    }

    // Fetch synced lyrics: track_lyrics table (new schema) → LRCLib fallback
    async function fetchLyricsForTrack(trackId, trackName, artistName, albumName, durationMs) {
      // Check track_lyrics table (populated when album was added to library)
      if (trackId) {
        const { data } = await sb.from("track_lyrics")
          .select("lrc_raw, lyrics_plain").eq("itunes_track_id", trackId).maybeSingle();
        if (data?.lrc_raw) return data.lrc_raw;
        if (data?.lyrics_plain) return data.lyrics_plain;
      }
      const dur = durationMs ? Math.round(durationMs / 1000) : 0;
      try {
        const p = new URLSearchParams({ track_name: trackName, artist_name: artistName, album_name: albumName });
        if (dur) p.set("duration", dur);
        const res = await fetch(`https://lrclib.net/api/get?${p}`).then(r => r.json());
        if (res?.syncedLyrics) return res.syncedLyrics;
      } catch {}
      try {
        const p = new URLSearchParams({ track_name: trackName, artist_name: artistName });
        const results = await fetch(`https://lrclib.net/api/search?${p}`).then(r => r.json());
        if (Array.isArray(results)) {
          const exact = results.find(r => r.syncedLyrics && r.trackName?.toLowerCase() === trackName.toLowerCase());
          if (exact?.syncedLyrics) return exact.syncedLyrics;
          const any = results.find(r => r.syncedLyrics);
          if (any?.syncedLyrics) return any.syncedLyrics;
        }
      } catch {}
      return null;
    }

    // ── User-contributed metadata (lyrics + side info) ─────────────────────
    // Mirrors app/base/lib/usermeta.js (tab pages are self-contained babel
    // scripts and can't import ESM — keep the write shape in sync with it).
    // RLS grants authenticated users insert/update on both tables.
    const LYRIC_SITES = [
      { name: "LRCLIB",     url: "https://lrclib.net" },
      { name: "Genius",     url: "https://genius.com" },
      { name: "Musixmatch", url: "https://www.musixmatch.com" },
      { name: "AZLyrics",   url: "https://www.azlyrics.com" },
      { name: "Lyrics.com", url: "https://www.lyrics.com" },
    ];
    const openLyricSite = url => window.open(url, window.Capacitor ? "_system" : "_blank");

    function looksLikeLRC(text) {
      const stamped = (text || "").split("\n").filter(l => /^\s*\[\d{1,2}:\d{2}/.test(l));
      return stamped.length >= 2;
    }
    function lrcToPlain(text) {
      return (text || "").split("\n").map(l => l.replace(/\[[^\]]*\]/g, "").trim()).filter(Boolean).join("\n");
    }
    async function saveUserLyrics(trackId, text) {
      const trimmed = (text || "").trim();
      if (!trackId || !trimmed) throw new Error("Nothing to save");
      const isLrc = looksLikeLRC(trimmed);
      const row = {
        itunes_track_id: trackId,
        lrc_raw:      isLrc ? trimmed : null,
        lyrics_plain: isLrc ? lrcToPlain(trimmed) : trimmed,
        words_json:   null,
        source:       "user",
        fetched_at:   new Date().toISOString(),
      };
      const { error } = await sb.from("track_lyrics").upsert(row, { onConflict: "itunes_track_id" });
      if (error) throw error;
      return row;
    }
    // letters: one side letter per track (album order, monotonic A→B→C…).
    async function saveUserSides(collectionId, tracks, letters) {
      const perSideCount = {};
      const now = new Date().toISOString();
      const rows = tracks.map((t, i) => {
        const side = letters[i];
        perSideCount[side] = (perSideCount[side] || 0) + 1;
        if (!t.trackId) return null;
        return {
          itunes_collection_id: collectionId,
          itunes_track_id: t.trackId,
          side,
          side_track_number: perSideCount[side],
          position: side + perSideCount[side],
          fetched_at: now,
        };
      }).filter(Boolean);
      if (!rows.length) throw new Error("Nothing to save");
      const { error } = await sb.from("vinyl_sides").upsert(rows, { onConflict: "itunes_track_id" });
      if (error) throw error;
      return rows;
    }
    // Supabase .in() puts every id in the URL — chunk so long libraries don't
    // blow the URL length limit.
    async function sbInChunked(table, select, col, ids, chunk = 150) {
      const out = [];
      for (let i = 0; i < ids.length; i += chunk) {
        const { data } = await sb.from(table).select(select).in(col, ids.slice(i, i + chunk));
        if (data) out.push(...data);
      }
      return out;
    }

    // ── Liri wordmark icon — minimal soundwave bars ────────────────────────
    function VinylDot({ size = 32 }) {
      const s = size / 32;
      return (
        <svg width={size} height={size} viewBox="0 0 32 32" style={{ flexShrink: 0 }}>
          <defs>
            <linearGradient id="liri-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#d4a846" />
              <stop offset="100%" stopColor="#c9807a" />
            </linearGradient>
          </defs>
          {/* 5-bar waveform: outer bars short, inner bars tall, center tallest */}
          <rect x="2"  y="13" width="4" height="7"  rx="2" fill="url(#liri-grad)" opacity="0.7" />
          <rect x="8"  y="8"  width="4" height="16" rx="2" fill="url(#liri-grad)" opacity="0.85" />
          <rect x="14" y="4"  width="4" height="24" rx="2" fill="url(#liri-grad)" />
          <rect x="20" y="8"  width="4" height="16" rx="2" fill="url(#liri-grad)" opacity="0.85" />
          <rect x="26" y="13" width="4" height="7"  rx="2" fill="url(#liri-grad)" opacity="0.7" />
        </svg>
      );
    }

    // ── Album artwork with fallback ────────────────────────────────────────
    function AlbumArt({ src, size = 64, radius = 10 }) {
      const [failed, setFailed] = useState(false);
      if (!src || failed) {
        return (
          <div style={{
            width: size, height: size, borderRadius: radius,
            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: size * 0.38, flexShrink: 0,
          }}><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
        );
      }
      return (
        <img src={src} alt="" onError={() => setFailed(true)}
          style={{ width: size, height: size, borderRadius: radius, objectFit: "cover", flexShrink: 0 }} />
      );
    }

    // ── Spinner ────────────────────────────────────────────────────────────
    function Spinner({ size = 28 }) {
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", border: `2px solid rgba(255,255,255,0.06)`, borderTopColor: "#d4a846", animation: "spin 0.8s linear infinite" }} />
      );
    }

    const foldName = s => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    // Record-shop filing key: MusicBrainz's curated sort name when the
    // catalogue has one ("Bowie, David"; "Rolling Stones, The"), else the
    // artist name minus a leading "The ". Same rule as base/lib/library.js.
    const artistSortKey = album =>
      foldName(album.artist_sort_name || (album.artist_name || "").trim().replace(/^the\s+/i, ""));

    const cmpBase = (a, b) => (a || "").localeCompare(b || "", undefined, { sensitivity: "base" });

    // 2 most-recently-played albums first (recency order), then the rest filed
    // record-shop style by artist sort key (ties: full artist name, then album).
    function orderLibrary(lib, recentIds) {
      const seen = new Set();
      const recent = [];
      for (const id of (recentIds || [])) {
        const a = (lib || []).find(x => String(x.itunes_collection_id) === String(id));
        if (a && !seen.has(String(id))) { recent.push(a); seen.add(String(id)); }
      }
      const rest = (lib || [])
        .filter(x => !seen.has(String(x.itunes_collection_id)))
        .sort((a, b) =>
          cmpBase(artistSortKey(a), artistSortKey(b)) ||
          cmpBase(a.artist_name, b.artist_name) ||
          cmpBase(a.album_name, b.album_name));
      return [...recent, ...rest];
    }

    // ── Track Lyrics Sheet ─────────────────────────────────────────────────
    function TrackLyricsSheet({ track, album, onClose, onLyricsSaved }) {
      const [lrc, setLrc]         = useState(null);
      const [loading, setLoading] = useState(true);
      const [noLyrics, setNoLyrics] = useState(false);
      const [draft, setDraft]     = useState("");
      const [saving, setSaving]   = useState(false);
      const [saveError, setSaveError] = useState(null);

      const saveDraft = async () => {
        setSaving(true); setSaveError(null);
        try {
          const row = await saveUserLyrics(track.trackId, draft);
          setLrc(parseLRC(row.lrc_raw || row.lyrics_plain));
          setNoLyrics(false);
          onLyricsSaved && onLyricsSaved(track.trackId);
        } catch (e) {
          setSaveError(e?.message || "Couldn't save — try again");
        }
        setSaving(false);
      };

      useEffect(() => {
        fetchLyricsForTrack(
          track.trackId, track.trackName, track.artistName,
          album.album_name, track.trackTimeMillis
        ).then(result => {
          if (result) setLrc(parseLRC(result));
          else setNoLyrics(true);
          setLoading(false);
        });
      }, []);

      return (
        <>
          <div onClick={onClose}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 30 }} />
          <div style={{
            position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 31,
            background: "#0e0e1a", borderRadius: "20px 20px 0 0",
            paddingBottom: "max(24px, env(safe-area-inset-bottom))",
            maxHeight: "82vh", display: "flex", flexDirection: "column",
            animation: "sheet-up 0.28s cubic-bezier(0.4,0,0.2,1)",
          }}>
            {/* Handle */}
            <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 4px" }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.12)" }} />
            </div>
            {/* Header */}
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "8px 24px 16px" }}>
              <div style={{ flex: 1, minWidth: 0, paddingRight: 12 }}>
                <div style={{ fontSize: 16, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{track.trackName}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 3 }}>
                  {track.position && <span style={{ color: "rgba(212,168,70,0.7)", fontWeight: 700 }}>{track.position}</span>}
                  {track.position && "  ·  "}
                  {track.artistName}
                  {track.trackTimeMillis && `  ·  ${formatDuration(track.trackTimeMillis)}`}
                </div>
              </div>
              <button onClick={onClose}
                style={{ background: "rgba(255,255,255,0.07)", border: "none", color: "rgba(255,255,255,0.5)", width: 30, height: 30, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            {/* Lyrics */}
            <div style={{ overflowY: "auto", padding: "0 24px", flex: 1 }}>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: "48px 0" }}>
                  <Spinner />
                </div>
              ) : noLyrics ? (
                <div style={{ padding: "16px 0 32px" }}>
                  <div style={{ textAlign: "center", padding: "8px 0 20px", color: "rgba(255,255,255,0.2)", fontSize: 14 }}>
                    <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.4 }}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                    No lyrics found — you can add them
                  </div>
                  {track.trackId ? (
                    <>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", lineHeight: 1.6, marginBottom: 10 }}>
                        Search one of these sites for the song, then paste the lyrics below. Timestamped LRC lines (e.g. [00:12.34]) sync automatically; plain text scrolls at reading speed.
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                        {LYRIC_SITES.map(s => (
                          <button key={s.name} onClick={() => openLyricSite(s.url)}
                            style={{ background: "rgba(212,168,70,0.08)", border: "1px solid rgba(212,168,70,0.25)", color: "rgba(212,168,70,0.9)", borderRadius: 50, padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                            {s.name} ↗
                          </button>
                        ))}
                      </div>
                      <textarea value={draft} onChange={e => setDraft(e.target.value)}
                        placeholder="Paste lyrics here…" rows={8}
                        style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#f0e6d3", fontFamily: "inherit", fontSize: 14, lineHeight: 1.6, padding: "12px 14px", resize: "vertical", minHeight: 130, outline: "none" }} />
                      {saveError && <div style={{ color: "#c9807a", fontSize: 12, marginTop: 8 }}>{String(saveError)}</div>}
                      <button onClick={() => !saving && draft.trim() && saveDraft()} disabled={saving || !draft.trim()}
                        style={{
                          width: "100%", marginTop: 14,
                          background: draft.trim() && !saving ? "linear-gradient(135deg, #d4a846, #c9807a)" : "rgba(255,255,255,0.08)",
                          color: draft.trim() && !saving ? "#080810" : "rgba(255,255,255,0.3)",
                          border: "none", borderRadius: 50, padding: "15px 0",
                          fontSize: 14, fontWeight: 700, letterSpacing: "0.5px",
                          cursor: draft.trim() && !saving ? "pointer" : "default", fontFamily: "inherit",
                        }}>
                        {saving ? "Saving…" : "Save lyrics"}
                      </button>
                    </>
                  ) : (
                    <div style={{ textAlign: "center", fontSize: 12, color: "rgba(255,255,255,0.25)" }}>
                      This track can't be edited (no track ID).
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ paddingBottom: 24 }}>
                  {lrc.map((line, i) => (
                    <div key={i} style={{ fontSize: 15, lineHeight: 1.85, color: "rgba(255,255,255,0.72)", padding: "1px 0" }}>
                      {line.text}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    // ── Side Info Editor ───────────────────────────────────────────────────
    // "New side starts here" model: tap the track that opens each side.
    // Side letters are assigned sequentially from the breaks, so the result
    // is monotonic — required for the positional vinyl_sides matching.
    function SideInfoEditor({ album, tracks, onSaved, onClose }) {
      const [breaks, setBreaks] = useState(() => new Set([Math.ceil(tracks.length / 2)]));
      const [saving, setSaving] = useState(false);
      const [error, setError]   = useState(null);

      const letters = [];
      { let side = 0;
        for (let i = 0; i < tracks.length; i++) {
          if (i > 0 && breaks.has(i)) side++;
          letters.push(String.fromCharCode(65 + side));
        } }

      const toggleBreak = i => {
        if (i === 0) return; // track 1 always starts side A
        setBreaks(prev => {
          const next = new Set(prev);
          if (next.has(i)) next.delete(i); else next.add(i);
          return next;
        });
      };

      const save = async () => {
        setSaving(true); setError(null);
        try {
          await saveUserSides(album.itunes_collection_id, tracks, letters);
          onSaved();
        } catch (e) {
          setError(e?.message || "Couldn't save — try again");
          setSaving(false);
        }
      };

      return (
        <>
          <div onClick={onClose}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 30 }} />
          {/* flex-end outer keeps the inner list scrollable on iOS */}
          <div style={{ position: "fixed", inset: 0, zIndex: 31, display: "flex", flexDirection: "column", justifyContent: "flex-end", pointerEvents: "none" }}>
            <div style={{
              pointerEvents: "auto",
              background: "#0e0e1a", borderRadius: "20px 20px 0 0",
              maxHeight: "85vh", display: "flex", flexDirection: "column", minHeight: 0,
              animation: "sheet-up 0.28s cubic-bezier(0.4,0,0.2,1)",
            }}>
              <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 4px" }}>
                <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.12)" }} />
              </div>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "8px 24px 4px" }}>
                <div style={{ flex: 1, paddingRight: 12 }}>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>Add side info</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 3, lineHeight: 1.5 }}>
                    Tap the first track of each side — check the record sleeve or disc labels.
                  </div>
                </div>
                <button onClick={onClose}
                  style={{ background: "rgba(255,255,255,0.07)", border: "none", color: "rgba(255,255,255,0.5)", width: 30, height: 30, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              <div style={{ overflowY: "auto", flex: 1, minHeight: 0, padding: "4px 24px", WebkitOverflowScrolling: "touch" }}>
                {tracks.map((t, i) => {
                  const startsSide = i === 0 || breaks.has(i);
                  const numOnSide = letters.slice(0, i + 1).filter(l => l === letters[i]).length;
                  return (
                    <React.Fragment key={t.trackId || i}>
                      {startsSide && (
                        <div style={{ padding: "16px 0 6px", fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "rgba(212,168,70,0.75)", textTransform: "uppercase" }}>
                          Side {letters[i]}
                        </div>
                      )}
                      <button onClick={() => toggleBreak(i)}
                        style={{
                          width: "100%", display: "flex", alignItems: "center", gap: 12,
                          padding: "11px 2px", background: "none", border: "none",
                          borderBottom: "1px solid rgba(255,255,255,0.04)",
                          cursor: i === 0 ? "default" : "pointer", textAlign: "left", fontFamily: "inherit",
                        }}>
                        <div style={{ width: 28, fontSize: 12, fontWeight: 700, color: "rgba(212,168,70,0.65)", flexShrink: 0 }}>{letters[i]}{numOnSide}</div>
                        <div style={{ flex: 1, minWidth: 0, fontSize: 14, color: "#f0e6d3", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.trackName}</div>
                        {i > 0 && (
                          <div style={{
                            fontSize: 10, fontWeight: 600, flexShrink: 0, borderRadius: 50, padding: "4px 10px",
                            background: breaks.has(i) ? "rgba(212,168,70,0.15)" : "rgba(255,255,255,0.04)",
                            border: breaks.has(i) ? "1px solid rgba(212,168,70,0.4)" : "1px solid rgba(255,255,255,0.08)",
                            color: breaks.has(i) ? "rgba(212,168,70,0.9)" : "rgba(255,255,255,0.3)",
                          }}>
                            {breaks.has(i) ? `starts side ${letters[i]}` : "same side"}
                          </div>
                        )}
                      </button>
                    </React.Fragment>
                  );
                })}
              </div>
              <div style={{ padding: "12px 24px max(24px, env(safe-area-inset-bottom))", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
                {error && <div style={{ color: "#c9807a", fontSize: 12, marginBottom: 8 }}>{String(error)}</div>}
                <button onClick={save} disabled={saving}
                  style={{
                    width: "100%",
                    background: saving ? "rgba(255,255,255,0.08)" : "linear-gradient(135deg, #d4a846, #c9807a)",
                    color: saving ? "rgba(255,255,255,0.3)" : "#080810",
                    border: "none", borderRadius: 50, padding: "15px 0",
                    fontSize: 14, fontWeight: 700, letterSpacing: "0.5px",
                    cursor: saving ? "default" : "pointer", fontFamily: "inherit",
                  }}>
                  {saving ? "Saving…" : "Save side info"}
                </button>
              </div>
            </div>
          </div>
        </>
      );
    }

    // ── Album Detail Sheet ─────────────────────────────────────────────────
    function AlbumDetailSheet({ album, onClose, onMetaChanged }) {
      const [tracks, setTracks]           = useState([]);
      const [loading, setLoading]         = useState(true);
      const [selectedTrack, setSelectedTrack] = useState(null);
      const [vinylSource, setVinylSource] = useState(null); // "db" | "estimated"
      const [showSideEditor, setShowSideEditor] = useState(false);

      useEffect(() => { loadTracks(); }, []);

      async function loadTracks() {
        const cid = album.itunes_collection_id;

        // 1. Try album_tracks table (populated by /api/add-to-library)
        const { data: dbTracks } = await sb.from("album_tracks")
          .select("*")
          .eq("itunes_collection_id", cid)
          .order("disc_number", { ascending: true })
          .order("track_number", { ascending: true });

        const trackList = dbTracks || [];

        if (trackList.length === 0) { setLoading(false); return; }

        // 3. Load vinyl side data — query by collection only (track IDs can be
        //    synthetic Discogs values that won't match real iTunes IDs in trackList).
        //    Deduplicate by (side, side_track_number) so multiple releases don't
        //    produce duplicate rows, then assign to tracks by sorted position index.
        let sidesByPosition = []; // sorted: A1, A2…B1, B2… ordered by side then track number
        {
          const { data: sides } = await sb.from("vinyl_sides")
            .select("side, side_track_number, position")
            .eq("itunes_collection_id", cid)
            .order("side", { ascending: true })
            .order("side_track_number", { ascending: true });
          // Deduplicate: keep first occurrence of each (side, side_track_number)
          const seen = new Set();
          for (const s of sides || []) {
            const key = `${s.side}|${s.side_track_number}`;
            if (!seen.has(key)) { seen.add(key); sidesByPosition.push(s); }
          }
        }

        // Listen also falls back to vinyl_releases/vinyl_tracks when curated
        // vinyl_sides rows are absent or incomplete. Use that same source here
        // so Library never labels known side data as missing or estimates a
        // different split from the player.
        const { data: release } = await sb.from("vinyl_releases")
          .select("vinyl_tracks(side, track_number_on_side, position, title)")
          .eq("itunes_collection_id", cid)
          .order("confirmed_count", { ascending: false })
          .limit(1)
          .maybeSingle();
        const releaseTracks = [...(release?.vinyl_tracks || [])].sort((a, b) =>
          String(a.side || "").localeCompare(String(b.side || ""))
          || (a.track_number_on_side || 0) - (b.track_number_on_side || 0));
        const normTitle = s => (s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
        const hasSideData = sidesByPosition.length > 0 || releaseTracks.some(t => t.side);
        setVinylSource(hasSideData ? "db" : "estimated");

        // Which tracks already have lyrics in the DB — drives the per-track
        // "no lyrics" tag so missing ones can be filled in from here.
        const trackIds = trackList.map(t => t.itunes_track_id).filter(Boolean);
        const lyricRows = await sbInChunked(
          "track_lyrics", "itunes_track_id, lrc_raw, lyrics_plain", "itunes_track_id", trackIds);
        const lyricSet = new Set(
          (lyricRows || []).filter(r => r.lrc_raw || r.lyrics_plain).map(r => String(r.itunes_track_id)));

        const merged = trackList.map((t, i) => {
          let side, trackOnSide, position;
          if (sidesByPosition[i]?.side) {
            const s = sidesByPosition[i];
            side = s.side.toUpperCase();
            trackOnSide = s.side_track_number;
            position = s.position || (side + trackOnSide);
          } else if (releaseTracks.length) {
            const title = normTitle(t.track_name);
            const s = releaseTracks.find(v => v.side && normTitle(v.title) === title)
              || releaseTracks[i];
            if (s?.side) {
              side = s.side.toUpperCase();
              // Discogs sometimes numbers continuously across sides (B5, B6).
              // Display the ordinal within this side, as Listen does.
              const sideRows = releaseTracks.filter(v => v.side === s.side);
              trackOnSide = Math.max(1, sideRows.indexOf(s) + 1);
              position = s.position || (side + trackOnSide);
            }
          }
          if (!side) {
            const d = deriveSideFromIndex(i, trackList.map(tr => ({ trackTimeMillis: tr.duration_ms })));
            side = d.side; trackOnSide = d.track; position = side + trackOnSide;
          }
          return {
            trackId: t.itunes_track_id,
            trackName: t.track_name,
            artistName: t.artist_name || album.artist_name,
            collectionName: album.album_name,
            trackTimeMillis: t.duration_ms,
            side, trackOnSide, position,
            hasLyrics: lyricSet.has(String(t.itunes_track_id)),
          };
        });

        setTracks(merged);
        setLoading(false);
      }

      // Group by side (preserve order: A, B, C, D …)
      const sideOrder = [];
      const sideMap   = {};
      for (const t of tracks) {
        if (!sideMap[t.side]) { sideMap[t.side] = []; sideOrder.push(t.side); }
        sideMap[t.side].push(t);
      }

      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 20,
          background: "#080810", overflowY: "auto",
          animation: "slide-in 0.25s cubic-bezier(0.4,0,0.2,1)",
        }}>
          {/* ── Sticky header ── */}
          <div style={{
            position: "sticky", top: 0, zIndex: 2,
            background: "rgba(8,8,16,0.92)", backdropFilter: "blur(16px)",
            WebkitBackdropFilter: "blur(16px)",
            padding: "max(64px, calc(env(safe-area-inset-top) + 20px)) 20px 14px",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={onClose}
                style={{ background: "rgba(255,255,255,0.08)", border: "none", color: "#f0e6d3", width: 36, height: 36, borderRadius: "50%", cursor: "pointer", fontSize: 20, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                ‹
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 16, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.album_name}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.38)", marginTop: 1 }}>{album.artist_name}</div>
              </div>
            </div>
          </div>

          {/* ── Album hero ── */}
          <div style={{ padding: "24px 24px 8px", display: "flex", gap: 18, alignItems: "center" }}>
            <AlbumArt src={album.artwork_url} size={88} radius={12} />
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, lineHeight: 1.3 }}>{album.album_name}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>{album.artist_name}</div>
              {!loading && tracks.length > 0 && (
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>
                  {tracks.length} tracks · {sideOrder.length} sides
                  {vinylSource === "estimated" && <span style={{ color: "rgba(212,168,70,0.4)", marginLeft: 6 }}>· est. sides</span>}
                </div>
              )}
            </div>
          </div>

          {/* ── Missing side info banner ── */}
          {!loading && tracks.length > 0 && vinylSource === "estimated" && (
            <div style={{ margin: "14px 24px 0", background: "rgba(212,168,70,0.06)", border: "1px solid rgba(212,168,70,0.25)", borderRadius: 14, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "rgba(212,168,70,0.9)" }}>Side info is a guess</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2, lineHeight: 1.4 }}>Tell Liri which tracks are on each side so flips are detected right.</div>
              </div>
              <button onClick={() => setShowSideEditor(true)}
                style={{ background: "rgba(212,168,70,0.15)", border: "1px solid rgba(212,168,70,0.4)", color: "rgba(212,168,70,0.95)", borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap" }}>
                Add sides
              </button>
            </div>
          )}

          {/* ── Tracklist ── */}
          <div style={{ paddingBottom: "max(80px, calc(env(safe-area-inset-bottom) + 48px))" }}>
            {loading ? (
              <div style={{ display: "flex", justifyContent: "center", padding: "64px 0" }}>
                <Spinner />
              </div>
            ) : tracks.length === 0 ? (
              <div style={{ textAlign: "center", padding: "48px 24px", color: "rgba(255,255,255,0.2)", fontSize: 14 }}>
                Couldn't load tracks
              </div>
            ) : (
              sideOrder.map(side => (
                <div key={side}>
                  {/* Side label */}
                  <div style={{ padding: "22px 24px 8px", fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "rgba(212,168,70,0.65)", textTransform: "uppercase" }}>
                    Side {side}
                  </div>
                  {(sideMap[side] || []).map(track => (
                    <button key={track.trackId || track.trackName}
                      onClick={() => setSelectedTrack(track)}
                      style={{
                        display: "flex", alignItems: "center", gap: 12,
                        width: "100%", padding: "13px 24px",
                        background: "none", border: "none",
                        borderBottom: "1px solid rgba(255,255,255,0.04)",
                        cursor: "pointer", textAlign: "left", fontFamily: "inherit",
                      }}>
                      {/* Position badge */}
                      <div style={{ width: 30, fontSize: 12, fontWeight: 700, color: "rgba(212,168,70,0.65)", flexShrink: 0, letterSpacing: "0.02em" }}>
                        {track.position}
                      </div>
                      {/* Track info */}
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, color: "#f0e6d3", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {track.trackName}
                        </div>
                        {(track.trackTimeMillis || !track.hasLyrics) && (
                          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.28)", marginTop: 2 }}>
                            {track.trackTimeMillis ? formatDuration(track.trackTimeMillis) : ""}
                            {!track.hasLyrics && (
                              <span style={{ color: "rgba(212,168,70,0.7)", marginLeft: track.trackTimeMillis ? 8 : 0 }}>{track.trackTimeMillis ? "· " : ""}no lyrics — tap to add</span>
                            )}
                          </div>
                        )}
                      </div>
                      {/* Chevron */}
                      <div style={{ fontSize: 18, color: "rgba(255,255,255,0.18)", flexShrink: 0 }}>›</div>
                    </button>
                  ))}
                </div>
              ))
            )}
          </div>

          {/* Lyrics sheet */}
          {selectedTrack && (
            <TrackLyricsSheet
              track={selectedTrack}
              album={album}
              onClose={() => setSelectedTrack(null)}
              onLyricsSaved={trackId => {
                setTracks(prev => prev.map(t => String(t.trackId) === String(trackId) ? { ...t, hasLyrics: true } : t));
                onMetaChanged && onMetaChanged();
              }}
            />
          )}

          {/* Side info editor */}
          {showSideEditor && (
            <SideInfoEditor
              album={album}
              tracks={tracks}
              onClose={() => setShowSideEditor(false)}
              onSaved={() => {
                setShowSideEditor(false);
                loadTracks();
                onMetaChanged && onMetaChanged();
              }}
            />
          )}
        </div>
      );
    }

    // ── Main app ──────────────────────────────────────────────────────────
    function Library() {
      const [user, setUser]               = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Library state
      const [library, setLibrary]         = useState([]);
      const [recentPlayedIds, setRecentPlayedIds] = useState([]); // 2 most-recently-played, newest first
      const [libLoading, setLibLoading]   = useState(true);
      const [playCounts, setPlayCounts]   = useState({});

      // Detail view
      const [selectedAlbum, setSelectedAlbum] = useState(null);

      // Add-album search
      const [showSearch, setShowSearch]   = useState(false);
      const [query, setQuery]             = useState("");
      const [results, setResults]         = useState([]);
      // Auto-open search if navigated here with ?openSearch=1
      useEffect(() => {
        if (new URLSearchParams(window.location.search).get("openSearch") === "1") {
          setShowSearch(true);
        }
      }, []);
      const [searching, setSearching]     = useState(false);
      // Queue: [{cid, album, status: "pending"|"adding"|"done"|"error", error?}]
      const [addQueue, setAddQueue]       = useState([]);
      const [queueBusy, setQueueBusy]     = useState(false);
      const [removing, setRemoving]       = useState(null);
      const [undoAlbum, setUndoAlbum]     = useState(null); // { album, timer } for undo toast
      const [everAddedIds, setEverAddedIds] = useState(new Set()); // collectionIds ever added by user
      const searchTimer                   = useRef(null);
      const sessionTokenRef               = useRef(null);

      // ── Subscription ──
      const [subscription, setSubscription] = useState(null); // { tier, status, albumCount, albumLimit }
      const [showUpgrade, setShowUpgrade]   = useState(false);
      const [upgradeWorking, setUpgradeWorking] = useState(false);
      const [checkoutSuccess, setCheckoutSuccess] = useState(false);
      const [iapPrice, setIapPrice] = useState("$5.99/mo");
      const [upgradePlan, setUpgradePlan] = useState("monthly"); // "monthly" | "lifetime"
      const IS_IOS = !!window.Capacitor;

      // ── Auth ──
      // Deep-link target from a "lyrics ready" email — /library?sync=NNN.
      // Captured here so the param survives the auth/library-load round trip;
      // a useEffect below fires listenTo once the album shows up in the user's
      // library, then clears the param so a refresh doesn't loop.
      const [syncCid, setSyncCid] = useState(() => {
        const v = new URLSearchParams(window.location.search).get("sync");
        return v && /^\d+$/.test(v) ? v : null;
      });

      useEffect(() => {
        // Handle URL params on load
        const params = new URLSearchParams(window.location.search);
        if (params.get("checkout_success") === "true") {
          setCheckoutSuccess(true);
          window.history.replaceState({}, "", window.location.pathname);
        }
        if (params.get("upgrade") === "true") {
          setShowUpgrade(true);
          window.history.replaceState({}, "", window.location.pathname);
        }

        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          sessionTokenRef.current = session?.access_token || null;
          setAuthLoading(false);
        });
        sb.auth.onAuthStateChange((_e, s) => {
          setUser(s?.user ?? null);
          sessionTokenRef.current = s?.access_token || null;
        });
      }, []);

      // ── Fetch library ──
      const fetchLibrary = useCallback(async (uid) => {
        setLibLoading(true);
        const { data } = await sb
          .from("user_library")
          .select("*, catalogue(album_name, artist_name, artist_sort_name, artwork_url, itunes_collection_id)")
          .eq("user_id", uid)
          .order("added_at", { ascending: false });
        // Flatten the joined catalogue data into the expected shape
        const library = (data || []).map(row => ({
          id: row.id,
          itunes_collection_id: row.itunes_collection_id,
          album_name:  row.catalogue?.album_name  || row.album_name  || "",
          artist_name: row.catalogue?.artist_name || row.artist_name || "",
          artist_sort_name: row.catalogue?.artist_sort_name || null,
          artwork_url: row.catalogue?.artwork_url || row.artwork_url || null,
          added_at:    row.added_at,
        }));
        setLibrary(library);
        setLibLoading(false);

        // Recency for ordering: the 2 most-recently-played albums float to top.
        try {
          const { data: recent } = await sb.from("listening_events")
            .select("itunes_collection_id")
            .eq("user_id", uid)
            .not("itunes_collection_id", "is", null)
            .order("listened_at", { ascending: false })
            .limit(60);
          const ids = [];
          for (const r of recent || []) {
            const id = String(r.itunes_collection_id);
            if (!ids.includes(id)) ids.push(id);
            if (ids.length >= 2) break;
          }
          setRecentPlayedIds(ids);
        } catch (e) {}
      }, []);

      // ── Missing-info scan — drives the "needs info" badges + filter ──
      // One pass over the whole library: which albums lack side data, and how
      // many of their tracks have no lyrics row. Runs after the library loads
      // and again after the user saves lyrics/sides from the detail sheet.
      const [metaFlags, setMetaFlags] = useState({}); // cid → { sidesMissing, lyricsMissing }
      const [needsInfoOnly, setNeedsInfoOnly] = useState(false);
      const metaScanSeq = useRef(0);
      const scanMissingInfo = useCallback(async (lib) => {
        const seq = ++metaScanSeq.current;
        const cids = (lib || []).map(a => String(a.itunes_collection_id)).filter(Boolean);
        if (!cids.length) { setMetaFlags({}); return; }
        try {
          const [trackRows, sideRows, releaseRows] = await Promise.all([
            sbInChunked("album_tracks", "itunes_collection_id, itunes_track_id", "itunes_collection_id", cids),
            sbInChunked("vinyl_sides", "itunes_collection_id, side, side_track_number", "itunes_collection_id", cids),
            sbInChunked("vinyl_releases", "itunes_collection_id, vinyl_tracks(side)", "itunes_collection_id", cids),
          ]);
          const allTrackIds = trackRows.map(t => t.itunes_track_id).filter(Boolean);
          const lyricRows = await sbInChunked(
            "track_lyrics", "itunes_track_id, lrc_raw, lyrics_plain", "itunes_track_id", allTrackIds);
          if (seq !== metaScanSeq.current) return; // a newer scan superseded this one
          const lyricSet = new Set(
            lyricRows.filter(r => r.lrc_raw || r.lyrics_plain).map(r => String(r.itunes_track_id)));
          const flags = {};
          for (const cid of cids) {
            const tracks = trackRows.filter(t => String(t.itunes_collection_id) === cid);
            if (!tracks.length) continue; // no track data at all — nothing to edit yet
            // Match Listen/AlbumDetailSheet: any curated side rows or release
            // tracklist side data means this album has real side information.
            const hasCuratedSides = sideRows.some(s => String(s.itunes_collection_id) === cid && s.side);
            const hasReleaseSides = releaseRows.some(r =>
              String(r.itunes_collection_id) === cid && r.vinyl_tracks?.some(t => t.side));
            const sidesMissing = !hasCuratedSides && !hasReleaseSides;
            const lyricsMissing = tracks.filter(t => t.itunes_track_id && !lyricSet.has(String(t.itunes_track_id))).length;
            if (sidesMissing || lyricsMissing > 0) flags[cid] = { sidesMissing, lyricsMissing };
          }
          setMetaFlags(flags);
        } catch (e) { console.warn("[library] missing-info scan failed:", e); }
      }, []);
      useEffect(() => {
        if (!libLoading && library.length) scanMissingInfo(library);
      }, [libLoading, library]);

      // ── Fetch play counts ──
      const fetchPlayCounts = useCallback(async () => {
        try {
          const { data } = await sb.rpc("get_collection_play_counts");
          if (data) {
            const map = {};
            data.forEach(r => { map[String(r.collection_id)] = r.play_count; });
            setPlayCounts(map);
          }
        } catch {}
      }, []);

      // ── Fetch subscription status ──
      const fetchSubscription = useCallback(async () => {
        const { data: { session: s } } = await sb.auth.getSession();
        const token = s?.access_token || sessionTokenRef.current;
        if (!token) return;
        const data = await fetch(`${API_BASE}/api/subscription-status`, {
          headers: { "Authorization": `Bearer ${token}` },
        }).then(r => r.json()).catch(() => null);
        if (data && !data.error) {
          setSubscription(data);
          if (data.everAddedIds) setEverAddedIds(new Set(data.everAddedIds));
        }
      }, []);

      useEffect(() => {
        if (user) fetchSubscription();
      }, [user]);

      useEffect(() => {
        if (user) { fetchLibrary(user.id); fetchPlayCounts(); }
      }, [user]);

      // ── Debounced iTunes album search ──
      // iTunes gives clean canonical artwork and ONE result per album (no
      // pressing sprawl). Vinyl side data is layered on server-side from
      // Discogs at add time — see api/add-to-library.js.
      // Term search alone misses artists' own studio albums (e.g. "the 1975"
      // returns tributes/singles but none of the band's LPs), so when the
      // query matches an artist name we also pull that artist's full album
      // list via lookup and show those first.
      useEffect(() => {
        clearTimeout(searchTimer.current);
        if (!query.trim() || query.length < 2) { setResults([]); return; }
        searchTimer.current = setTimeout(async () => {
          setSearching(true);
          try {
            const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
            const nq = norm(query);

            const fetchArtistAlbums = async () => {
              const a = await fetch(
                `${API_BASE}/api/itunes-lookup?term=${encodeURIComponent(query)}&entity=musicArtist&limit=3`
              ).then(r => r.json());
              const artist = (a.results || []).find(r => {
                const na = norm(r.artistName);
                return na && (na === nq || na.includes(nq) || nq.includes(na));
              });
              if (!artist) return [];
              const lu = await fetch(
                `${API_BASE}/api/itunes-lookup?id=${artist.artistId}&entity=album&limit=100`
              ).then(r => r.json());
              return (lu.results || []).filter(r => r.wrapperType === "collection");
            };

            const [artistAlbums, termRes] = await Promise.all([
              fetchArtistAlbums().catch(() => []),
              fetch(
                `${API_BASE}/api/itunes-lookup?term=${encodeURIComponent(query)}&entity=album&limit=12`
              ).then(r => r.json()).catch(() => ({ results: [] })),
            ]);

            const seen = new Set();
            const albums = [...artistAlbums, ...(termRes.results || [])]
              .filter(r => r.collectionType === "Album" || r.wrapperType === "collection")
              .filter(r => !/\s-\sSingle$/i.test(r.collectionName || ""))
              .filter(r => r.collectionId && !seen.has(r.collectionId) && seen.add(r.collectionId))
              .map(r => ({
                _source:        'itunes',
                collectionId:   r.collectionId,
                collectionName: r.collectionName || '',
                artistName:     r.artistName || '',
                artworkUrl100:  r.artworkUrl100 || null,
                releaseDate:    r.releaseDate || null,
                _country:       r.country || null,
                _format:        null,
                _label:         null,
                _catno:         null,
              }))
              .filter(r => r.collectionName.length > 0)
              .slice(0, 30);

            setResults(albums);
          } catch { setResults([]); }
          setSearching(false);
        }, 350);
      }, [query]);

      // ── Add album to library (queue-based — tap multiple at once) ──
      const addAlbum = (album) => {
        if (!user) return;
        const cid = String(album.collectionId);
        setAddQueue(prev => {
          if (prev.some(q => q.cid === cid)) return prev; // already queued
          return [...prev, {
            cid,
            album: {
              album_name: album.collectionName,
              artist_name: album.artistName,
              artwork_url: album.artworkUrl100?.replace("100x100bb", "600x600bb") || album.artworkUrl100 || null,
              itunes_collection_id: cid,
              _source: album._source,
              collectionId: album.collectionId,
            },
            status: "pending",
          }];
        });
      };

      // ── Queue processor — works through pending items one at a time ──
      useEffect(() => {
        if (queueBusy) return;
        const next = addQueue.find(q => q.status === "pending");
        if (!next) return;
        setQueueBusy(true);
        setAddQueue(prev => prev.map(q => q.cid === next.cid ? { ...q, status: "adding" } : q));
        (async () => {
          try {
            const { data: { session: s } } = await sb.auth.getSession();
            const token = s?.access_token || sessionTokenRef.current;
            if (!token) {
              setAddQueue(prev => prev.map(q => q.cid === next.cid ? { ...q, status: "error", error: "Session expired — sign out and back in." } : q));
              setQueueBusy(false);
              return;
            }
            const res = await fetch(`${API_BASE}/api/add-to-library`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
              keepalive: true,
              body: JSON.stringify(
                next.album._source === "discogs"
                  ? { discogs_release_id: next.album.collectionId }
                  : { itunes_collection_id: next.cid }
              ),
            });
            const json = await res.json().catch(() => ({}));
            if (!res.ok) {
              if (res.status === 403 && json.error === "free_limit_reached") {
                setShowUpgrade(true);
                setAddQueue(prev => prev.filter(q => q.cid !== next.cid));
              } else {
                setAddQueue(prev => prev.map(q => q.cid === next.cid ? { ...q, status: "error", error: json.error || "Failed — try again." } : q));
              }
            } else {
              setAddQueue(prev => prev.map(q => q.cid === next.cid ? { ...q, status: "done" } : q));
              await fetchLibrary(user.id);
              fetchSubscription();
            }
          } catch {
            setAddQueue(prev => prev.map(q => q.cid === next.cid ? { ...q, status: "error", error: "Network error." } : q));
          }
          setQueueBusy(false);
        })();
      }, [addQueue, queueBusy]);

      // Auto-clear done/error entries after a short pause
      useEffect(() => {
        const done = addQueue.filter(q => q.status === "done" || q.status === "error");
        if (!done.length) return;
        const t = setTimeout(() => setAddQueue(prev => prev.filter(q => q.status === "pending" || q.status === "adding")), 4000);
        return () => clearTimeout(t);
      }, [addQueue]);

      // ── Remove album from library (with undo toast) ──
      const removeAlbum = async (collectionId) => {
        if (!user) return;
        const album = library.find(a => a.itunes_collection_id === collectionId);
        if (!album) return;
        // Hide immediately from UI
        setLibrary(prev => prev.filter(a => a.itunes_collection_id !== collectionId));
        if (undoAlbum?.timer) clearTimeout(undoAlbum.timer);
        // Delete from the DB RIGHT AWAY so it sticks even if you leave the tab
        // before the undo toast times out. (Previously this ran in a 5s
        // setTimeout that a tab navigation destroyed, so the row never went.)
        const { error } = await sb.from("user_library")
          .delete()
          .eq("user_id", user.id)
          .eq("itunes_collection_id", collectionId);
        if (error) {
          console.error("[library] remove failed:", error);
          setLibrary(prev => [album, ...prev.filter(a => a.itunes_collection_id !== collectionId)]);
          return;
        }
        try {
          const saved = JSON.parse(localStorage.getItem("liri_turntable") || "null");
          if (saved?.itunes_collection_id === collectionId) localStorage.removeItem("liri_turntable");
        } catch {}
        // Undo toast just auto-dismisses now — no pending DB work to cancel.
        const timer = setTimeout(() => setUndoAlbum(null), 5000);
        setUndoAlbum({ album, timer });
      };

      const undoRemove = async () => {
        if (!undoAlbum) return;
        clearTimeout(undoAlbum.timer);
        const album = undoAlbum.album;
        setLibrary(prev => [album, ...prev.filter(a => a.itunes_collection_id !== album.itunes_collection_id)]);
        setUndoAlbum(null);
        // Re-add the row we deleted.
        const { error } = await sb.from("user_library").upsert(
          { user_id: user.id, itunes_collection_id: album.itunes_collection_id, added_at: album.added_at || new Date().toISOString() },
          { onConflict: "user_id,itunes_collection_id" }
        );
        if (error) { console.error("[library] undo failed:", error); fetchLibrary(user.id); }
      };

      // ── Fetch live IAP price on iOS ──
      useEffect(() => {
        if (!IS_IOS || !window.Capacitor?.Plugins?.LiriIAP) return;
        window.Capacitor.Plugins.LiriIAP.fetchProduct()
          .then(p => { if (p?.displayPrice) setIapPrice(`${p.displayPrice}/mo`); })
          .catch(() => {});
      }, []);

      // ── Upgrade via Apple IAP (iOS only) ──
      // plan: "monthly" → renewable subscription, "lifetime" → non-consumable
      const upgradeWithApple = async (plan = "monthly") => {
        const iap = window.Capacitor?.Plugins?.LiriIAP;
        if (!iap) return;
        setUpgradeWorking(true);
        try {
          const result = plan === "lifetime"
            ? await iap.purchaseLifetime()
            : await iap.purchase();
          if (result?.signedTransaction) {
            const token = sessionTokenRef.current;
            const r = await fetch(`${API_BASE}/api/stripe-checkout`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
              body: JSON.stringify({ appleTransaction: result.signedTransaction, plan }),
            });
            const data = await r.json();
            if (data.tier === "premium" || data.tier === "lifetime") {
              setSubscription(prev => ({ ...prev, tier: data.tier, albumLimit: null }));
              setShowUpgrade(false);
            } else {
              alert(data.error || "Could not verify purchase. Please contact support.");
            }
          }
        } catch (e) {
          if (e?.message !== "cancelled") alert("Purchase failed. Please try again.");
        } finally {
          setUpgradeWorking(false);
        }
      };

      // ── Upgrade via Stripe Checkout (web) ──
      // plan: "monthly" → recurring sub, "lifetime" → one-time payment
      const upgradeToStripe = async (plan = "monthly") => {
        setUpgradeWorking(true);
        try {
          const token = sessionTokenRef.current;
          const res  = await fetch(`${API_BASE}/api/stripe-checkout`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ plan }),
          });
          const json = await res.json().catch(() => ({}));
          if (json.url) {
            window.location.href = json.url;
          } else {
            alert(json.error || "Could not start checkout. Please try again.");
            setUpgradeWorking(false);
          }
        } catch {
          alert("Network error — please try again.");
          setUpgradeWorking(false);
        }
      };

      // ── Open Stripe billing portal ──
      const openBillingPortal = async () => {
        setUpgradeWorking(true);
        try {
          const token = sessionTokenRef.current;
          const res  = await fetch(`${API_BASE}/api/stripe-portal`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          });
          const json = await res.json().catch(() => ({}));
          if (json.url) {
            window.location.href = json.url;
          } else {
            alert(json.error || "Could not open billing portal. Please try again.");
            setUpgradeWorking(false);
          }
        } catch {
          alert("Network error — please try again.");
          setUpgradeWorking(false);
        }
      };

      // ── Set as turntable album and go to main app ──
      const listenTo = (album) => {
        localStorage.setItem("liri_turntable", JSON.stringify({
          itunes_collection_id: album.itunes_collection_id,
          album_name:  album.album_name,
          artist_name: album.artist_name,
          artwork_url: album.artwork_url,
        }));
        window.location.href = window.Capacitor ? "/index.html" : "/app";
      };

      // ── Auto-sync from /library?sync=NNN (email deep link) ──
      useEffect(() => {
        if (!syncCid || !user || libLoading || !library.length) return;
        const album = library.find(a => String(a.itunes_collection_id) === String(syncCid));
        // Clear the param either way — bad cid shouldn't retry on every render
        const url = new URL(window.location.href);
        url.searchParams.delete("sync");
        window.history.replaceState({}, "", url.pathname + (url.search || ""));
        setSyncCid(null);
        if (album) listenTo(album);
      }, [syncCid, user, libLoading, library]);

      // ── Loading ──
      if (authLoading) return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Spinner size={36} />
        </div>
      );

      // ── Auth gate ──
      if (!user) return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center" }}>
          <VinylDot size={64} />
          <div style={{ fontSize: 22, fontWeight: 700, marginTop: 24, marginBottom: 12 }}>Sign in to see your records</div>
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 32, lineHeight: 1.7, maxWidth: 260 }}>
            Your vinyl library syncs across devices when you're signed in.
          </div>
          <a href={liriHref("/app")} style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", borderRadius: 50, padding: "14px 32px", fontSize: 14, fontWeight: 700, textDecoration: "none" }}>
            Sign in to Liri →
          </a>
        </div>
      );

      const inLibraryIds = new Set(library.map(a => String(a.itunes_collection_id)));

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 100 }}>
          {window.NowPlayingBar && React.createElement(window.NowPlayingBar)}

          {/* ── Checkout success banner ── */}
          {checkoutSuccess && (
            <div style={{ position: "fixed", top: "max(20px, calc(env(safe-area-inset-top) + 8px))", left: 16, right: 16, zIndex: 50, background: "rgba(100,200,120,0.15)", border: "1px solid rgba(100,200,120,0.35)", borderRadius: 14, padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", backdropFilter: "blur(12px)" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "rgba(100,220,130,0.9)" }}>Welcome to Liri Premium!</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>Unlimited records, all features unlocked.</div>
              </div>
              <button onClick={() => setCheckoutSuccess(false)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.3)", cursor: "pointer", padding: "4px 8px", display: "flex", alignItems: "center" }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
          )}

          {/* ── Queue error banners ── */}
          {addQueue.filter(q => q.status === "error").map(q => (
            <div key={q.cid} style={{ position: "fixed", top: "max(20px, calc(env(safe-area-inset-top) + 8px))", left: 16, right: 16, zIndex: 50, background: "rgba(201,128,122,0.15)", border: "1px solid rgba(201,128,122,0.35)", borderRadius: 14, padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", backdropFilter: "blur(12px)" }}>
              <div style={{ fontSize: 13, color: "#e8a0a8", flex: 1 }}>{q.album.album_name}: {q.error}</div>
              <button onClick={() => setAddQueue(prev => prev.filter(x => x.cid !== q.cid))} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.3)", cursor: "pointer", padding: "4px 8px", display: "flex", alignItems: "center", flexShrink: 0 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
          ))}

          {/* ── Header ── */}
          <div style={{ padding: "max(64px, calc(env(safe-area-inset-top) + 20px)) 24px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => window.history.length > 1 ? window.history.back() : (window.location.href = window.Capacitor ? "/index.html" : "/app")}
                  style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", cursor: "pointer", padding: "10px", display: "flex", alignItems: "center", justifyContent: "center", minWidth: 44, minHeight: 44 }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span style={{ fontSize: 18, fontWeight: 700, color: "#f0e6d3" }}>My Records</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <button onClick={() => { setShowSearch(true); setQuery(""); setResults([]); }}
                  style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", border: "none", borderRadius: 50, padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  + Add record
                </button>
              </div>
            </div>

            <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.5px", marginBottom: 6 }}>My Records</div>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.3)", marginBottom: subscription?.tier === "free" ? 12 : 32 }}>
              {library.length === 0 && !libLoading
                ? "Add your first record to get started"
                : `${library.length} album${library.length !== 1 ? "s" : ""} in your collection`}
            </div>

            {/* ── Plan indicator (free users only) ── */}
            {subscription && subscription.tier === "free" && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: "10px 14px", marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  {/* Progress bar */}
                  <div style={{ width: 80, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.08)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, background: library.length >= 8 ? "#c9807a" : "#d4a846", width: `${Math.min(100, (library.length / 10) * 100)}%`, transition: "width 0.4s ease" }} />
                  </div>
                  <span style={{ fontSize: 12, color: "rgba(255,255,255,0.35)" }}>{subscription.albumCount}/10 free records</span>
                </div>
                <button onClick={() => setShowUpgrade(true)}
                  style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", border: "none", borderRadius: 50, padding: "6px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  Upgrade
                </button>
              </div>
            )}

            {/* ── Premium badge + manage button ── */}
            {subscription?.tier === "premium" && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
                <div style={{ fontSize: 12, color: "rgba(212,168,70,0.7)", fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="rgba(212,168,70,0.7)"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
                  Liri Premium
                </div>
                {IS_IOS ? (
                  <button onClick={() => window.open("https://apps.apple.com/account/subscriptions", "_system")}
                    style={{ background: "none", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.3)", borderRadius: 50, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                    Manage plan
                  </button>
                ) : (
                  <button onClick={openBillingPortal} disabled={upgradeWorking}
                    style={{ background: "none", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.3)", borderRadius: 50, padding: "6px 14px", fontSize: 11, cursor: upgradeWorking ? "wait" : "pointer", fontFamily: "inherit" }}>
                    {upgradeWorking ? "…" : "Manage plan"}
                  </button>
                )}
              </div>
            )}
          </div>

          {/* ── Missing-info filter — batch-fix everything from one place ── */}
          {!libLoading && Object.keys(metaFlags).length > 0 && (
            <div style={{ padding: "0 24px", marginBottom: 12 }}>
              <button onClick={() => setNeedsInfoOnly(v => !v)}
                style={{

                        <div style={{ fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.collectionName}</div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{album.artistName}</div>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", marginTop: 3, display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {album.releaseDate && <span>{new Date(album.releaseDate).getFullYear()}</span>}
                          {album._country && <span>· {album._country}</span>}
                          {album._format && <span>· {album._format}</span>}
                          {album._label && <span>· {album._label}</span>}
                        </div>
                      </div>
                      {inLibrary ? (
                        <button disabled style={{ background: "rgba(100,200,120,0.12)", color: "rgba(100,200,120,0.8)", border: "1px solid rgba(100,200,120,0.2)", borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "default", fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap" }}>✓ Added</button>
                      ) : isQueued ? (
                        <button disabled style={{ background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.3)", border: "none", borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "default", fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap" }}>
                          {queueEntry.status === "adding" ? "Adding…" : "Queued"}
                        </button>
                      ) : wasAdded ? (
                        <button onClick={() => addAlbum(album)} style={{ background: "rgba(212,168,70,0.12)", color: "#d4a846", border: "1px solid rgba(212,168,70,0.25)", borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap" }}>↩ Re-add</button>
                      ) : (
                        <button onClick={() => addAlbum(album)} style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", border: "none", borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap" }}>Add</button>
                      )}
                    </div>
                  );
                })}
                <div style={{ height: "max(24px, env(safe-area-inset-bottom))" }} />
              </div>
            </div>
          )}

          <TabBar current="library" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <React.StrictMode>
        <Library />
        <div style={{ textAlign:"center", padding:"24px 0 16px", fontSize:"11px", color:"rgba(255,255,255,0.1)" }}>Liri v{APP_VERSION}</div>
      </React.StrictMode>
    );
  </script>
</body>
</html>
