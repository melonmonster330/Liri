<!--
  app/library.html — Liri Personal Vinyl Library
  ──────────────────────────────────────────────────────────────────────────────
  "My Records" — the user's personal collection of vinyl they own / listen to.
  Separate from the community Vinyl Database (vinyl.html): this is just the
  albums *you* have, used to power the "What's on the turntable?" selector in
  the main app.

  Features:
  • View all your saved albums (artwork, title, artist, play count)
  • Tap an album → full tracklist with side labels (A1, B2, …)
  • Tap a track → read lyrics from cache or LRCLib
  • Search iTunes to add new albums — one tap to save
  • Remove albums from your library
  • "Listen →" — sets the album as the active turntable album and goes to /app

  Supabase tables: user_library, catalogue, album_tracks, vinyl_sides, track_lyrics
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    html, body { height: 100%; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    #root { min-height: 100vh; }
    input { outline: none; }
    input:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { display: none; }
    button, a, [role="button"] { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    button:active, a:active, [role="button"]:active { opacity: 0.65; transform: scale(0.97); transition: opacity 0s, transform 0s; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
  <script>document.addEventListener('touchstart', function(){}, {passive: true});</script>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/supabase.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const APP_VERSION = "1.127";

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    // ── Shared styles ──────────────────────────────────────────────────────
    const inp = {
      width: "100%", background: "rgba(255,255,255,0.05)",
      border: "1px solid rgba(255,255,255,0.1)", color: "#f0e6d3",
      padding: "14px 16px", borderRadius: "12px", fontSize: "15px",
      fontFamily: "inherit", transition: "border-color 0.2s",
    };

    // ── Helpers ────────────────────────────────────────────────────────────

    function parseLRC(lrc) {
      if (!lrc) return [];
      const lines = [];
      for (const line of lrc.split("\n")) {
        const m = line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
        if (m) {
          const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
          const text = m[3].trim();
          if (text) lines.push({ time, text });
        }
      }
      return lines;
    }

    function formatDuration(ms) {
      const s = Math.round(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    // Estimate vinyl side/track position from index when no DB data available.
    // Fills each side with as many complete songs as fit in ~22 min, then flips.
    function deriveSideFromIndex(idx, tracks) {
      const SIDE_LIMIT_MS = 22 * 60 * 1000;
      let sideIdx = 0;
      let sideMs = 0;
      let trackOnSide = 0;
      const assignments = [];
      for (const t of tracks) {
        const dur = t.trackTimeMillis || 0;
        // Flip to next side only if we already have songs on this side AND adding
        // this song would exceed the limit.
        if (sideMs > 0 && sideMs + dur > SIDE_LIMIT_MS) {
          sideIdx++;
          sideMs = 0;
          trackOnSide = 0;
        }
        trackOnSide++;
        sideMs += dur;
        assignments.push({ side: String.fromCharCode(65 + sideIdx), track: trackOnSide });
      }
      return assignments[idx] || { side: "A", track: idx + 1 };
    }

    // Parse "4:32" duration string → milliseconds (null if unparseable)
    function durationToMs(dur) {
      if (!dur) return null;
      const m = dur.match(/^(\d+):(\d+)$/);
      return m ? (parseInt(m[1]) * 60 + parseInt(m[2])) * 1000 : null;
    }

    // Parse a Discogs tracklist into { side, trackOnSide, title, duration_ms, position }.
    // Handles all common formats:
    //   • Letter + per-side number:  A1, A2, B1, B2
    //   • Letter + sequential:       A1, A2, B5, B6  (global index continues across sides)
    //   • Numbered headings:         type_:"heading" title:"Side 1" then position:"1","2"
    //   • No usable position:        skipped (caller falls back to deriveSideFromIndex)
    function parseDiscogsTracklist(tracklist) {
      const results = [];
      let currentSide = null;
      const sideTrackCount = {};

      for (const entry of tracklist) {
        if (entry.type_ === "heading") {
          const title = (entry.title || "").trim();
          const numMatch = title.match(/(\d+)/);
          const letterMatch = title.match(/\b([A-Za-z])\b/);
          if (numMatch) {
            currentSide = String.fromCharCode(64 + parseInt(numMatch[1])); // 1→A, 2→B …
          } else if (letterMatch) {
            currentSide = letterMatch[1].toUpperCase();
          }
          continue;
        }

        const pos = (entry.position || "").trim();

        // Letter + number (A1, B12, AA1 — use first letter only)
        const letterNum = pos.match(/^([A-Za-z])(\d+)$/);
        if (letterNum) {
          results.push({
            side: letterNum[1].toUpperCase(),
            trackOnSide: parseInt(letterNum[2]),
            title: entry.title,
            duration_ms: durationToMs(entry.duration),
            position: pos.toUpperCase(),
          });
          continue;
        }

        // Pure number (works with heading context, or standalone)
        const numOnly = pos.match(/^(\d+)$/);
        if (numOnly && currentSide) {
          sideTrackCount[currentSide] = (sideTrackCount[currentSide] || 0) + 1;
          results.push({
            side: currentSide,
            trackOnSide: sideTrackCount[currentSide],
            title: entry.title,
            duration_ms: durationToMs(entry.duration),
            position: pos,
          });
          continue;
        }
        // anything else (intros, medleys without position, etc.) — skip
      }

      return results;
    }

    // Populate vinyl_releases + vinyl_tracks from Discogs (ground-truth vinyl data).
    // Tries up to 5 matching releases and picks the one with the most unique sides.
    async function autoPopulateVinylSides(collectionId, albumName, artistName) {
      try {
        const { data: existing } = await sb.from("vinyl_releases")
          .select("id").eq("itunes_collection_id", String(collectionId)).maybeSingle();
        if (existing?.id) return existing.id;

        const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
        const normArtist = norm(artistName);
        const normAlbum  = norm(albumName);
        // Also try without edition suffix ("Taylor's Version", "Deluxe Edition", etc.)
        const normAlbumBase = normAlbum.replace(/taylorsversion|deluxeedition|specialedition|remaster(?:ed)?/g, "").trim();

        const q = `${artistName} ${albumName}`;
        const search = await fetch(`/api/discogs-lookup?q=${encodeURIComponent(q)}&per_page=8`)
          .then(r => r.json()).catch(() => null);
        if (!search?.results?.length) return null;

        // Filter to releases that mention both artist and album
        const candidates = search.results.filter(r => {
          const t = norm(r.title || "");
          return t.includes(normArtist) && (t.includes(normAlbum) || t.includes(normAlbumBase));
        }).slice(0, 5);
        // Fallback: if title matching fails, try the top 3 raw results
        if (!candidates.length) candidates.push(...search.results.slice(0, 3));

        // Pick candidate with the most unique sides (e.g. 6-sided 3LP beats 2-sided 1LP)
        let bestParsed = null;
        let bestSideCount = 0;
        let bestDetail = null;

        for (const candidate of candidates) {
          const detail = await fetch(`/api/discogs-lookup?id=${candidate.id}`)
            .then(r => r.json()).catch(() => null);
          if (!detail?.tracklist?.length) continue;

          const parsed = parseDiscogsTracklist(detail.tracklist);
          if (!parsed.length) continue;

          const sideCount = new Set(parsed.map(t => t.side)).size;
          if (sideCount > bestSideCount) {
            bestSideCount = sideCount;
            bestParsed    = parsed;
            bestDetail    = detail;
          }
          if (bestSideCount >= 6) break; // can't do better than 3LP
        }

        if (!bestParsed?.length) return null;

        const { data: releaseRow, error: relErr } = await sb.from("vinyl_releases").insert({
          itunes_collection_id: String(collectionId),
          album_name:  albumName,
          artist_name: artistName,
          release_year: bestDetail.year || null,
          record_label: bestDetail.labels?.[0]?.name || null,
          disc_count: Math.ceil(bestSideCount / 2),
        }).select("id").single();
        if (relErr || !releaseRow?.id) return null;

        const trackRows = bestParsed.map((t, i) => ({
          release_id: releaseRow.id,
          disc_number: Math.ceil((t.side.charCodeAt(0) - 64) / 2),
          side: t.side,
          position: t.position || (t.side + t.trackOnSide),
          track_number_on_side: t.trackOnSide,
          title: t.title,
          duration_ms: t.duration_ms || null,
        }));

        if (trackRows.length > 0) await sb.from("vinyl_tracks").insert(trackRows);
        return releaseRow.id;
      } catch { return null; }
    }

    // Fetch synced lyrics: track_lyrics table (new schema) → LRCLib fallback
    async function fetchLyricsForTrack(trackId, trackName, artistName, albumName, durationMs) {
      // Check track_lyrics table (populated when album was added to library)
      if (trackId) {
        const { data } = await sb.from("track_lyrics")
          .select("lrc_raw, lyrics_plain").eq("itunes_track_id", trackId).maybeSingle();
        if (data?.lrc_raw) return data.lrc_raw;
        if (data?.lyrics_plain) return data.lyrics_plain;
      }
      const dur = durationMs ? Math.round(durationMs / 1000) : 0;
      try {
        const p = new URLSearchParams({ track_name: trackName, artist_name: artistName, album_name: albumName });
        if (dur) p.set("duration", dur);
        const res = await fetch(`https://lrclib.net/api/get?${p}`).then(r => r.json());
        if (res?.syncedLyrics) return res.syncedLyrics;
      } catch {}
      try {
        const p = new URLSearchParams({ track_name: trackName, artist_name: artistName });
        const results = await fetch(`https://lrclib.net/api/search?${p}`).then(r => r.json());
        if (Array.isArray(results)) {
          const exact = results.find(r => r.syncedLyrics && r.trackName?.toLowerCase() === trackName.toLowerCase());
          if (exact?.syncedLyrics) return exact.syncedLyrics;
          const any = results.find(r => r.syncedLyrics);
          if (any?.syncedLyrics) return any.syncedLyrics;
        }
      } catch {}
      return null;
    }

    // ── Liri wordmark icon — minimal soundwave bars ────────────────────────
    function VinylDot({ size = 32 }) {
      const s = size / 32;
      return (
        <svg width={size} height={size} viewBox="0 0 32 32" style={{ flexShrink: 0 }}>
          <defs>
            <linearGradient id="liri-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#d4a846" />
              <stop offset="100%" stopColor="#c9807a" />
            </linearGradient>
          </defs>
          {/* 5-bar waveform: outer bars short, inner bars tall, center tallest */}
          <rect x="2"  y="13" width="4" height="7"  rx="2" fill="url(#liri-grad)" opacity="0.7" />
          <rect x="8"  y="8"  width="4" height="16" rx="2" fill="url(#liri-grad)" opacity="0.85" />
          <rect x="14" y="4"  width="4" height="24" rx="2" fill="url(#liri-grad)" />
          <rect x="20" y="8"  width="4" height="16" rx="2" fill="url(#liri-grad)" opacity="0.85" />
          <rect x="26" y="13" width="4" height="7"  rx="2" fill="url(#liri-grad)" opacity="0.7" />
        </svg>
      );
    }

    // ── Album artwork with fallback ────────────────────────────────────────
    function AlbumArt({ src, size = 64, radius = 10 }) {
      const [failed, setFailed] = useState(false);
      if (!src || failed) {
        return (
          <div style={{
            width: size, height: size, borderRadius: radius,
            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: size * 0.38, flexShrink: 0,
          }}>💿</div>
        );
      }
      return (
        <img src={src} alt="" onError={() => setFailed(true)}
          style={{ width: size, height: size, borderRadius: radius, objectFit: "cover", flexShrink: 0 }} />
      );
    }

    // ── Spinner ────────────────────────────────────────────────────────────
    function Spinner({ size = 28 }) {
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", border: `2px solid rgba(255,255,255,0.06)`, borderTopColor: "#d4a846", animation: "spin 0.8s linear infinite" }} />
      );
    }

    // ── Track Lyrics Sheet ─────────────────────────────────────────────────
    function TrackLyricsSheet({ track, album, onClose }) {
      const [lrc, setLrc]         = useState(null);
      const [loading, setLoading] = useState(true);
      const [noLyrics, setNoLyrics] = useState(false);

      useEffect(() => {
        fetchLyricsForTrack(
          track.trackId, track.trackName, track.artistName,
          album.album_name, track.trackTimeMillis
        ).then(result => {
          if (result) setLrc(parseLRC(result));
          else setNoLyrics(true);
          setLoading(false);
        });
      }, []);

      return (
        <>
          <div onClick={onClose}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 30 }} />
          <div style={{
            position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 31,
            background: "#0e0e1a", borderRadius: "20px 20px 0 0",
            paddingBottom: "max(24px, env(safe-area-inset-bottom))",
            maxHeight: "82vh", display: "flex", flexDirection: "column",
            animation: "sheet-up 0.28s cubic-bezier(0.4,0,0.2,1)",
          }}>
            {/* Handle */}
            <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 4px" }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.12)" }} />
            </div>
            {/* Header */}
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "8px 24px 16px" }}>
              <div style={{ flex: 1, minWidth: 0, paddingRight: 12 }}>
                <div style={{ fontSize: 16, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{track.trackName}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 3 }}>
                  {track.position && <span style={{ color: "rgba(212,168,70,0.7)", fontWeight: 700 }}>{track.position}</span>}
                  {track.position && "  ·  "}
                  {track.artistName}
                  {track.trackTimeMillis && `  ·  ${formatDuration(track.trackTimeMillis)}`}
                </div>
              </div>
              <button onClick={onClose}
                style={{ background: "rgba(255,255,255,0.07)", border: "none", color: "rgba(255,255,255,0.5)", width: 30, height: 30, borderRadius: "50%", cursor: "pointer", fontSize: 14, fontFamily: "inherit", flexShrink: 0 }}>
                ✕
              </button>
            </div>
            {/* Lyrics */}
            <div style={{ overflowY: "auto", padding: "0 24px", flex: 1 }}>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: "48px 0" }}>
                  <Spinner />
                </div>
              ) : noLyrics ? (
                <div style={{ textAlign: "center", padding: "48px 0", color: "rgba(255,255,255,0.2)", fontSize: 14 }}>
                  <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.4 }}>🎵</div>
                  No synced lyrics found
                </div>
              ) : (
                <div style={{ paddingBottom: 24 }}>
                  {lrc.map((line, i) => (
                    <div key={i} style={{ fontSize: 15, lineHeight: 1.85, color: "rgba(255,255,255,0.72)", padding: "1px 0" }}>
                      {line.text}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    // ── Album Detail Sheet ─────────────────────────────────────────────────
    function AlbumDetailSheet({ album, onClose }) {
      const [tracks, setTracks]           = useState([]);
      const [loading, setLoading]         = useState(true);
      const [selectedTrack, setSelectedTrack] = useState(null);
      const [vinylSource, setVinylSource] = useState(null); // "db" | "estimated"

      useEffect(() => { loadTracks(); }, []);

      async function loadTracks() {
        const cid = album.itunes_collection_id;

        // 1. Try album_tracks table (populated by /api/add-to-library)
        const { data: dbTracks } = await sb.from("album_tracks")
          .select("*")
          .eq("itunes_collection_id", cid)
          .order("disc_number", { ascending: true })
          .order("track_number", { ascending: true });

        let trackList = dbTracks || [];

        // 2. If not in DB yet, fall back to iTunes
        if (trackList.length === 0) {
          const itunesData = await fetch(`/api/itunes-lookup?id=${cid}&entity=song&limit=200`)
            .then(r => r.json()).catch(() => null);
          const itunesTracks = (itunesData?.results || [])
            .filter(r => r.wrapperType === "track")
            .sort((a, b) => (a.discNumber - b.discNumber) || (a.trackNumber - b.trackNumber));
          trackList = itunesTracks.map(t => ({
            itunes_track_id: t.trackId,
            track_name: t.trackName,
            artist_name: t.artistName,
            track_number: t.trackNumber,
            disc_number: t.discNumber || 1,
            duration_ms: t.trackTimeMillis || null,
          }));
        }

        if (trackList.length === 0) { setLoading(false); return; }

        // 3. Load vinyl side data from vinyl_sides table
        const trackIds = trackList.map(t => t.itunes_track_id).filter(Boolean);
        let sidesMap = {}; // itunes_track_id → { side, side_track_number, position }
        if (trackIds.length > 0) {
          const { data: sides } = await sb.from("vinyl_sides")
            .select("itunes_track_id, side, side_track_number, position")
            .eq("itunes_collection_id", cid)
            .in("itunes_track_id", trackIds);
          for (const s of sides || []) sidesMap[s.itunes_track_id] = s;
        }

        const hasSideData = Object.keys(sidesMap).length > 0;
        setVinylSource(hasSideData ? "db" : "estimated");

        const merged = trackList.map((t, i) => {
          const sideRow = sidesMap[t.itunes_track_id];
          let side, trackOnSide, position;
          if (sideRow?.side) {
            side = sideRow.side.toUpperCase();
            trackOnSide = sideRow.side_track_number;
            position = sideRow.position || (side + trackOnSide);
          } else {
            const d = deriveSideFromIndex(i, trackList.map(tr => ({ trackTimeMillis: tr.duration_ms })));
            side = d.side; trackOnSide = d.track; position = side + trackOnSide;
          }
          return {
            trackId: t.itunes_track_id,
            trackName: t.track_name,
            artistName: t.artist_name || album.artist_name,
            collectionName: album.album_name,
            trackTimeMillis: t.duration_ms,
            side, trackOnSide, position,
          };
        });

        setTracks(merged);
        setLoading(false);
      }

      // Group by side (preserve order: A, B, C, D …)
      const sideOrder = [];
      const sideMap   = {};
      for (const t of tracks) {
        if (!sideMap[t.side]) { sideMap[t.side] = []; sideOrder.push(t.side); }
        sideMap[t.side].push(t);
      }

      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 20,
          background: "#080810", overflowY: "auto",
          animation: "slide-in 0.25s cubic-bezier(0.4,0,0.2,1)",
        }}>
          {/* ── Sticky header ── */}
          <div style={{
            position: "sticky", top: 0, zIndex: 2,
            background: "rgba(8,8,16,0.92)", backdropFilter: "blur(16px)",
            WebkitBackdropFilter: "blur(16px)",
            padding: "max(52px, calc(env(safe-area-inset-top) + 16px)) 20px 14px",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={onClose}
                style={{ background: "rgba(255,255,255,0.08)", border: "none", color: "#f0e6d3", width: 36, height: 36, borderRadius: "50%", cursor: "pointer", fontSize: 20, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                ‹
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 16, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.album_name}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.38)", marginTop: 1 }}>{album.artist_name}</div>
              </div>
            </div>
          </div>

          {/* ── Album hero ── */}
          <div style={{ padding: "24px 24px 8px", display: "flex", gap: 18, alignItems: "center" }}>
            <AlbumArt src={album.artwork_url} size={88} radius={12} />
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, lineHeight: 1.3 }}>{album.album_name}</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>{album.artist_name}</div>
              {!loading && tracks.length > 0 && (
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>
                  {tracks.length} tracks · {sideOrder.length} sides
                  {vinylSource === "estimated" && <span style={{ color: "rgba(212,168,70,0.4)", marginLeft: 6 }}>· est. sides</span>}
                </div>
              )}
            </div>
          </div>

          {/* ── Tracklist ── */}
          <div style={{ paddingBottom: "max(80px, calc(env(safe-area-inset-bottom) + 48px))" }}>
            {loading ? (
              <div style={{ display: "flex", justifyContent: "center", padding: "64px 0" }}>
                <Spinner />
              </div>
            ) : tracks.length === 0 ? (
              <div style={{ textAlign: "center", padding: "48px 24px", color: "rgba(255,255,255,0.2)", fontSize: 14 }}>
                Couldn't load tracks
              </div>
            ) : (
              sideOrder.map(side => (
                <div key={side}>
                  {/* Side label */}
                  <div style={{ padding: "22px 24px 8px", fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "rgba(212,168,70,0.65)", textTransform: "uppercase" }}>
                    Side {side}
                  </div>
                  {(sideMap[side] || []).map(track => (
                    <button key={track.trackId || track.trackName}
                      onClick={() => setSelectedTrack(track)}
                      style={{
                        display: "flex", alignItems: "center", gap: 12,
                        width: "100%", padding: "13px 24px",
                        background: "none", border: "none",
                        borderBottom: "1px solid rgba(255,255,255,0.04)",
                        cursor: "pointer", textAlign: "left", fontFamily: "inherit",
                      }}>
                      {/* Position badge */}
                      <div style={{ width: 30, fontSize: 12, fontWeight: 700, color: "rgba(212,168,70,0.65)", flexShrink: 0, letterSpacing: "0.02em" }}>
                        {track.position}
                      </div>
                      {/* Track info */}
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, color: "#f0e6d3", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {track.trackName}
                        </div>
                        {track.trackTimeMillis && (
                          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.28)", marginTop: 2 }}>
                            {formatDuration(track.trackTimeMillis)}
                          </div>
                        )}
                      </div>
                      {/* Chevron */}
                      <div style={{ fontSize: 18, color: "rgba(255,255,255,0.18)", flexShrink: 0 }}>›</div>
                    </button>
                  ))}
                </div>
              ))
            )}
          </div>

          {/* Lyrics sheet */}
          {selectedTrack && (
            <TrackLyricsSheet
              track={selectedTrack}
              album={album}
              onClose={() => setSelectedTrack(null)}
            />
          )}
        </div>
      );
    }

    // ── Main app ──────────────────────────────────────────────────────────
    function Library() {
      const [user, setUser]               = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Library state
      const [library, setLibrary]         = useState([]);
      const [libLoading, setLibLoading]   = useState(true);
      const [playCounts, setPlayCounts]   = useState({});

      // Detail view
      const [selectedAlbum, setSelectedAlbum] = useState(null);

      // Add-album search
      const [showSearch, setShowSearch]   = useState(false);
      const [query, setQuery]             = useState("");
      const [results, setResults]         = useState([]);
      const [searching, setSearching]     = useState(false);
      const [adding, setAdding]           = useState(null); // collectionId string while adding
      const [addError, setAddError]       = useState(null);
      const [removing, setRemoving]       = useState(null);
      const searchTimer                   = useRef(null);
      const sessionTokenRef               = useRef(null);

      // ── Auth ──
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          sessionTokenRef.current = session?.access_token || null;
          setAuthLoading(false);
        });
        sb.auth.onAuthStateChange((_e, s) => {
          setUser(s?.user ?? null);
          sessionTokenRef.current = s?.access_token || null;
        });
      }, []);

      // ── Fetch library ──
      const fetchLibrary = useCallback(async (uid) => {
        setLibLoading(true);
        const { data } = await sb
          .from("user_library")
          .select("*, catalogue(album_name, artist_name, artwork_url, itunes_collection_id)")
          .eq("user_id", uid)
          .order("added_at", { ascending: false });
        // Flatten the joined catalogue data into the expected shape
        const library = (data || []).map(row => ({
          id: row.id,
          itunes_collection_id: row.itunes_collection_id,
          album_name:  row.catalogue?.album_name  || row.album_name  || "",
          artist_name: row.catalogue?.artist_name || row.artist_name || "",
          artwork_url: row.catalogue?.artwork_url || row.artwork_url || null,
          added_at:    row.added_at,
        }));
        setLibrary(library);
        setLibLoading(false);
      }, []);

      // ── Fetch play counts ──
      const fetchPlayCounts = useCallback(async () => {
        try {
          const { data } = await sb.rpc("get_collection_play_counts");
          if (data) {
            const map = {};
            data.forEach(r => { map[String(r.collection_id)] = r.play_count; });
            setPlayCounts(map);
          }
        } catch {}
      }, []);

      useEffect(() => {
        if (user) { fetchLibrary(user.id); fetchPlayCounts(); }
      }, [user]);

      // ── Debounced iTunes search ──
      useEffect(() => {
        clearTimeout(searchTimer.current);
        if (!query.trim() || query.length < 2) { setResults([]); return; }
        searchTimer.current = setTimeout(async () => {
          setSearching(true);
          try {
            const res = await fetch(
              `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=8`
            ).then(r => r.json());
            const seen = new Set();
            const albums = (res.results || []).filter(r => {
              if (seen.has(r.collectionId)) return false;
              seen.add(r.collectionId); return true;
            });
            setResults(albums);
          } catch { setResults([]); }
          setSearching(false);
        }, 350);
      }, [query]);

      // ── Add album to library ──
      const addAlbum = async (album) => {
        if (!user || adding) return;
        const cid = String(album.collectionId);
        setAdding(cid);
        setAddError(null);
        try {
          // Force a token refresh so we never send an expired access token
          const { data: { session: freshSession }, error: refreshError } = await sb.auth.refreshSession();
          const token = freshSession?.access_token || sessionTokenRef.current;

          // Catch expired/missing session before hitting the server
          if (!token) {
            setAddError("Session expired — please sign out and back in, then try again.");
            setAdding(null);
            return;
          }

          const res = await fetch("/api/add-to-library", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(token ? { "Authorization": `Bearer ${token}` } : {}),
            },
            body: JSON.stringify({ itunes_collection_id: album.collectionId }),
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok) {
            if (res.status === 401) {
              setAddError("Session expired — please sign out and back in, then try again.");
            } else {
              setAddError(json.error || "Failed to add album. Please try again.");
            }
          } else {
            await fetchLibrary(user.id);
            setShowSearch(false);
            setQuery("");
            setResults([]);
          }
        } catch (e) {
          setAddError("Network error — please try again.");
        }
        setAdding(null);
      };

      // ── Remove album from library ──
      const removeAlbum = async (collectionId) => {
        if (!user || removing) return;
        setRemoving(collectionId);
        // Remove from personal library (shared catalogue data stays for other users)
        await sb.from("user_library")
          .delete()
          .eq("user_id", user.id)
          .eq("itunes_collection_id", collectionId);
        // Clear turntable selection if this was the active album
        try {
          const saved = JSON.parse(localStorage.getItem("liri_turntable") || "null");
          if (saved?.itunes_collection_id === collectionId) localStorage.removeItem("liri_turntable");
        } catch {}
        setLibrary(prev => prev.filter(a => a.itunes_collection_id !== collectionId));
        setRemoving(null);
      };

      // ── Set as turntable album and go to main app ──
      const listenTo = (album) => {
        localStorage.setItem("liri_turntable", JSON.stringify({
          itunes_collection_id: album.itunes_collection_id,
          album_name:  album.album_name,
          artist_name: album.artist_name,
          artwork_url: album.artwork_url,
        }));
        window.location.href = "/app";
      };

      // ── Loading ──
      if (authLoading) return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Spinner size={36} />
        </div>
      );

      // ── Auth gate ──
      if (!user) return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center" }}>
          <VinylDot size={64} />
          <div style={{ fontSize: 22, fontWeight: 700, marginTop: 24, marginBottom: 12 }}>Sign in to see your records</div>
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 32, lineHeight: 1.7, maxWidth: 260 }}>
            Your vinyl library syncs across devices when you're signed in.
          </div>
          <a href="/app" style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", borderRadius: 50, padding: "14px 32px", fontSize: 14, fontWeight: 700, textDecoration: "none" }}>
            Sign in to Liri →
          </a>
        </div>
      );

      const inLibraryIds = new Set(library.map(a => String(a.itunes_collection_id)));

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 80 }}>

          {/* ── Header ── */}
          <div style={{ padding: "max(52px, calc(env(safe-area-inset-top) + 24px)) 24px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28 }}>
              <a href="/app" style={{ display: "flex", alignItems: "center", gap: 10, textDecoration: "none" }}>
                <VinylDot size={28} />
                <span style={{ fontSize: 18, fontWeight: 700, color: "#f0e6d3" }}>Liri</span>
              </a>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <a href="/stats" style={{ fontSize:13, color:"rgba(255,255,255,0.4)", textDecoration:"none", padding:"10px 14px", border:"1px solid rgba(255,255,255,0.1)", borderRadius:50 }}>Stats</a>
                <button onClick={() => { setShowSearch(true); setQuery(""); setResults([]); }}
                  style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", border: "none", borderRadius: 50, padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  + Add record
                </button>
              </div>
            </div>

            <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.5px", marginBottom: 6 }}>My Records</div>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.3)", marginBottom: 32 }}>
              {library.length === 0 && !libLoading
                ? "Add your first record to get started"
                : `${library.length} album${library.length !== 1 ? "s" : ""} in your collection`}
            </div>
          </div>

          {/* ── Library list ── */}
          <div style={{ padding: "0 24px" }}>
            {libLoading ? (
              <div style={{ display: "flex", justifyContent: "center", padding: "60px 0" }}>
                <Spinner />
              </div>
            ) : library.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: "rgba(255,255,255,0.2)" }}>
                <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.4 }}>💿</div>
                <div style={{ fontSize: 15, marginBottom: 8 }}>Your collection is empty</div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.15)" }}>Tap "+ Add record" to get started</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                {library.map((album, i) => {
                  const plays = playCounts[album.itunes_collection_id] || 0;
                  const isRemoving = removing === album.itunes_collection_id;
                  return (
                    <div key={album.id}
                      style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: "1px solid rgba(255,255,255,0.04)", animation: "fade-up 0.3s ease both", animationDelay: `${i * 30}ms` }}>

                      {/* Tappable area → album detail */}
                      <div onClick={() => setSelectedAlbum(album)}
                        style={{ display: "flex", alignItems: "center", gap: 14, flex: 1, minWidth: 0, cursor: "pointer" }}>
                        <AlbumArt src={album.artwork_url} size={56} radius={8} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.album_name}</div>
                          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.artist_name}</div>
                          {plays > 0 && (
                            <div style={{ fontSize: 10, color: "rgba(212,168,70,0.6)", marginTop: 4 }}>{plays} play{plays !== 1 ? "s" : ""} on Liri</div>
                          )}
                        </div>
                      </div>

                      {/* Action buttons */}
                      <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                        <button onClick={() => listenTo(album)}
                          style={{ background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810", border: "none", borderRadius: 50, padding: "8px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                          Listen →
                        </button>
                        <button onClick={() => removeAlbum(album.itunes_collection_id)} disabled={isRemoving}
                          style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.3)", borderRadius: 50, padding: "8px 12px", fontSize: 12, cursor: isRemoving ? "wait" : "pointer", fontFamily: "inherit", opacity: isRemoving ? 0.4 : 1 }}>
                          {isRemoving ? "…" : "✕"}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── Album detail (full screen) ── */}
          {selectedAlbum && (
            <AlbumDetailSheet
              album={selectedAlbum}
              onClose={() => setSelectedAlbum(null)}
            />
          )}

          {/* ── Add-album search sheet ── */}
          {showSearch && (
            <>
              <div onClick={() => setShowSearch(false)}
                style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 10 }} />

              <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 11, background: "#0e0e1a", borderRadius: "20px 20px 0 0", padding: "0 0 max(24px, env(safe-area-inset-bottom))", maxHeight: "85vh", display: "flex", flexDirection: "column", animation: "sheet-up 0.28s cubic-bezier(0.4,0,0.2,1)" }}>

                <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 4px" }}>
                  <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.12)" }} />
                </div>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 24px 16px" }}>
                  <div style={{ fontSize: 18, fontWeight: 700 }}>Add a record</div>
                  <button onClick={() => setShowSearch(false)}
                    style={{ background: "rgba(255,255,255,0.07)", border: "none", color: "rgba(255,255,255,0.5)", width: 30, height: 30, borderRadius: "50%", cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>✕</button>
                </div>

                <div style={{ padding: "0 24px 16px", position: "relative" }}>
                  <input
                    autoFocus
                    style={{ ...inp, paddingLeft: 44 }}
                    placeholder="Artist + album name…"
                    value={query}
                    onChange={e => setQuery(e.target.value)}
                  />
                  <div style={{ position: "absolute", left: 40, top: "50%", transform: "translateY(-50%)", fontSize: 16, opacity: 0.35, pointerEvents: "none" }}>🔍</div>
                </div>

                <div style={{ overflowY: "auto", padding: "0 24px", flex: 1 }}>
                  {addError && (
                    <div style={{ background: "rgba(201,128,122,0.12)", border: "1px solid rgba(201,128,122,0.3)", borderRadius: 10, padding: "10px 14px", marginBottom: 12, fontSize: 13, color: "#e8a0a8" }}>
                      {addError}
                    </div>
                  )}
                  {adding && (
                    <div style={{ textAlign: "center", padding: "16px 0", color: "rgba(255,255,255,0.4)", fontSize: 13 }}>
                      Fetching tracks &amp; lyrics — this takes ~15 seconds…
                    </div>
                  )}
                  {searching && (
                    <div style={{ textAlign: "center", padding: "24px 0", color: "rgba(255,255,255,0.25)", fontSize: 14 }}>Searching…</div>
                  )}
                  {!searching && query.length >= 2 && results.length === 0 && (
                    <div style={{ textAlign: "center", padding: "24px 0", color: "rgba(255,255,255,0.2)", fontSize: 14 }}>No albums found</div>
                  )}
                  {results.map(album => {
                    const alreadyAdded = inLibraryIds.has(String(album.collectionId));
                    const isAdding = adding === String(album.collectionId);
                    return (
                      <div key={album.collectionId}
                        style={{ display: "flex", alignItems: "center", gap: 14, padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                        {album.artworkUrl100
                          ? <img src={album.artworkUrl100} alt="" style={{ width: 50, height: 50, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />
                          : <div style={{ width: 50, height: 50, borderRadius: 8, background: "rgba(255,255,255,0.04)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>💿</div>
                        }
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{album.collectionName}</div>
                          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{album.artistName}</div>
                          {album.releaseDate && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", marginTop: 1 }}>{new Date(album.releaseDate).getFullYear()}</div>}
                        </div>
                        <button onClick={() => !alreadyAdded && addAlbum(album)} disabled={alreadyAdded || isAdding}
                          style={{
                            background: alreadyAdded ? "rgba(100,200,120,0.12)" : isAdding ? "rgba(255,255,255,0.05)" : "linear-gradient(135deg,#d4a846,#c9807a)",
                            color: alreadyAdded ? "rgba(100,200,120,0.8)" : isAdding ? "rgba(255,255,255,0.3)" : "#080810",
                            border: alreadyAdded ? "1px solid rgba(100,200,120,0.2)" : "none",
                            borderRadius: 50, padding: "8px 14px", fontSize: 12, fontWeight: 700,
                            cursor: alreadyAdded || isAdding ? "default" : "pointer",
                            fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap",
                          }}>
                          {alreadyAdded ? "✓ Added" : isAdding ? "…" : "Add"}
                        </button>
                      </div>
                    );
                  })}
                  <div style={{ height: 16 }} />
                </div>
              </div>
            </>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <React.StrictMode>
        <Library />
        <div style={{ textAlign:"center", padding:"24px 0 16px", fontSize:"11px", color:"rgba(255,255,255,0.1)" }}>Liri v{APP_VERSION}</div>
      </React.StrictMode>
    );
  </script>
</body>
</html>
