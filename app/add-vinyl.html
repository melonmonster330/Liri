<!--
  app/add-vinyl.html — Liri Add a Record
  ──────────────────────────────────────────────────────────────────────────────
  Two-step flow:
  • Step 1: Search iTunes by album/artist
  • Step 2: Album card + quick-add button, with optional collapsible pressing
    details + side assignment. Quick path skips vinyl_releases/vinyl_tracks.

  Supabase tables written (full path):
  • vinyl_releases — one row per unique pressing/edition
  • vinyl_tracks   — one row per track with side, position, disc metadata
  Always written:
  • user_vinyl_library — personal library entry
  • liri_lyric_cache   — synced lyrics for every track

  Auth: requires a signed-in Supabase user (Google sign-in).

  Dependencies (CDN, no build step): React 18, Babel standalone, Supabase JS client
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Add a Record — Liri</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    #root { min-height: 100vh; }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const APP_VERSION = "1.79";

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    // Side letter mapping: disc 1 → A/B, disc 2 → C/D, disc 3 → E/F, disc 4 → G/H
    const SIDE_LETTERS = ['A','B','C','D','E','F','G','H'];
    const discSides = (discNum) => [
      SIDE_LETTERS[(discNum - 1) * 2],
      SIDE_LETTERS[(discNum - 1) * 2 + 1],
    ];

    const fmtMs = (ms) => {
      if (!ms) return '';
      const s = Math.round(ms / 1000);
      return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
    };

    // ── Shared input style ──
    const inp = {
      width: '100%', background: 'rgba(255,255,255,0.05)',
      border: '1px solid rgba(255,255,255,0.1)', color: '#f0e6d3',
      padding: '14px 16px', borderRadius: '12px', fontSize: '15px',
      fontFamily: 'inherit', transition: 'border-color 0.2s',
    };

    function AddVinyl() {
      const [user, setUser]             = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Step 1 — Search
      const [query, setQuery]           = useState('');
      const [results, setResults]       = useState([]);
      const [searching, setSearching]   = useState(false);
      const searchTimer                 = useRef(null);

      // Step 2 — Album + optional details
      const [selected, setSelected]     = useState(null);  // iTunes album result
      const [step, setStep]             = useState(1);
      const [showDetails, setShowDetails] = useState(false);
      const [pressing, setPressing]     = useState({
        release_year: '', record_label: '', catalog_number: '',
        country: '', edition: '', version_note: '', disc_count: 1,
      });

      // Side assignment
      const [tracks, setTracks]         = useState([]); // grouped by disc
      // breaks: { discNum: breakIdx } — breakIdx is the index (within that disc's tracks) of the LAST track on the first side
      const [breaks, setBreaks]         = useState({});
      const [loadingTracks, setLoadingTracks] = useState(false);

      // Submission
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState(null);
      const [done, setDone]             = useState(false);
      const [cacheProgress, setCacheProgress] = useState(null); // { current, total, trackName }

      // ── Auth ──
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user || null);
          setAuthLoading(false);
        });
      }, []);

      // ── Debounced iTunes search ──
      useEffect(() => {
        clearTimeout(searchTimer.current);
        if (!query.trim() || query.length < 3) { setResults([]); return; }
        searchTimer.current = setTimeout(async () => {
          setSearching(true);
          try {
            const res = await fetch(
              `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=25`
            ).then(r => r.json());
            // Deduplicate by collectionId — iTunes returns in popularity order, preserve it
            const seen = new Set();
            const albums = (res.results || []).filter(r => {
              if (seen.has(r.collectionId)) return false;
              seen.add(r.collectionId); return true;
            }).slice(0, 8);
            setResults(albums);
          } catch { setResults([]); }
          setSearching(false);
        }, 350);
      }, [query]);

      // ── Select an album → fetch tracklist + auto-populate pressing details ──
      const selectAlbum = async (album) => {
        setSelected(album);
        // Pre-fill year from iTunes immediately
        setPressing(p => ({
          ...p,
          release_year: album.releaseDate ? String(new Date(album.releaseDate).getFullYear()) : '',
        }));
        setLoadingTracks(true);
        try {
          // iTunes tracklist — sets LP count and side breaks
          const res = await fetch(
            `https://itunes.apple.com/lookup?id=${album.collectionId}&entity=song`
          ).then(r => r.json());
          const raw = (res.results || [])
            .filter(t => t.wrapperType === 'track')
            .sort((a, b) => (a.discNumber - b.discNumber) || (a.trackNumber - b.trackNumber));

          const byDisc = {};
          raw.forEach(t => {
            const d = t.discNumber || 1;
            if (!byDisc[d]) byDisc[d] = [];
            byDisc[d].push(t);
          });
          const autoBreaks = {};
          Object.entries(byDisc).forEach(([d, ts]) => {
            autoBreaks[Number(d)] = Math.ceil(ts.length / 2) - 1;
          });
          setTracks(byDisc);
          setBreaks(autoBreaks);
          setPressing(p => ({ ...p, disc_count: Object.keys(byDisc).length }));

          // MusicBrainz — one call for label, catalog number, country (no API key needed)
          // Fires in background; pre-fills optional fields if a match is found.
          fetch(
            `https://musicbrainz.org/ws/2/release?query=release:${encodeURIComponent(album.collectionName)}%20AND%20artist:${encodeURIComponent(album.artistName)}&fmt=json&limit=5`,
            { headers: { 'User-Agent': 'Liri/1.74 (https://getliri.com)' } }
          ).then(r => r.json()).then(mb => {
            const releases = mb.releases || [];
            // Prefer releases with label info; fall back to first result
            const best = releases.find(r => r['label-info']?.length > 0) || releases[0];
            if (!best) return;
            const labelInfo = best['label-info']?.[0];
            const label   = labelInfo?.label?.name   || '';
            const catalog = labelInfo?.['catalog-number'] || '';
            const country = best.country || '';
            // Only fill fields that are still empty
            setPressing(p => ({
              ...p,
              record_label:   p.record_label   || label,
              catalog_number: p.catalog_number || catalog,
              country:        p.country        || country,
            }));
          }).catch(() => {});
        } catch { setTracks({}); setBreaks({}); }
        setLoadingTracks(false);
        setStep(2);
      };

      // ── Move a side break up or down ──
      const moveBreak = (discNum, dir) => {
        setBreaks(b => {
          const current = b[discNum] ?? 0;
          const max = (tracks[discNum]?.length || 2) - 2; // last possible break
          const next = Math.max(0, Math.min(max, current + dir));
          return { ...b, [discNum]: next };
        });
      };

      // ── Compute final track positions for preview + submission ──
      const computePositions = () => {
        const result = [];
        const discNums = Object.keys(tracks).map(Number).sort();
        discNums.forEach(d => {
          const ts = tracks[d] || [];
          const breakIdx = breaks[d] ?? Math.ceil(ts.length / 2) - 1;
          const [sideA, sideB] = discSides(d);
          let posA = 1, posB = 1;
          ts.forEach((t, i) => {
            const side = i <= breakIdx ? sideA : sideB;
            const posNum = i <= breakIdx ? posA++ : posB++;
            result.push({
              ...t,
              _side: side,
              _position: `${side}${posNum}`,
              _disc: d,
              _posNum: posNum,
            });
          });
        });
        return result;
      };

      // ── Check if any pressing field has content (beyond defaults) ──
      const hasPressingData = () => {
        return (
          pressing.disc_count > 1 ||
          pressing.catalog_number.trim() ||
          pressing.country.trim() ||
          pressing.edition.trim() ||
          pressing.version_note.trim()
        );
      };

      // ── Submit to Supabase ──
      // withDetails = true  → full path: vinyl_releases + vinyl_tracks + library + lyrics
      // withDetails = false → quick path: library + lyrics only
      const handleSubmit = async () => {
        if (!user) return;
        setSubmitting(true);
        setSubmitError(null);
        const withDetails = showDetails && hasPressingData();
        try {
          const positioned = computePositions();

          const collectionIdStr = String(selected.collectionId);
          const artistName      = selected.artistName;
          const albumName       = selected.collectionName;
          const artworkUrl      = selected.artworkUrl100?.replace('100x100bb', '600x600bb') || null;

            // 1. Always save release + tracks — turntable mode requires them.
          //    Pressing details (year, label, catalog, etc.) are optional metadata.
          const { data: release, error: relErr } = await sb.from('vinyl_releases').insert({
            itunes_collection_id: collectionIdStr,
            album_name:    albumName,
            artist_name:   artistName,
            release_year:  pressing.release_year ? Number(pressing.release_year) : null,
            record_label:  pressing.record_label  || null,
            catalog_number: pressing.catalog_number || null,
            country:       pressing.country       || null,
            edition:       withDetails ? (pressing.edition       || null) : null,
            version_note:  withDetails ? (pressing.version_note  || null) : null,
            disc_count:    pressing.disc_count,
            artwork_url:   artworkUrl,
            submitted_by:  user.id,
          }).select().single();

          if (relErr) throw relErr;

          // 2. Insert all tracks (delete old ones first so re-adds stay clean)
          await sb.from('vinyl_tracks').delete().eq('release_id', release.id);
          const trackRows = positioned.map(t => ({
            release_id:           release.id,
            disc_number:          t._disc,
            side:                 t._side,
            position:             t._position,
            track_number_on_side: t._posNum,
            title:                t.trackName,
            duration_ms:          t.trackTimeMillis || null,
            itunes_track_id:      t.trackId ? String(t.trackId) : null,
          }));
          const { error: trkErr } = await sb.from('vinyl_tracks').insert(trackRows);
          if (trkErr) throw trkErr;

          // 3. Add to user's personal library so it appears in turntable picker
          await sb.from('user_vinyl_library').upsert({
            user_id:              user.id,
            itunes_collection_id: collectionIdStr,
            album_name:           albumName,
            artist_name:          artistName,
            artwork_url:          artworkUrl,
          }, { onConflict: 'user_id,itunes_collection_id' });

          // 4. Cache lyrics for every track before showing done screen.
          // Must complete before navigation — fire-and-forget caused page unload to kill the loop.
          const eligibleTracks = positioned.filter(t => t.trackId && t.trackName);
          let cached = 0;
          for (let i = 0; i < eligibleTracks.length; i++) {
            const t = eligibleTracks[i];
            setCacheProgress({ current: i + 1, total: eligibleTracks.length, trackName: t.trackName });
            try {
              let candidates = await fetch(
                `https://lrclib.net/api/search?artist_name=${encodeURIComponent(artistName)}&track_name=${encodeURIComponent(t.trackName)}`
              ).then(r => r.json()).catch(() => []);
              if (!Array.isArray(candidates)) candidates = [];
              if (!candidates.some(c => c.syncedLyrics)) {
                const fb = await fetch(
                  `https://lrclib.net/api/search?q=${encodeURIComponent(`${artistName} ${t.trackName}`.trim())}`
                ).then(r => r.json()).catch(() => []);
                if (Array.isArray(fb)) candidates = [...candidates, ...fb];
              }
              const best = candidates.filter(c => c.syncedLyrics).find(c => !/\*{2,}/.test(c.syncedLyrics))
                        || candidates.find(c => c.syncedLyrics);
              if (best?.syncedLyrics) {
                const { error: lcErr } = await sb.from('liri_lyric_cache').upsert({
                  itunes_track_id:      t.trackId,
                  itunes_collection_id: selected.collectionId,
                  track_name:           t.trackName,
                  artist_name:          artistName,
                  album_name:           albumName,
                  track_number:         t.trackNumber,
                  disc_number:          t._disc,
                  synced_lyrics:        best.syncedLyrics,
                }, { onConflict: 'itunes_track_id' });
                if (lcErr) console.warn('[lyrics cache] upsert failed for', t.trackName, lcErr);
                else cached++;
              }
            } catch (e) {
              console.warn('[lyrics cache] error for', t.trackName, e);
            }
          }
          console.log(`[lyrics cache] done: ${cached}/${eligibleTracks.length} tracks cached for "${albumName}"`);
          setCacheProgress(null);
          // Auto-select this album on the turntable when the user returns to Liri
          try {
            localStorage.setItem("liri_turntable", JSON.stringify({
              itunes_collection_id: collectionIdStr,
              album_name:  albumName,
              artist_name: artistName,
              artwork_url: artworkUrl,
            }));
          } catch {}
          setDone(true);
        } catch (e) {
          setSubmitError(e.message || 'Something went wrong. Please try again.');
        }
        setSubmitting(false);
      };

      // ── Loading / Auth gates ──
      if (authLoading) return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ width: '36px', height: '36px', borderRadius: '50%', border: '2px solid #1a1a2e', borderTopColor: '#d4a846', animation: 'spin 0.8s linear infinite' }} />
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );

      if (!user) return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 24px', textAlign: 'center' }}>
          <div style={{ fontSize: '48px', marginBottom: '20px' }}>💿</div>
          <div style={{ fontSize: '22px', fontWeight: '700', marginBottom: '12px' }}>Sign in to contribute</div>
          <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.4)', marginBottom: '28px', lineHeight: '1.7' }}>
            You need a Liri account to add records to the collection.
          </div>
          <a href="/app/index.html" style={{ background: 'linear-gradient(135deg,#d4a846,#c9807a)', color: '#080810', borderRadius: '50px', padding: '14px 32px', fontSize: '14px', fontWeight: '700', textDecoration: 'none' }}>
            Sign in to Liri →
          </a>
        </div>
      );

      // ── Success ──
      if (done) return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 24px', textAlign: 'center' }}>
          <div style={{ fontSize: '64px', marginBottom: '20px' }}>🎉</div>
          <div style={{ fontSize: '24px', fontWeight: '700', color: '#d4a846', marginBottom: '12px' }}>Added to Liri!</div>
          <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.4)', marginBottom: '8px' }}>{selected?.collectionName}</div>
          <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.25)', marginBottom: '36px' }}>by {selected?.artistName}</div>
          <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.4)', marginBottom: '36px', lineHeight: '1.7', maxWidth: '280px' }}>
            Every listener who plays this record will benefit from your contribution.
          </div>
          <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', justifyContent: 'center' }}>
            <button onClick={() => { setDone(false); setStep(1); setSelected(null); setQuery(''); setResults([]); setShowDetails(false); }}
              style={{ background: 'linear-gradient(135deg,#d4a846,#c9807a)', color: '#080810', border: 'none', borderRadius: '50px', padding: '14px 28px', fontSize: '14px', fontWeight: '700', cursor: 'pointer', fontFamily: 'inherit' }}>
              Add another record
            </button>
            <a href="/app/index.html" style={{ background: 'rgba(255,255,255,0.06)', color: '#f0e6d3', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '50px', padding: '14px 28px', fontSize: '14px', textDecoration: 'none', fontWeight: '600' }}>
              Back to Liri
            </a>
          </div>
        </div>
      );

      return (
        <div style={{ minHeight: '100vh', padding: 'max(48px, calc(env(safe-area-inset-top) + 24px)) 0 max(48px, calc(env(safe-area-inset-bottom) + 24px))' }}>

          {/* Header */}
          <div style={{ maxWidth: '560px', margin: '0 auto', padding: '0 24px' }}>
            {step === 1 ? (
              <a href="/app/index.html" style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', color: 'rgba(255,255,255,0.3)', textDecoration: 'none', fontSize: '13px', marginBottom: '28px' }}>
                ← Liri
              </a>
            ) : (
              <button onClick={() => { setStep(1); setSelected(null); setShowDetails(false); }}
                style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', background: 'none', border: 'none', color: 'rgba(255,255,255,0.3)', fontSize: '13px', cursor: 'pointer', fontFamily: 'inherit', padding: '0', marginBottom: '28px' }}>
                ← Back
              </button>
            )}
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '36px' }}>
              <div style={{ fontSize: '22px' }}>💿</div>
              <div style={{ fontSize: '22px', fontWeight: '700', color: '#f0e6d3' }}>Add a Record</div>
            </div>
          </div>

          {/* ── STEP 1: SEARCH ── */}
          {step === 1 && (
            <div style={{ maxWidth: '560px', margin: '0 auto', padding: '0 24px' }}>
              <div style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>What record are you adding?</div>
              <div style={{ position: 'relative', marginBottom: '24px' }}>
                <input
                  style={{ ...inp, paddingLeft: '44px' }}
                  placeholder="Artist + album name..."
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  autoFocus
                />
                <div style={{ position: 'absolute', left: '16px', top: '50%', transform: 'translateY(-50%)', fontSize: '16px', opacity: 0.4 }}>🔍</div>
              </div>

              {searching && (
                <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.3)', fontSize: '14px', padding: '16px' }}>Searching…</div>
              )}

              {results.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {results.map(album => (
                    <button key={album.collectionId} onClick={() => selectAlbum(album)}
                      style={{ display: 'flex', alignItems: 'center', gap: '16px', background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '14px', padding: '14px 16px', cursor: 'pointer', textAlign: 'left', transition: 'border-color 0.2s', fontFamily: 'inherit', width: '100%' }}>
                      {album.artworkUrl100 && (
                        <img src={album.artworkUrl100} alt="" style={{ width: '52px', height: '52px', borderRadius: '8px', objectFit: 'cover', flexShrink: 0 }} />
                      )}
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: '14px', fontWeight: '600', color: '#f0e6d3', marginBottom: '3px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{album.collectionName}</div>
                        <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.45)' }}>{album.artistName}</div>
                        {album.releaseDate && (
                          <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.25)', marginTop: '2px' }}>{new Date(album.releaseDate).getFullYear()}</div>
                        )}
                      </div>
                      <div style={{ color: 'rgba(255,255,255,0.2)', fontSize: '18px', flexShrink: 0 }}>›</div>
                    </button>
                  ))}
                </div>
              )}

              {query.length >= 3 && !searching && results.length === 0 && (
                <div style={{ textAlign: 'center', padding: '32px 0', color: 'rgba(255,255,255,0.25)', fontSize: '14px' }}>
                  No albums found. Try a different search.
                </div>
              )}
            </div>
          )}

          {/* ── STEP 2: ADD PAGE ── */}
          {step === 2 && selected && (
            <div style={{ maxWidth: '560px', margin: '0 auto', padding: '0 24px' }}>

              {/* Album card */}
              <div style={{ display: 'flex', gap: '16px', alignItems: 'center', background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '16px', padding: '16px', marginBottom: '28px' }}>
                {selected.artworkUrl100 && (
                  <img src={selected.artworkUrl100.replace('100x100bb','300x300bb')} alt="" style={{ width: '72px', height: '72px', borderRadius: '10px', objectFit: 'cover', flexShrink: 0 }} />
                )}
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: '17px', fontWeight: '700', color: '#f0e6d3', marginBottom: '4px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{selected.collectionName}</div>
                  <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.45)', marginBottom: '4px' }}>{selected.artistName}</div>
                  {selected.releaseDate && (
                    <div style={{ fontSize: '12px', color: 'rgba(255,255,255,0.25)' }}>{new Date(selected.releaseDate).getFullYear()}</div>
                  )}
                </div>
              </div>

              {/* Primary CTA */}
              {submitError && (
                <div style={{ background: 'rgba(232,160,168,0.1)', border: '1px solid rgba(232,160,168,0.3)', borderRadius: '12px', padding: '12px 16px', fontSize: '13px', color: '#e8a0a8', marginBottom: '16px', lineHeight: '1.6' }}>
                  {submitError}
                </div>
              )}

              <button onClick={handleSubmit} disabled={submitting || loadingTracks}
                style={{ width: '100%', background: submitting ? 'rgba(255,255,255,0.1)' : 'linear-gradient(135deg,#d4a846,#c9807a)', color: submitting ? 'rgba(255,255,255,0.4)' : '#080810', border: 'none', borderRadius: '50px', padding: '16px', fontSize: '15px', fontWeight: '700', cursor: submitting || loadingTracks ? 'wait' : 'pointer', fontFamily: 'inherit', transition: 'all 0.2s', marginBottom: '16px' }}>
                {submitting ? 'Saving…' : loadingTracks ? 'Loading tracklist…' : showDetails && hasPressingData() ? 'Add to library + contribute data →' : 'Add to my library →'}
              </button>

              {/* Collapsible pressing details toggle */}
              <button onClick={() => setShowDetails(v => !v)}
                style={{ width: '100%', background: 'none', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '12px', padding: '14px 16px', color: showDetails ? '#d4a846' : 'rgba(255,255,255,0.4)', fontSize: '14px', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', display: 'flex', alignItems: 'center', justifyContent: 'space-between', transition: 'color 0.2s, border-color 0.2s', marginBottom: showDetails ? '0' : '0', borderBottomLeftRadius: showDetails ? '0' : '12px', borderBottomRightRadius: showDetails ? '0' : '12px' }}>
                <span>{showDetails ? '− Pressing details (optional)' : '+ Contribute pressing details (optional)'}</span>
                <span style={{ fontSize: '12px', opacity: 0.5 }}>{showDetails ? 'collapse' : 'expand'}</span>
              </button>

              {/* Expanded pressing details + side assignment */}
              {showDetails && (
                <div style={{ border: '1px solid rgba(255,255,255,0.1)', borderTop: 'none', borderRadius: '0 0 12px 12px', padding: '20px 16px 24px', marginBottom: '0' }}>

                  <div style={{ fontSize: '12px', color: 'rgba(255,255,255,0.25)', marginBottom: '20px', lineHeight: '1.6' }}>
                    These distinguish different editions. At minimum, a catalog number or country is helpful.
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '12px' }}>
                    {[
                      { key: 'release_year', label: 'Year', placeholder: '1969', type: 'number' },
                      { key: 'catalog_number', label: 'Catalog number', placeholder: 'PCS 7088' },
                    ].map(f => (
                      <div key={f.key}>
                        <label style={{ display: 'block', fontSize: '11px', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.5px', textTransform: 'uppercase', marginBottom: '6px' }}>{f.label}</label>
                        <input type={f.type || 'text'} style={inp} placeholder={f.placeholder}
                          value={pressing[f.key]} onChange={e => setPressing(p => ({ ...p, [f.key]: e.target.value }))} />
                      </div>
                    ))}
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '12px' }}>
                    {[
                      { key: 'record_label', label: 'Label', placeholder: 'Apple Records' },
                      { key: 'country', label: 'Country', placeholder: 'UK' },
                    ].map(f => (
                      <div key={f.key}>
                        <label style={{ display: 'block', fontSize: '11px', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.5px', textTransform: 'uppercase', marginBottom: '6px' }}>{f.label}</label>
                        <input style={inp} placeholder={f.placeholder}
                          value={pressing[f.key]} onChange={e => setPressing(p => ({ ...p, [f.key]: e.target.value }))} />
                      </div>
                    ))}
                  </div>
                  <div style={{ marginBottom: '12px' }}>
                    <label style={{ display: 'block', fontSize: '11px', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.5px', textTransform: 'uppercase', marginBottom: '6px' }}>Edition <span style={{ color: 'rgba(255,255,255,0.2)' }}>optional</span></label>
                    <input style={inp} placeholder='e.g. "Target Exclusive", "Box Set", "Deluxe"'
                      value={pressing.edition} onChange={e => setPressing(p => ({ ...p, edition: e.target.value }))} />
                  </div>
                  <div style={{ marginBottom: '24px' }}>
                    <label style={{ display: 'block', fontSize: '11px', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.5px', textTransform: 'uppercase', marginBottom: '6px' }}>Version note <span style={{ color: 'rgba(255,255,255,0.2)' }}>optional</span></label>
                    <input style={inp} placeholder='e.g. "Red vinyl", "Picture disc", "2023 Remaster"'
                      value={pressing.version_note} onChange={e => setPressing(p => ({ ...p, version_note: e.target.value }))} />
                  </div>

                  {/* LP count */}
                  <div style={{ marginBottom: '32px' }}>
                    <label style={{ display: 'block', fontSize: '11px', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.5px', textTransform: 'uppercase', marginBottom: '12px' }}>Number of LPs in this release</label>
                    <div style={{ display: 'flex', gap: '10px' }}>
                      {[1,2,3,4].map(n => (
                        <button key={n} onClick={() => setPressing(p => ({ ...p, disc_count: n }))}
                          style={{ flex: 1, padding: '14px 8px', background: pressing.disc_count === n ? 'linear-gradient(135deg,#d4a846,#c9807a)' : 'rgba(255,255,255,0.05)', border: `1px solid ${pressing.disc_count === n ? 'transparent' : 'rgba(255,255,255,0.1)'}`, color: pressing.disc_count === n ? '#080810' : '#f0e6d3', borderRadius: '12px', fontSize: '15px', fontWeight: '700', cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.2s' }}>
                          {n}
                        </button>
                      ))}
                    </div>
                    <div style={{ display: 'flex', gap: '10px', marginTop: '6px' }}>
                      {['Side','Sides','Sides','Sides'].map((s, i) => (
                        <div key={i} style={{ flex: 1, textAlign: 'center', fontSize: '10px', color: 'rgba(255,255,255,0.2)' }}>{i + 1} LP · {(i+1)*2} {s}</div>
                      ))}
                    </div>
                  </div>

                  {/* Side assignment */}
                  <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: '24px' }}>
                    <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '6px', color: '#f0e6d3' }}>Side assignment</div>
                    <div style={{ fontSize: '12px', color: 'rgba(255,255,255,0.3)', marginBottom: '20px', lineHeight: '1.6' }}>
                      Use the arrows to move the flip point. We pre-set it at the midpoint — adjust to match your record.
                    </div>

                    {loadingTracks ? (
                      <div style={{ textAlign: 'center', padding: '16px', color: 'rgba(255,255,255,0.3)', fontSize: '14px' }}>Loading tracklist…</div>
                    ) : (
                      Object.keys(tracks).map(Number).sort().map(discNum => {
                        const discTracks = tracks[discNum] || [];
                        const breakIdx = breaks[discNum] ?? Math.ceil(discTracks.length / 2) - 1;
                        const [sideA, sideB] = discSides(discNum);

                        return (
                          <div key={discNum} style={{ marginBottom: '28px' }}>
                            {Object.keys(tracks).length > 1 && (
                              <div style={{ fontSize: '11px', letterSpacing: '2px', color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase', marginBottom: '12px' }}>LP {discNum}</div>
                            )}
                            {discTracks.map((t, i) => {
                              const isBreak = i === breakIdx;
                              const side = i <= breakIdx ? sideA : sideB;
                              const posInSide = i <= breakIdx ? i + 1 : i - breakIdx;
                              const isFirstB = i === breakIdx + 1;

                              return (
                                <React.Fragment key={t.trackId || i}>
                                  {/* Side header */}
                                  {i === 0 && (
                                    <div style={{ fontSize: '11px', letterSpacing: '2px', color: '#d4a846', textTransform: 'uppercase', marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid rgba(212,168,70,0.15)' }}>
                                      Side {sideA}
                                    </div>
                                  )}
                                  {isFirstB && (
                                    <div style={{ fontSize: '11px', letterSpacing: '2px', color: '#d4a846', textTransform: 'uppercase', marginBottom: '8px', marginTop: '8px', paddingBottom: '8px', borderBottom: '1px solid rgba(212,168,70,0.15)' }}>
                                      Side {sideB}
                                    </div>
                                  )}

                                  {/* Track row */}
                                  <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '9px 0', borderBottom: '1px solid rgba(255,255,255,0.04)' }}>
                                    <div style={{ width: '28px', fontSize: '11px', color: 'rgba(255,255,255,0.3)', flexShrink: 0, fontVariantNumeric: 'tabular-nums' }}>
                                      {side}{posInSide}
                                    </div>
                                    <div style={{ flex: 1, fontSize: '14px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.trackName}</div>
                                    <div style={{ fontSize: '12px', color: 'rgba(255,255,255,0.3)', flexShrink: 0 }}>{fmtMs(t.trackTimeMillis)}</div>
                                  </div>

                                  {/* Flip point indicator — shown after the last track of Side A */}
                                  {isBreak && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 0', margin: '4px 0' }}>
                                      <div style={{ flex: 1, height: '2px', background: 'linear-gradient(90deg,#d4a846,#c9807a)', borderRadius: '1px', opacity: 0.6 }} />
                                      <div style={{ display: 'flex', gap: '6px', flexShrink: 0 }}>
                                        <button onClick={() => moveBreak(discNum, -1)} disabled={breakIdx === 0}
                                          style={{ width: '30px', height: '30px', background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.12)', color: breakIdx === 0 ? 'rgba(255,255,255,0.15)' : '#f0e6d3', borderRadius: '8px', cursor: breakIdx === 0 ? 'default' : 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit' }}>
                                          ↑
                                        </button>
                                        <div style={{ display: 'flex', alignItems: 'center', fontSize: '11px', color: 'rgba(212,168,70,0.7)', letterSpacing: '1px', padding: '0 4px', whiteSpace: 'nowrap' }}>
                                          FLIP
                                        </div>
                                        <button onClick={() => moveBreak(discNum, 1)} disabled={breakIdx >= discTracks.length - 2}
                                          style={{ width: '30px', height: '30px', background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.12)', color: breakIdx >= discTracks.length - 2 ? 'rgba(255,255,255,0.15)' : '#f0e6d3', borderRadius: '8px', cursor: breakIdx >= discTracks.length - 2 ? 'default' : 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit' }}>
                                          ↓
                                        </button>
                                      </div>
                                      <div style={{ flex: 1, height: '2px', background: 'linear-gradient(90deg,#c9807a,#d4a846)', borderRadius: '1px', opacity: 0.6 }} />
                                    </div>
                                  )}
                                </React.Fragment>
                              );
                            })}
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              )}

            </div>
          )}

          {/* ── Lyrics caching progress overlay ── */}
          {cacheProgress && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(8,8,16,0.92)', backdropFilter: 'blur(12px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 32px', textAlign: 'center' }}>
              <div style={{ fontSize: '36px', marginBottom: '24px' }}>🎵</div>
              <div style={{ fontSize: '17px', fontWeight: '700', color: '#f0e6d3', marginBottom: '8px' }}>Caching lyrics…</div>
              <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.4)', marginBottom: '28px', maxWidth: '240px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{cacheProgress.trackName}</div>
              {/* Progress bar */}
              <div style={{ width: '100%', maxWidth: '280px', height: '4px', background: 'rgba(255,255,255,0.08)', borderRadius: '2px', overflow: 'hidden', marginBottom: '12px' }}>
                <div style={{ height: '100%', background: 'linear-gradient(to right, #d4a846, #c9807a)', borderRadius: '2px', width: `${(cacheProgress.current / cacheProgress.total) * 100}%`, transition: 'width 0.3s ease' }} />
              </div>
              <div style={{ fontSize: '12px', color: 'rgba(255,255,255,0.25)' }}>{cacheProgress.current} / {cacheProgress.total} tracks</div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <React.StrictMode>
        <AddVinyl />
        <div style={{ textAlign:'center', padding:'24px 0 16px', fontSize:'11px', color:'rgba(255,255,255,0.1)' }}>Liri v{APP_VERSION}</div>
      </React.StrictMode>
    );
  </script>
</body>
</html>
