<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liri Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #0f0f1c;
    --border: rgba(255,255,255,0.07);
    --gold: #d4a846;
    --muted: rgba(255,255,255,0.35);
    --dim: rgba(255,255,255,0.12);
  }
  body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  /* ── Login ── */
  #login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; }
  #login h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--gold); }
  #login input { background: var(--surface); border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 12px 16px; font-size: 15px; width: 280px; outline: none; font-family: inherit; }
  #login input:focus { border-color: rgba(212,168,70,0.4); }
  #login button { background: var(--gold); color: #080810; border: none; border-radius: 12px; padding: 12px 32px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 280px; }
  #login .err { color: #e07070; font-size: 13px; }

  /* ── Dashboard ── */
  #dash { display: none; max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; color: var(--gold); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .updated { font-size: 12px; color: var(--muted); }
  .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .refresh-btn:hover { color: #fff; }
  .range-pills { display: flex; gap: 6px; margin-bottom: 20px; }
  .range-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .range-pill.active { background: rgba(212,168,70,0.15); border-color: rgba(212,168,70,0.4); color: var(--gold); }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 600px) { .grid, .grid.grid-2 { grid-template-columns: 1fr 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .card-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card-gold .card-value { color: var(--gold); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { font-size: 13px; width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-label span { font-size: 11px; color: var(--muted); display: block; }
  .bar-track { flex: 1; background: var(--dim); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.4s; }
  .bar-count { font-size: 12px; color: var(--muted); width: 30px; text-align: right; flex-shrink: 0; }

  .signup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .signup-row:last-child { border-bottom: none; }
  .signup-email { color: rgba(255,255,255,0.7); }
  .signup-date { color: var(--muted); font-size: 11px; }

  .split-row { display: flex; gap: 20px; }
  .split-item { flex: 1; }
  .split-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .split-value { font-size: 20px; font-weight: 700; }
  .split-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .split-bar { height: 4px; border-radius: 2px; margin-top: 8px; background: var(--dim); overflow: hidden; }
  .split-bar-fill { height: 100%; border-radius: 2px; background: var(--gold); }

  .loading { color: var(--muted); text-align: center; padding: 60px; font-size: 14px; }

  .bug-row { border-bottom: 1px solid var(--border); cursor: pointer; }
  .bug-row:last-child { border-bottom: none; }
  .bug-summary { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
  .bug-summary:hover .bug-desc { color: #fff; }
  .bug-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-ios { background: rgba(212,168,70,0.15); color: var(--gold); }
  .badge-web { background: rgba(100,160,255,0.15); color: #7ab4ff; }
  .bug-desc { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.7); }
  .bug-meta { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .bug-detail { display: none; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; font-size: 12px; line-height: 1.7; color: rgba(255,255,255,0.6); }
  .bug-detail.open { display: block; }
  .bug-detail strong { color: rgba(255,255,255,0.9); font-size: 13px; display: block; margin-bottom: 6px; }
  .bug-detail pre { font-size: 11px; color: var(--muted); white-space: pre-wrap; word-break: break-all; margin-top: 8px; }

  /* ── Drill-in ── */
  .clickable { cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .clickable:hover { border-color: rgba(212,168,70,0.4); transform: translateY(-1px); }
  .back-btn { background: var(--surface); border: 1px solid var(--border); color: rgba(255,255,255,0.7); border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; margin-bottom: 16px; }
  .back-btn:hover { color: #fff; }

  .album-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .album-row:last-child { border-bottom: none; }
  .album-row:hover { background: rgba(255,255,255,0.02); }
  .album-art { width: 44px; height: 44px; border-radius: 6px; background: var(--dim); object-fit: cover; flex-shrink: 0; }
  .album-info { flex: 1; min-width: 0; }
  .album-name { font-size: 13px; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-stats { display: flex; gap: 14px; flex-shrink: 0; }
  .album-stat { text-align: right; }
  .album-stat-val { font-size: 14px; font-weight: 700; color: var(--gold); }
  .album-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  .track-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .track-row:last-child { border-bottom: none; }
  .track-num { width: 28px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
  .track-side { width: 42px; color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
  .track-side.missing { color: rgba(224,112,112,0.6); font-weight: 400; font-size: 10px; }
  .track-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-plays { color: var(--gold); font-size: 12px; flex-shrink: 0; width: 60px; text-align: right; }
  .track-flag { font-size: 10px; flex-shrink: 0; width: 100px; text-align: right; color: #e07070; }
  .track-flag.ok { color: rgba(120,200,120,0.6); }
  .track-flag .source { color: var(--muted); font-size: 9px; display: block; }

  .search-input { background: var(--surface); border: 1px solid var(--border); color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 100%; outline: none; font-family: inherit; margin-bottom: 14px; }
  .search-input:focus { border-color: rgba(212,168,70,0.4); }

  /* ── Missing Lyrics ── */
  .lrc-album { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .lrc-album-hdr { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; }
  .lrc-album-hdr:hover { background: rgba(255,255,255,0.02); }
  .lrc-album-art { width: 40px; height: 40px; border-radius: 6px; background: var(--dim); object-fit: cover; flex-shrink: 0; }
  .lrc-album-info { flex: 1; min-width: 0; }
  .lrc-album-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lrc-album-artist { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .lrc-badge { font-size: 11px; font-weight: 700; color: var(--muted); background: rgba(255,255,255,0.07); border-radius: 20px; padding: 3px 10px; flex-shrink: 0; }
  .lrc-tracks { display: none; padding: 0 16px 12px; }
  .lrc-tracks.open { display: block; }
  .lrc-track { border-bottom: 1px solid var(--border); }
  .lrc-track:last-child { border-bottom: none; }
  .lrc-track-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; cursor: pointer; }
  .lrc-track-name { flex: 1; font-size: 13px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lrc-track-dur { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .lrc-chevron { font-size: 16px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
  .lrc-submit { display: none; padding-bottom: 12px; }
  .lrc-submit.open { display: block; }
  .lrc-links { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
  .lrc-link { font-size: 11px; color: var(--gold); background: rgba(212,168,70,0.08); border: 1px solid rgba(212,168,70,0.2); border-radius: 20px; padding: 4px 10px; text-decoration: none; }
  .lrc-link:hover { background: rgba(212,168,70,0.15); }
  .lrc-search { font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 4px 10px; cursor: pointer; user-select: all; }
  .lrc-search:hover { background: rgba(255,255,255,0.09); }
  .lrc-search.copied { color: var(--gold); border-color: rgba(212,168,70,0.4); }
  .lrc-textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: #f0e6d3; padding: 10px 12px; font-size: 12px; font-family: ui-monospace, monospace; resize: vertical; box-sizing: border-box; outline: none; }
  .lrc-textarea:focus { border-color: rgba(212,168,70,0.4); }
  .lrc-submit-btn { background: linear-gradient(135deg,#d4a846,#c9807a); color: #080810; border: none; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .lrc-submit-btn:disabled { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.25); cursor: default; }
  .lrc-msg { font-size: 12px; font-weight: 600; margin-top: 6px; }
  .lrc-msg.ok  { color: rgba(100,220,130,0.9); }
  .lrc-msg.err { color: #e8a0a8; }

  /* ── Side data form ── */
  .side-form { background: rgba(255,180,0,0.05); border: 1px solid rgba(255,180,0,0.2); border-radius: 12px; padding: 16px; margin-top: 16px; }
  .side-form-title { font-size: 12px; color: rgba(255,180,0,0.8); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; font-weight: 700; }
  .side-inputs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .side-input-group { display: flex; flex-direction: column; gap: 4px; }
  .side-input-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .side-input { background: var(--surface); border: 1px solid var(--border); color: #fff; border-radius: 8px; padding: 7px 10px; font-size: 14px; font-weight: 700; width: 60px; outline: none; font-family: inherit; text-align: center; }
  .side-input:focus { border-color: rgba(255,180,0,0.5); }
  .side-form-btn { background: rgba(255,180,0,0.15); border: 1px solid rgba(255,180,0,0.35); color: rgba(255,180,0,0.9); border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .side-form-btn:hover { background: rgba(255,180,0,0.25); }
  .side-form-btn:disabled { opacity: 0.4; cursor: default; }
  .side-form-msg { font-size: 12px; font-weight: 600; margin-top: 8px; }
  .side-form-msg.ok  { color: rgba(100,220,130,0.9); }
  .side-form-msg.err { color: #e8a0a8; }
</style>
</head>
<body>

<div id="login">
  <h1>Liri Admin</h1>
  <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
  <div class="err" id="login-err"></div>
  <button id="login-btn">Enter</button>
</div>

<div id="dash">
  <div class="header">
    <h1>Liri Admin</h1>
    <div class="header-right">
      <span class="updated" id="updated-at"></span>
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>
  </div>
  <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="refresh-btn" style="background:rgba(212,168,70,0.08);border-color:rgba(212,168,70,0.2);color:var(--gold);padding:10px 20px;font-size:13px;font-weight:700" onclick="openMissingLyrics()">🎵 Missing Lyrics →</button>
    <button class="refresh-btn" style="background:rgba(212,168,70,0.08);border-color:rgba(212,168,70,0.2);color:var(--gold);padding:10px 20px;font-size:13px;font-weight:700" onclick="openMissingSideInfo()">💿 Missing Side Info →</button>
  </div>
  <div id="liri-update" style="background:rgba(212,168,70,0.06);border:1px solid rgba(212,168,70,0.2);border-radius:12px;padding:16px;margin-bottom:20px">
    <div style="font-size:13px;font-weight:700;color:#d4a846;letter-spacing:0.5px;margin-bottom:10px">📣 Post a Liri update to the feed</div>
    <textarea id="lu-text" rows="3" placeholder="What's new in this release… (posts as @liri to everyone's feed)" style="width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#f0e6d3;padding:12px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box"></textarea>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
      <button id="lu-post" style="background:linear-gradient(135deg,#d4a846,#c9807a);color:#080810;border:none;border-radius:50px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Publish to feed</button>
      <span id="lu-status" style="font-size:13px;color:rgba(255,255,255,0.5)"></span>
    </div>
  </div>
  <div id="range-pills"></div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script src="admin/admin-utils.js"></script>
<script src="admin/admin-auth.js"></script>
<script src="admin/admin-api.js"></script>
<script src="admin/admin-dashboard.js"></script>
<script src="admin/admin-users.js"></script>
<script src="admin/admin-albums.js"></script>
<script src="admin/admin-lyrics.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// Initialization
// ═══════════════════════════════════════════════════════════════════════════════
              <div class="album-info">
                <div class="album-name">${esc(a.album_name || '(untitled)')}</div>
                <div class="album-artist">${esc(a.artist_name || '')}${a.release_year ? ' · ' + a.release_year : ''}</div>
              </div>
              <div class="album-stats">
                <div class="album-stat">
                  <div class="album-stat-val">${fmt(a.plays)}</div>
                  <div class="album-stat-lbl">plays</div>
                </div>
                <div class="album-stat">
                  <div class="album-stat-val">${fmt(a.added_by)}</div>
                  <div class="album-stat-lbl">added</div>
                </div>
              </div>
            </div>
          `).join("")}
      </div>
    </div>
  `;
}

function filterAlbums(q) {
  if (!albumsCache) return;
  const s = q.trim().toLowerCase();
  const filtered = s
    ? albumsCache.filter(a =>
        (a.album_name || "").toLowerCase().includes(s) ||
        (a.artist_name || "").toLowerCase().includes(s))
    : albumsCache;
  const list = document.getElementById("album-list");
  if (!list) return;
  list.innerHTML = filtered.map(a => `
    <div class="album-row" onclick="openAlbum(${a.itunes_collection_id})">
      <img class="album-art" src="${esc(a.artwork_url || '')}" onerror="this.style.visibility='hidden'">
      <div class="album-info">
        <div class="album-name">${esc(a.album_name || '(untitled)')}</div>
        <div class="album-artist">${esc(a.artist_name || '')}${a.release_year ? ' · ' + a.release_year : ''}</div>
      </div>
      <div class="album-stats">
        <div class="album-stat"><div class="album-stat-val">${fmt(a.plays)}</div><div class="album-stat-lbl">plays</div></div>
        <div class="album-stat"><div class="album-stat-val">${fmt(a.added_by)}</div><div class="album-stat-lbl">added</div></div>
      </div>
    </div>`).join("");
}

async function openAlbum(id) {
  const c = document.getElementById("content");
  c.innerHTML = `<div class="loading">Loading tracks…</div>`;
  const r = await fetch(API + "?action=album&id=" + id, { headers: { "x-admin-password": pw } });
  if (!r.ok) { c.innerHTML = `<div class="loading">Error loading album</div>`; return; }
  const d = await r.json();
  renderAlbum(d);
}

function renderAlbum(d) {
  const c = document.getElementById("content");
  albumDetailCache = d;
  const a = d.album || {};
  const tracks = d.tracks || [];
  const sc = d.sideCoverage || { total: tracks.length, with_side: 0, missing: tracks.length };
  const missingLyrics = tracks.filter(t => !t.has_lyrics).length;
  c.innerHTML = `
    <button class="back-btn" onclick="openAlbums()">← Back to albums</button>
    <div class="section">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px">
        <img src="${esc(a.artwork_url || '')}" style="width:80px;height:80px;border-radius:10px;background:var(--dim);object-fit:cover" onerror="this.style.visibility='hidden'">
        <div>
          <div style="font-size:18px;font-weight:700">${esc(a.album_name || '')}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px">${esc(a.artist_name || '')}${a.release_year ? ' · ' + a.release_year : ''}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:6px">
            ${tracks.length} track${tracks.length === 1 ? '' : 's'}
            · ${missingLyrics} missing lyrics
            · ${sc.missing === 0 ? `<span style="color:rgba(120,200,120,0.6)">side info ✓</span>`
                                 : `<span style="color:rgba(224,112,112,0.6)">side info missing on ${sc.missing}/${sc.total}</span>`}
          </div>
        </div>
      </div>
      ${tracks.length > 1 ? `<button class="back-btn" style="margin:0 0 14px" onclick="openReorder()">⇅ Fix track order</button>` : ''}
      ${tracks.length === 0 ? '<div style="color:var(--muted);font-size:13px">No track data</div>' :
        tracks.map(t => `
          <div class="track-row">
            <div class="track-num">${t.disc_number > 1 ? t.disc_number + '-' : ''}${t.track_number || ''}</div>
            <div class="track-side ${t.position ? '' : 'missing'}">${t.position ? esc(t.position) : '—'}</div>
            <div class="track-name">${esc(t.track_name || '')}</div>
            <div class="track-plays">${fmt(t.plays)} plays</div>
            <div class="track-flag ${t.has_lyrics ? 'ok' : ''}">
              ${t.has_lyrics ? '✓ lyrics' : '✗ missing'}
              ${t.lyrics_source ? `<span class="source">via ${esc(t.lyrics_source)}</span>` : ''}
            </div>
          </div>`).join("")}
      ${sc.missing > 0 ? `
      <div class="side-form" id="side-form-${a.itunes_collection_id || ''}">
        <div class="side-form-title">⚠︎ Add side data (${sc.missing}/${sc.total} tracks missing)</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Enter how many tracks are on each side. Leave a side at 0 to skip it.</div>
        <div class="side-inputs">
          <div class="side-input-group"><div class="side-input-label">Side A</div><input class="side-input" id="side-a-${a.itunes_collection_id}" type="number" min="0" value="${Math.ceil(tracks.length / 2)}"></div>
          <div class="side-input-group"><div class="side-input-label">Side B</div><input class="side-input" id="side-b-${a.itunes_collection_id}" type="number" min="0" value="${Math.floor(tracks.length / 2)}"></div>
          <div class="side-input-group"><div class="side-input-label">Side C</div><input class="side-input" id="side-c-${a.itunes_collection_id}" type="number" min="0" value="0"></div>
          <div class="side-input-group"><div class="side-input-label">Side D</div><input class="side-input" id="side-d-${a.itunes_collection_id}" type="number" min="0" value="0"></div>
        </div>
        <button class="side-form-btn" onclick="submitSideData(${a.itunes_collection_id}, ${tracks.length})">Save Side Data</button>
        <div class="side-form-msg" id="side-msg-${a.itunes_collection_id}"></div>
      </div>` : ''}
    </div>
  `;
}

// ── Track-order editor ─────────────────────────────────────────────────────
// Reorders album_tracks to match a vinyl pressing whose sequence differs from
// the iTunes listing. Always acts on the explicit itunes_collection_id.
function openReorder() {
  if (!albumDetailCache) return;
  reorderTracks = (albumDetailCache.tracks || []).map(t => ({
    itunes_track_id: t.itunes_track_id,
    track_name: t.track_name,
  }));
  renderReorder();
}

function renderReorder() {
  const c = document.getElementById("content");
  const a = (albumDetailCache && albumDetailCache.album) || {};
  const cid = a.itunes_collection_id;
  c.innerHTML = `
    <button class="back-btn" onclick="openAlbum(${cid})">← Back to album</button>
    <div class="section">
      <div class="section-title">Fix track order — ${esc(a.album_name || '')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Reorder so the sequence matches the vinyl pressing. Saving rewrites the track numbers for this album and clears its side data (re-enter it afterward).</div>
      <div id="reorder-list">
        ${reorderTracks.map((t, i) => `
          <div class="track-row">
            <div class="track-num">${i + 1}</div>
            <div class="track-name">${esc(t.track_name || '')}</div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="back-btn" style="margin:0;padding:4px 10px" ${i === 0 ? 'disabled' : ''} onclick="moveReorder(${i},-1)">▲</button>
              <button class="back-btn" style="margin:0;padding:4px 10px" ${i === reorderTracks.length - 1 ? 'disabled' : ''} onclick="moveReorder(${i},1)">▼</button>
            </div>
          </div>`).join("")}
      </div>
      <button class="side-form-btn" style="margin-top:16px" onclick="saveOrder(${cid})">Save order</button>
      <div class="side-form-msg" id="reorder-msg"></div>
    </div>
  `;
}

function moveReorder(idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= reorderTracks.length) return;
  const tmp = reorderTracks[idx]; reorderTracks[idx] = reorderTracks[j]; reorderTracks[j] = tmp;
  renderReorder();
}

async function saveOrder(collectionId) {
  const msg = document.getElementById("reorder-msg");
  const btn = document.querySelector("#content .side-form-btn");
  btn.disabled = true;
  msg.textContent = "Saving…"; msg.className = "side-form-msg";
  try {
    const r = await fetch(API, {
      method: "POST",
      headers: { "x-admin-password": pw, "Content-Type": "application/json" },
      body: JSON.stringify({ action: "reorder-tracks", collectionId, trackIds: reorderTracks.map(t => t.itunes_track_id) }),
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.ok) {
      msg.textContent = `✓ Saved new order (${d.updated} tracks). Re-enter side data on the album page.`;
      msg.className = "side-form-msg ok";
      setTimeout(() => openAlbum(collectionId), 1500);
    } else {
      msg.textContent = "✗ " + (d.error || ("HTTP " + r.status));
      msg.className = "side-form-msg err";
      btn.disabled = false;
    }
  } catch (e) {
    msg.textContent = "✗ " + e.message;
    msg.className = "side-form-msg err";
    btn.disabled = false;
  }
}

async function submitSideData(collectionId, totalTracks) {
  const msg = document.getElementById("side-msg-" + collectionId);
  const btn = document.querySelector(`#side-form-${collectionId} .side-form-btn`);
  const getVal = (id) => parseInt(document.getElementById(id + "-" + collectionId)?.value || "0", 10) || 0;
  const sides = [
    { letter: "A", count: getVal("side-a") },
    { letter: "B", count: getVal("side-b") },
    { letter: "C", count: getVal("side-c") },
    { letter: "D", count: getVal("side-d") },
  ].filter(s => s.count > 0);

  if (!sides.length) { msg.textContent = "Enter at least one side count."; msg.className = "side-form-msg err"; return; }
  const assigned = sides.reduce((s, x) => s + x.count, 0);
  if (assigned !== totalTracks) {
    msg.textContent = `Side totals (${assigned}) must equal track count (${totalTracks}).`;
    msg.className = "side-form-msg err";
    return;
  }

  btn.disabled = true;
  msg.textContent = "Saving…";
  msg.className = "side-form-msg";
  try {
    const r = await fetch(API, {
      method: "POST",
      headers: { "x-admin-password": pw, "Content-Type": "application/json" },
      body: JSON.stringify({ action: "add-vinyl-sides", collectionId, sides }),
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.ok) {
      msg.textContent = `✓ Saved ${d.inserted} side assignments`;
      msg.className = "side-form-msg ok";
      // Reload the album detail to reflect new side data
      setTimeout(() => openAlbum(collectionId), 1200);
    } else {
      msg.textContent = "✗ " + (d.error || ("HTTP " + r.status));
      msg.className = "side-form-msg err";
      btn.disabled = false;
    }
  } catch (e) {
    msg.textContent = "✗ " + e.message;
    msg.className = "side-form-msg err";
    btn.disabled = false;
  }
}

function showLogin(err) {
  document.getElementById("dash").style.display = "none";
  document.getElementById("login").style.display = "flex";
  document.getElementById("login-err").textContent = err || "";
  // Drop any stale saved pw so the auto-resume path doesn't keep looping.
  sessionStorage.removeItem("liri_admin_pw");
  pw = "";
}

async function tryLogin() {
  pw = document.getElementById("pw-input").value.trim();
  if (!pw) return;
  document.getElementById("login-btn").textContent = "Checking…";
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").style.display = "block";
  await load();
  document.getElementById("login-btn").textContent = "Enter";
  // load() calls showLogin() with an error if pw was rejected; only stash
  // the pw when the login form is truly gone from view.
  if (document.getElementById("login").style.display === "none") {
    sessionStorage.setItem("liri_admin_pw", pw);
  }
}

document.getElementById("login-btn").addEventListener("click", tryLogin);
document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
document.getElementById("refresh-btn").addEventListener("click", load);

// Auto-resume: if we already have a pw from a prior tab load, skip straight
// to the dashboard. If it turns out to be stale/wrong, load() will fall
// through to showLogin() and the sessionStorage entry gets cleared there.
if (pw) {
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").style.display = "block";
  load();
}

// Auto-refresh the dashboard every 60s — but only when it's actually showing.
// If the admin has drilled into a sub-view (missing lyrics, user detail, an
// album, etc. — all of which render a "← Back to dashboard" button), leave it
// alone so a refresh doesn't yank them out of what they're doing.
setInterval(() => {
  if (pw && !document.querySelector("#content .back-btn")) load();
}, 60000);

// ── Missing Lyrics ────────────────────────────────────────────────────────────

async function openMissingLyrics() {
  const c = document.getElementById("content");
  c.innerHTML = `<div class="loading">Finding tracks without lyrics…</div>`;

  // Use Supabase REST directly — need the service key or anon key
  // We'll hit the sync-catalogue endpoint with a special action
  const r = await fetch(API + "?action=missing-lyrics", { headers: { "x-admin-password": pw } });
  if (!r.ok) { c.innerHTML = `<div class="loading">Error — make sure sync-catalogue supports action=missing-lyrics</div>`; return; }
  const d = await r.json();
  const tracks = d.tracks || [];

  if (tracks.length === 0) {
    c.innerHTML = `
      <button class="back-btn" onclick="load()">← Dashboard</button>
      <div style="text-align:center;padding:80px 0;color:var(--muted);font-size:16px">🎉 Every track has lyrics!</div>`;
    return;
  }

  // Group by collection
  const albumMap = {}, albumOrder = [];
  tracks.forEach(t => {
    const cid = t.itunes_collection_id;
    if (!albumMap[cid]) { albumMap[cid] = { ...t, tracks: [] }; albumOrder.push(cid); }
    albumMap[cid].tracks.push(t);
  });

  // One link to lrclib's home page + a copy-paste search string (song + artist)
  // to drop into any search engine when hunting down an LRC.
  const searchLinks = (name, artist) => {
    const q = `${name} ${artist}`.trim();
    const qAttr = esc(q).replace(/"/g, "&quot;");
    return `<a class="lrc-link" href="https://lrclib.net" target="_blank">lrclib.net ↗</a>`
         + `<span class="lrc-search" onclick="copySearch(this)" data-q="${qAttr}" title="Click to copy">${esc(q)} ⧉</span>`;
  };

  const fmt_dur = ms => ms ? `${Math.floor(ms/60000)}:${String(Math.floor((ms%60000)/1000)).padStart(2,"0")}` : "";

  const plainOnly = tracks.filter(t => t.has_plain).length;
  c.innerHTML = `
    <button class="back-btn" onclick="load()">← Dashboard</button>
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">Missing Lyrics</div>
      <div style="font-size:13px;color:var(--muted)">${tracks.length} track${tracks.length!==1?"s":""} across ${albumOrder.length} album${albumOrder.length!==1?"s":""} without synced timestamps${plainOnly ? ` — <span style="color:var(--gold)">${plainOnly} have plain lyrics</span> and show as unsynced auto-scroll in the app` : ""}. Click a track → find LRC → paste → submit.</div>
    </div>
    ${albumOrder.map(cid => {
      const alb = albumMap[cid];
      return `
      <div class="lrc-album" id="lrc-alb-${cid}">
        <div class="lrc-album-hdr" onclick="toggleLrcAlbum('${cid}')">
          ${alb.artwork_url ? `<img class="lrc-album-art" src="${esc(alb.artwork_url)}">` : `<div class="lrc-album-art"></div>`}
          <div class="lrc-album-info">
            <div class="lrc-album-name">${esc(alb.album_name)}</div>
            <div class="lrc-album-artist">${esc(alb.artist_name)}</div>
          </div>
          <div class="lrc-badge">${alb.tracks.length} missing</div>
          <div class="lrc-chevron" id="lrc-chev-${cid}">›</div>
        </div>
        <div class="lrc-tracks" id="lrc-tracks-${cid}">
          ${alb.tracks.map((t, i) => {
            const tid = `${cid}-${i}`;
            return `
            <div class="lrc-track" id="lrc-t-${tid}">
              <div class="lrc-track-row" onclick="toggleLrcTrack('${tid}')">
                <div class="lrc-track-name">${esc(t.track_name)}</div>
                ${t.has_plain ? `<span style="flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--gold);background:rgba(212,168,70,0.12);border:1px solid rgba(212,168,70,0.3);border-radius:8px;padding:2px 8px;margin-right:8px">PLAIN ONLY</span>` : `<span style="flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:0.5px;color:#e07070;background:rgba(224,112,112,0.1);border:1px solid rgba(224,112,112,0.3);border-radius:8px;padding:2px 8px;margin-right:8px">NO LYRICS</span>`}
                <div class="lrc-track-dur">${fmt_dur(t.duration_ms)}</div>
                <div class="lrc-chevron" id="lrc-tc-${tid}">›</div>
              </div>
              <div class="lrc-submit" id="lrc-s-${tid}">
                <div class="lrc-links">${searchLinks(t.track_name, t.artist_name)}</div>
                <textarea class="lrc-textarea" id="lrc-txt-${tid}" rows="6"
                  placeholder="[00:12.34] First line\n[00:16.00] Second line…"></textarea>
                <div style="display:flex;align-items:center;gap:12px">
                  <button class="lrc-submit-btn" id="lrc-btn-${tid}"
                    onclick="submitLrc('${tid}','${esc(t.track_name).replace(/'/g,"\\'")}','${esc(t.artist_name).replace(/'/g,"\\'")}','${esc(t.album_name).replace(/'/g,"\\'")}',${t.duration_ms||0},${t.itunes_track_id||0})">
                    Save to Liri + lrclib
                  </button>
                  <span class="lrc-msg" id="lrc-msg-${tid}"></span>
                </div>
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  `;
}

// Copy the search string to the clipboard (click-to-copy chip in Missing Lyrics)
async function copySearch(el) {
  const text = el.dataset.q || el.textContent.replace(/\s*⧉$/, "");
  try {
    await navigator.clipboard.writeText(text);
    const prev = el.textContent;
    el.textContent = "copied ✓";
    el.classList.add("copied");
    setTimeout(() => { el.textContent = prev; el.classList.remove("copied"); }, 1200);
  } catch (e) {
    // Clipboard blocked — select the text so it can be copied manually
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function toggleLrcAlbum(cid) {
  const el = document.getElementById("lrc-tracks-" + cid);
  const ch = document.getElementById("lrc-chev-" + cid);
  el.classList.toggle("open");
  ch.style.transform = el.classList.contains("open") ? "rotate(90deg)" : "";
}

function toggleLrcTrack(tid) {
  const el = document.getElementById("lrc-s-" + tid);
  const ch = document.getElementById("lrc-tc-" + tid);
  el.classList.toggle("open");
  ch.style.transform = el.classList.contains("open") ? "rotate(90deg)" : "";
}

async function submitLrc(tid, trackName, artistName, albumName, durationMs, itunesTrackId) {
  const ta  = document.getElementById("lrc-txt-" + tid);
  const btn = document.getElementById("lrc-btn-" + tid);
  const msg = document.getElementById("lrc-msg-" + tid);
  const lrc = ta.value.trim();

  if (!lrc) { msg.className = "lrc-msg err"; msg.textContent = "Paste LRC first."; return; }
  if (!/\[\d{2}:\d{2}\.\d+\]/.test(lrc)) {
    msg.className = "lrc-msg err";
    msg.textContent = "Doesn't look like LRC — need lines like [00:12.34] lyric";
    return;
  }

  btn.disabled = true; btn.textContent = "Submitting…";
  msg.textContent = "";

  try {
    const r = await fetch("/api/sync-catalogue", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-admin-password": pw },
      body: JSON.stringify({
        action: "submit-lyrics",
        trackName, artistName, albumName,
        duration: Math.round(durationMs / 1000),
        syncedLyrics: lrc,
        itunesTrackId: itunesTrackId || undefined,
      }),
    });
    const json = await r.json().catch(() => ({}));
    if (r.ok) {
      msg.className = "lrc-msg ok"; msg.textContent = json.message || "Saved ✓";
      btn.textContent = "Done ✓";
      // Collapse and dim the track row
      setTimeout(() => {
        const row = document.getElementById("lrc-t-" + tid);
        if (row) row.style.opacity = "0.3";
      }, 1000);
    } else {
      msg.className = "lrc-msg err"; msg.textContent = json.error || ("Error " + r.status);
      btn.disabled = false; btn.textContent = "Save to Liri + lrclib";
    }
  } catch(e) {
    msg.className = "lrc-msg err"; msg.textContent = "Network error";
    btn.disabled = false; btn.textContent = "Save to Liri + lrclib";
  }
}

  const r = await fetch(API + "?action=missing-side-info", { headers: { "x-admin-password": pw } });

  const d = await r.json();

  if (albums.length === 0) {

      <button class="back-btn" onclick="load()">← Dashboard</button>
      <div style="text-align:center;padding:80px 0;color:var(--muted);font-size:16px">💿 Every album has side info!</div>`;
    return;
  }

  c.innerHTML = `
    <button class="back-btn" onclick="load()">← Dashboard</button>
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">Missing Side Info</div>
      <div style="font-size:13px;color:var(--muted)">${albums.length} album${albums.length!==1?"s":""} with missing side data. Click one to enter side counts.</div>
    </div>
    ${albums.map(a => `
      <div class="album-row" onclick="openAlbum(${a.itunes_collection_id})">

        <div class="album-info">
          <div class="album-name">${esc(a.album_name || '(untitled)')}</div>
          <div class="album-artist">${esc(a.artist_name || '')}</div>

        <div class="album-stats">
          <div class="album-stat"><div class="album-stat-val" style="color:rgba(224,112,112,0.85)">${a.missing}/${a.total}</div><div class="album-stat-lbl">missing</div></div>
        </div>
      </div>
    `).join("")}
  `;
}
