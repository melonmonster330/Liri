<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Profile — Liri</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    #root { min-height: 100vh; max-width: 100vw; overflow-x: hidden; }
    ::-webkit-scrollbar { display: none; }
    button, a, [role="button"] { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    button:active, a:active, [role="button"]:active { opacity: 0.65; transform: scale(0.97); transition: opacity 0s, transform 0s; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>document.addEventListener('touchstart', function(){}, {passive: true});</script>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="vendor/tabbar.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const APP_VERSION = "1.1.7";

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    function Spinner({ size = 22 }) {
      return <div style={{ width: size, height: size, border: "2px solid rgba(255,255,255,0.15)", borderTopColor: "#f0e6d3", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />;
    }

    function PrivacyBadge({ value }) {
      if (value === "public") return null;
      const label = value === "friends" ? "Friends only" : "Private";
      return (
        <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 700, color: "rgba(212,168,70,0.85)", background: "rgba(212,168,70,0.1)", border: "1px solid rgba(212,168,70,0.25)", padding: "3px 8px", borderRadius: 50, letterSpacing: 0.3, textTransform: "uppercase" }}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          {label}
        </span>
      );
    }

    function Stat({ value, label }) {
      return (
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#f0e6d3" }}>{value}</div>
          <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.4)", letterSpacing: 0.4, textTransform: "uppercase", marginTop: 2 }}>{label}</div>
        </div>
      );
    }

    const VISIBILITY_FILTERS = [
      { key: "all",     label: "All" },
      { key: "public",  label: "Public" },
      { key: "friends", label: "Friends" },
      { key: "private", label: "Private" },
    ];

    function App() {
      const [user, setUser]               = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [profile, setProfile]         = useState(null);
      const [loading, setLoading]         = useState(true);
      const [filter, setFilter]           = useState("all");

      // Posts/follow counts — placeholder until those tables land.
      const counts = { posts: 0, followers: 0, following: 0 };

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
        });
        const { data: sub } = sb.auth.onAuthStateChange((_e, s) => {
          setUser(s?.user ?? null);
        });
        return () => sub?.subscription?.unsubscribe?.();
      }, []);

      const loadProfile = useCallback(async (uid) => {
        setLoading(true);
        const { data, error } = await sb.from("profiles").select("*").eq("id", uid).maybeSingle();
        if (error) console.error(error);
        setProfile(data || null);
        setLoading(false);
      }, []);

      useEffect(() => { if (user) loadProfile(user.id); }, [user, loadProfile]);

      if (authLoading) return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}><Spinner size={36} /></div>;

      if (!user) return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 24px", textAlign:"center" }}>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Sign in to view your profile</div>
          <a href="/app" style={{ background:"linear-gradient(135deg,#d4a846,#c9807a)", color:"#080810", borderRadius: 50, padding:"14px 32px", fontSize: 14, fontWeight: 700, textDecoration:"none", marginTop: 16 }}>
            Sign in to Liri →
          </a>
        </div>
      );

      if (loading || !profile) return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}><Spinner size={36} /></div>;

      const initials = (profile.display_name || profile.username || "?").trim().slice(0, 2).toUpperCase();

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 100 }}>

          {/* Top bar: settings gear */}
          <div style={{ padding: "max(64px, calc(env(safe-area-inset-top) + 20px)) 24px 0", display: "flex", justifyContent: "flex-end" }}>
            <a href="/app/settings.html" aria-label="Settings"
              style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.7)", borderRadius: 50, width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", textDecoration: "none" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </a>
          </div>

          {/* Profile header */}
          <div style={{ padding: "20px 24px 0", display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center" }}>
            <div style={{
              width: 88, height: 88, borderRadius: "50%",
              background: "linear-gradient(135deg, #d4a846, #c9807a)",
              color: "#080810", fontSize: 30, fontWeight: 800, letterSpacing: -0.5,
              display: "flex", alignItems: "center", justifyContent: "center",
              marginBottom: 16,
            }}>
              {initials}
            </div>

            {profile.display_name && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 2 }}>
                <div style={{ fontSize: 22, fontWeight: 700 }}>{profile.display_name}</div>
                {profile.is_official && (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="#d4a846" aria-label="Official account" title="Official">
                    <path d="M12 1.6l2.4 2.6 3.5-.4.4 3.5 2.6 2.4-2.6 2.4.4 3.5-3.5.4-2.4 2.6-2.4-2.6-3.5.4-.4-3.5L2 12l2.6-2.4-.4-3.5 3.5.4z" stroke="#d4a846" strokeWidth="0.5"/>
                    <polyline points="8 12 11 15 16 9" fill="none" stroke="#080810" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </div>
            )}
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>@{profile.username}</div>

            {profile.bio && (
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.5, maxWidth: 320, marginBottom: 12 }}>{profile.bio}</div>
            )}

            <PrivacyBadge value={profile.privacy} />
          </div>

          {/* Stats row */}
          <div style={{ display: "flex", padding: "24px 24px 0", gap: 8 }}>
            <Stat value={counts.posts}     label="Posts" />
            <Stat value={counts.followers} label="Followers" />
            <Stat value={counts.following} label="Following" />
          </div>

          {/* Actions */}
          <div style={{ padding: "20px 24px 0", display: "flex", gap: 8, justifyContent: "center" }}>
            <button
              onClick={() => alert("New post — coming next. We'll wire this up when the posts table lands.")}
              style={{
                background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810",
                border: "none", borderRadius: 50, padding: "8px 16px", fontSize: 13, fontWeight: 700,
                fontFamily: "inherit", display: "inline-flex", alignItems: "center", gap: 6,
              }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New post
            </button>
            <a href="/app/settings.html"
              style={{
                background: "rgba(255,255,255,0.06)", color: "rgba(240,230,211,0.8)",
                border: "1px solid rgba(255,255,255,0.12)", borderRadius: 50,
                padding: "8px 16px", fontSize: 13, fontWeight: 700,
                textDecoration: "none", display: "inline-flex", alignItems: "center",
              }}>
              Edit profile
            </a>
          </div>

          {/* Visibility filter chips */}
          <div style={{ padding: "24px 24px 0", display: "flex", gap: 8, overflowX: "auto" }}>
            {VISIBILITY_FILTERS.map(f => {
              const active = filter === f.key;
              return (
                <button key={f.key} onClick={() => setFilter(f.key)}
                  style={{
                    padding: "8px 14px", borderRadius: 50, fontSize: 12, fontWeight: 700, letterSpacing: 0.3,
                    border: active ? "1px solid rgba(212,168,70,0.6)" : "1px solid rgba(255,255,255,0.12)",
                    background: active ? "rgba(212,168,70,0.12)" : "rgba(255,255,255,0.03)",
                    color: active ? "#d4a846" : "rgba(240,230,211,0.7)",
                    fontFamily: "inherit", whiteSpace: "nowrap",
                  }}>
                  {f.label}
                </button>
              );
            })}
          </div>

          {/* Posts (empty for now) */}
          <div style={{ padding: "40px 32px 0", textAlign: "center", color: "rgba(255,255,255,0.4)" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#f0e6d3", marginBottom: 6 }}>No posts yet</div>
            <div style={{ fontSize: 13, lineHeight: 1.6, maxWidth: 260, margin: "0 auto" }}>
              Share a record you're spinning and it'll show up here. {filter !== "all" && (<span>Filter: <strong style={{ color: "rgba(212,168,70,0.9)" }}>{filter}</strong>.</span>)}
            </div>
          </div>

          <div style={{ textAlign:"center", padding:"60px 0 16px", fontSize:"11px", color:"rgba(255,255,255,0.1)" }}>Liri v{APP_VERSION}</div>

          <TabBar current="profile" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
