<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Settings — Liri</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    body { background: #080810; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    #root { min-height: 100vh; max-width: 100vw; overflow-x: hidden; }
    input, textarea, select { outline: none; font-family: inherit; }
    input:focus, textarea:focus, select:focus { border-color: rgba(212,168,70,0.6) !important; }
    ::-webkit-scrollbar { display: none; }
    button, a, [role="button"] { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    button:active, a:active, [role="button"]:active { opacity: 0.65; transform: scale(0.97); transition: opacity 0s, transform 0s; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>document.addEventListener('touchstart', function(){}, {passive: true});</script>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/supabase.min.js"></script>
  <script src="vendor/tabbar.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const APP_VERSION = "1.2.2";

    const sb = supabase.createClient(
      "https://xjdjpaxgymgbvcwmvorc.supabase.co",
      "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd"
    );

    const inp = {
      width: "100%", background: "rgba(255,255,255,0.05)",
      border: "1px solid rgba(255,255,255,0.1)", color: "#f0e6d3",
      padding: "14px 16px", borderRadius: "12px", fontSize: "15px",
      fontFamily: "inherit", transition: "border-color 0.2s",
    };

    const label = { fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.5)", marginBottom: 8, letterSpacing: 0.3, textTransform: "uppercase" };
    const help  = { fontSize: 12, color: "rgba(255,255,255,0.35)", marginTop: 6, lineHeight: 1.5 };
    const err   = { fontSize: 13, color: "#e8a0a8", marginTop: 6 };

    const USERNAME_RE = /^[a-z0-9_]{3,20}$/;

    function Spinner({ size = 22 }) {
      return <div style={{ width: size, height: size, border: "2px solid rgba(255,255,255,0.15)", borderTopColor: "#f0e6d3", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />;
    }

    function App() {
      const [user, setUser]               = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [loading, setLoading]         = useState(true);

      const [username, setUsername]       = useState("");
      const [displayName, setDisplayName] = useState("");
      const [bio, setBio]                 = useState("");
      const [privacy, setPrivacy]         = useState("private");
      const [autoPostVis, setAutoPostVis] = useState("off");

      const [usernameErr, setUsernameErr] = useState("");
      const [usernameStatus, setUsernameStatus] = useState("idle"); // idle | checking | available | taken | invalid | same
      const [originalUsername, setOriginalUsername] = useState("");
      const [saving, setSaving]           = useState(false);
      const [savedAt, setSavedAt]         = useState(0);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
        });
        const { data: sub } = sb.auth.onAuthStateChange((_e, s) => {
          setUser(s?.user ?? null);
        });
        return () => sub?.subscription?.unsubscribe?.();
      }, []);

      const loadProfile = useCallback(async (uid) => {
        setLoading(true);
        const { data, error } = await sb.from("profiles").select("*").eq("id", uid).maybeSingle();
        if (error) console.error(error);
        if (data) {
          setUsername(data.username || "");
          setOriginalUsername(data.username || "");
          setDisplayName(data.display_name || "");
          setBio(data.bio || "");
          setPrivacy(data.privacy || "private");
          setAutoPostVis(data.auto_post_visibility || "off");
        }
        setLoading(false);
      }, []);

      useEffect(() => { if (user) loadProfile(user.id); }, [user, loadProfile]);

      // ── Live username availability check ──
      useEffect(() => {
        const u = username.trim().toLowerCase();
        if (!u) { setUsernameStatus("idle"); return; }
        if (u === originalUsername) { setUsernameStatus("same"); return; }
        if (!USERNAME_RE.test(u)) { setUsernameStatus("invalid"); return; }

        setUsernameStatus("checking");
        let cancelled = false;
        const timer = setTimeout(async () => {
          const { data, error } = await sb
            .from("profiles")
            .select("id")
            .eq("username", u)
            .maybeSingle();
          if (cancelled) return;
          if (error) { setUsernameStatus("idle"); return; }
          setUsernameStatus(data ? "taken" : "available");
        }, 350);
        return () => { cancelled = true; clearTimeout(timer); };
      }, [username, originalUsername]);

      const save = async () => {
        setUsernameErr("");
        const u = username.trim().toLowerCase();
        if (!USERNAME_RE.test(u)) {
          setUsernameErr("Username must be 3–20 characters, lowercase letters, numbers, or underscore.");
          return;
        }
        if (usernameStatus === "taken") {
          setUsernameErr("That username is taken. Try another.");
          return;
        }
        if (usernameStatus === "checking") {
          setUsernameErr("Hold on a sec — still checking that username.");
          return;
        }
        setSaving(true);
        const { error } = await sb.from("profiles").update({
          username: u,
          display_name: displayName.trim() || null,
          bio: bio.trim() || null,
          privacy,
          auto_post_visibility: autoPostVis,
        }).eq("id", user.id);
        setSaving(false);
        if (error) {
          setUsernameErr(error.code === "23505" ? "That username is taken. Try another." : (error.message || "Could not save. Try again."));
          return;
        }
        setSavedAt(Date.now());
        loadProfile(user.id);
      };

      if (authLoading) return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}><Spinner size={36} /></div>;

      if (!user) return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 24px", textAlign:"center" }}>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Sign in to manage settings</div>
          <a href="/app" style={{ background:"linear-gradient(135deg,#d4a846,#c9807a)", color:"#080810", borderRadius: 50, padding:"14px 32px", fontSize: 14, fontWeight: 700, textDecoration: "none", marginTop: 16 }}>
            Sign in to Liri →
          </a>
        </div>
      );

      if (loading) return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}><Spinner size={36} /></div>;

      const showSavedToast = savedAt > 0 && (Date.now() - savedAt < 2500);

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 100 }}>

          {/* Header */}
          <div style={{ padding: "max(64px, calc(env(safe-area-inset-top) + 20px)) 24px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
              <button onClick={() => window.history.length > 1 ? window.history.back() : (window.location.href = "/app/profile.html")}
                style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", padding: "10px", display: "flex", alignItems: "center", justifyContent: "center", minWidth: 44, minHeight: 44 }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <span style={{ fontSize: 18, fontWeight: 700, color: "#f0e6d3" }}>Settings</span>
            </div>
          </div>

          <div style={{ padding: "0 24px", display: "flex", flexDirection: "column", gap: 22 }}>

            <div>
              <div style={label}>Username</div>
              <div style={{ position: "relative" }}>
                <input value={username} onChange={e => setUsername(e.target.value.toLowerCase())} placeholder="your_handle" maxLength={20} style={{ ...inp, paddingRight: 44 }} autoCapitalize="none" autoCorrect="off" spellCheck={false} />
                <div style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", display: "flex", alignItems: "center" }}>
                  {usernameStatus === "checking" && <Spinner size={16} />}
                  {usernameStatus === "available" && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(120,220,150,0.9)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                  {(usernameStatus === "taken" || usernameStatus === "invalid") && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8a0a8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}
                </div>
              </div>
              {usernameErr
                ? <div style={err}>{usernameErr}</div>
                : usernameStatus === "available" ? <div style={{ ...help, color: "rgba(120,220,150,0.9)" }}>@{username.trim()} is available.</div>
                : usernameStatus === "taken"     ? <div style={err}>That username is taken. Try another.</div>
                : usernameStatus === "invalid"   ? <div style={err}>3–20 characters. Lowercase letters, numbers, and underscore only.</div>
                : <div style={help}>3–20 characters. Lowercase letters, numbers, and underscore. This is your @ on Liri.</div>
              }
            </div>

            <div>
              <div style={label}>Display name</div>
              <input value={displayName} onChange={e => setDisplayName(e.target.value)} placeholder="What friends call you" maxLength={40} style={inp} />
              <div style={help}>Optional. Shown above your username on your profile.</div>
            </div>

            <div>
              <div style={label}>Bio</div>
              <textarea value={bio} onChange={e => setBio(e.target.value)} placeholder="A line or two about your taste." maxLength={160} rows={3} style={{ ...inp, resize: "none", minHeight: 80 }} />
              <div style={help}>{160 - bio.length} characters left.</div>
            </div>

            <div>
              <div style={label}>Profile privacy</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[
                  { value: "private",  title: "Private",      desc: "Only you. Nobody can find or follow you." },
                  { value: "friends",  title: "Friends only", desc: "Mutual follows. Others can request to follow." },
                  { value: "public",   title: "Public",       desc: "Anyone on Liri can find and follow you." },
                ].map(opt => (
                  <button key={opt.value} onClick={() => setPrivacy(opt.value)}
                    style={{
                      textAlign: "left", padding: "14px 16px", borderRadius: 12,
                      border: privacy === opt.value ? "1px solid rgba(212,168,70,0.6)" : "1px solid rgba(255,255,255,0.1)",
                      background: privacy === opt.value ? "rgba(212,168,70,0.08)" : "rgba(255,255,255,0.03)",
                      color: "#f0e6d3", fontFamily: "inherit",
                    }}>
                    <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 3 }}>{opt.title}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>{opt.desc}</div>
                  </button>
                ))}
              </div>
              <div style={help}>Controls who can find your profile. Each post also has its own visibility.</div>
            </div>

            <div>
              <div style={label}>Auto-share what you spin</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[
                  { value: "off",     title: "Off",          desc: "Don't auto-post anything." },
                  { value: "private", title: "Private",      desc: "Auto-post but only you can see it." },
                  { value: "friends", title: "Friends only", desc: "Auto-post to mutual follows." },
                  { value: "public",  title: "Public",       desc: "Auto-post for anyone to see." },
                ].map(opt => (
                  <button key={opt.value} onClick={() => setAutoPostVis(opt.value)}
                    style={{
                      textAlign: "left", padding: "14px 16px", borderRadius: 12,
                      border: autoPostVis === opt.value ? "1px solid rgba(212,168,70,0.6)" : "1px solid rgba(255,255,255,0.1)",
                      background: autoPostVis === opt.value ? "rgba(212,168,70,0.08)" : "rgba(255,255,255,0.03)",
                      color: "#f0e6d3", fontFamily: "inherit",
                    }}>
                    <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 3 }}>{opt.title}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>{opt.desc}</div>
                  </button>
                ))}
              </div>
              <div style={help}>When you finish listening to an album, Liri can post it to your feed automatically.</div>
            </div>

            <button onClick={save} disabled={saving}
              style={{
                marginTop: 8, background: "linear-gradient(135deg,#d4a846,#c9807a)", color: "#080810",
                border: "none", borderRadius: 50, padding: "16px", fontSize: 15, fontWeight: 700,
                fontFamily: "inherit", opacity: saving ? 0.6 : 1,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
              }}>
              {saving ? <Spinner size={18} /> : "Save changes"}
            </button>

            {showSavedToast && <div style={{ textAlign: "center", fontSize: 13, color: "rgba(120,220,150,0.9)" }}>Saved ✓</div>}

            <div style={{ textAlign:"center", padding:"24px 0 16px", fontSize:"11px", color:"rgba(255,255,255,0.1)" }}>Liri v{APP_VERSION}</div>
          </div>

          <TabBar current="profile" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
