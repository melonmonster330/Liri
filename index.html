<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Liri — lyrics that follow your record in real time. Free on any browser and iOS." />
  <title>Liri — Lyrics for Vinyl</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a14;
      --gold: #d4a846;
      --rose: #e8a0a8;
      --cream: #f0e6d3;
      --mid: #2a2438;
      --dim: rgba(240,230,211,0.5);
      --faint: rgba(240,230,211,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ─── Shared layout ─── */
    .container { max-width: 760px; margin: 0 auto; padding: 0 24px; }
    .section    { padding: 80px 0; }

    /* ─── Typography ─── */
    .label   { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .h1      { font-size: clamp(36px, 7vw, 72px); font-weight: 400; line-height: 1.1; letter-spacing: -1px; }
    .h2      { font-size: clamp(24px, 4vw, 36px); font-weight: 400; line-height: 1.2; }
    .body    { font-size: 17px; color: var(--dim); max-width: 540px; line-height: 1.8; }
    .small   { font-size: 13px; color: rgba(240,230,211,0.35); }

    /* ─── Navigation ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 32px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(10,10,20,0.95) 60%, transparent);
      backdrop-filter: blur(12px);
    }
    .nav-logo { font-size: 16px; letter-spacing: 10px; color: var(--gold); font-weight: 300; }
    .nav-link { font-size: 13px; color: var(--dim); text-decoration: none; letter-spacing: 1px; }
    .nav-link:hover { color: var(--gold); }

    /* ─── Hero ─── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }

    /* Vinyl record illustration (pure CSS + SVG) */
    .vinyl-hero {
      position: absolute;
      right: -80px; top: 50%;
      transform: translateY(-50%);
      width: min(480px, 90vw);
      height: min(480px, 90vw);
      opacity: 0.18;
      animation: slow-spin 40s linear infinite;
    }
    @keyframes slow-spin { from { transform: translateY(-50%) rotate(0deg); } to { transform: translateY(-50%) rotate(360deg); } }

    @media (max-width: 600px) {
      .vinyl-hero { right: -120px; opacity: 0.1; width: 320px; height: 320px; }
    }

    /* ─── CTA button ─── */
    .cta-btn {
      background: linear-gradient(135deg, var(--gold), var(--rose));
      border: none; border-radius: 50px;
      color: var(--bg);
      padding: 14px 32px;
      font-size: 13px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
      display: inline-block;
    }
    .cta-btn:hover { opacity: 0.9; }
    .cta-btn:active { transform: scale(0.98); }

    /* ─── How it works ─── */
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px; margin-top: 48px; }
    .step {
      padding: 28px 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
    }
    .step-num { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 12px; }
    .step-title { font-size: 17px; color: var(--cream); margin-bottom: 8px; }
    .step-body { font-size: 14px; color: var(--dim); line-height: 1.7; }

    /* ─── Features ─── */
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 48px; }
    .feature { padding: 24px; border-left: 2px solid var(--gold); padding-left: 20px; }
    .feature-title { font-size: 15px; color: var(--cream); margin-bottom: 6px; }
    .feature-body  { font-size: 14px; color: var(--dim); line-height: 1.7; }

    /* ─── Platforms ─── */
    .platforms { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 36px; }
    .platform-chip {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      font-size: 13px; color: var(--dim);
      letter-spacing: 1px;
    }

    /* ─── Lyric mockup ─── */
    .lyric-mockup {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      margin-top: 48px;
    }
    .lyric-line { transition: all 0.6s ease; }
    .lyric-line.prev   { font-size: 15px; opacity: 0.25; margin-bottom: 16px; }
    .lyric-line.curr   { font-size: 28px; font-weight: 700; opacity: 1; color: #fff; text-shadow: 0 0 40px rgba(212,168,70,0.35); margin-bottom: 16px; letter-spacing: 0.4px; }
    .lyric-line.next   { font-size: 15px; opacity: 0.25; }

    /* ─── Divider ─── */
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0; }

    /* ─── Footer ─── */
    footer { padding: 40px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    footer .logo { font-size: 14px; letter-spacing: 8px; color: var(--gold); font-weight: 300; }
  </style>
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <svg width="26" height="26" viewBox="0 0 26 26">
        <circle cx="13" cy="13" r="12.5" fill="#1a1a2e"/>
        <circle cx="13" cy="13" r="10.5" fill="none" stroke="#2a2438" stroke-width="1.2"/>
        <circle cx="13" cy="13" r="8.5"  fill="none" stroke="#252035" stroke-width="1"/>
        <circle cx="13" cy="13" r="6.5"  fill="none" stroke="#2a2438" stroke-width="0.8"/>
        <circle cx="13" cy="13" r="4.5"  fill="none" stroke="#252035" stroke-width="0.8"/>
        <circle cx="13" cy="13" r="3"    fill="#d4a846" opacity="0.75"/>
        <circle cx="13" cy="13" r="1.1"  fill="#0a0a14"/>
      </svg>
      <span class="nav-logo">LIRI</span>
    </a>
    <a href="/app/" class="nav-link" style="background: rgba(212,168,70,0.15); border: 1px solid #d4a846; color: #d4a846; padding: 8px 18px; border-radius: 20px; font-size: 12px;">Open Liri →</a>
  </nav>

  <!-- ═══════════════════════
       HERO
       ═══════════════════════ -->
  <section class="hero">
    <svg class="vinyl-hero" viewBox="0 0 400 400">
      <defs>
        <radialGradient id="vg2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3a3050"/>
          <stop offset="100%" stop-color="#0a0a14"/>
        </radialGradient>
      </defs>
      <circle cx="200" cy="200" r="196" fill="url(#vg2)" stroke="#2a2438" stroke-width="4"/>
      <circle cx="200" cy="200" r="178" fill="none" stroke="#1a1a2a" stroke-width="2"/>
      <circle cx="200" cy="200" r="158" fill="none" stroke="#1e1a2e" stroke-width="1.5"/>
      <circle cx="200" cy="200" r="138" fill="none" stroke="#1a1a2a" stroke-width="1.5"/>
      <circle cx="200" cy="200" r="118" fill="none" stroke="#1e1a2e" stroke-width="1"/>
      <circle cx="200" cy="200" r="98"  fill="none" stroke="#1a1a2a" stroke-width="1"/>
      <circle cx="200" cy="200" r="78"  fill="none" stroke="#1e1a2e" stroke-width="1"/>
      <circle cx="200" cy="200" r="58"  fill="none" stroke="#1a1a2a" stroke-width="1"/>
      <circle cx="200" cy="200" r="44"  fill="#d4a846" opacity="0.6"/>
      <circle cx="200" cy="200" r="16"  fill="#0a0a14"/>
    </svg>

    <div class="container">
      <div class="label">Now available</div>
      <h1 class="h1">
        Lyrics that<br/>
        <span style="background: linear-gradient(135deg, #d4a846, #e8a0a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">follow your record.</span>
      </h1>
      <p class="body" style="margin-top: 24px;">
        Lyrics that follow your record — track by track.
      </p>

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:36px;">
        <a href="/app/" class="cta-btn">Open Liri →</a>
      </div>
      <p class="small" style="margin-top:16px;">Free to use · Any browser · iOS app available</p>
    </div>
  </section>


  <!-- Footer -->
  <footer>
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="22" height="22" viewBox="0 0 26 26">
        <circle cx="13" cy="13" r="12.5" fill="#1a1a2e"/>
        <circle cx="13" cy="13" r="10.5" fill="none" stroke="#2a2438" stroke-width="1.2"/>
        <circle cx="13" cy="13" r="8.5"  fill="none" stroke="#252035" stroke-width="1"/>
        <circle cx="13" cy="13" r="6.5"  fill="none" stroke="#2a2438" stroke-width="0.8"/>
        <circle cx="13" cy="13" r="4.5"  fill="none" stroke="#252035" stroke-width="0.8"/>
        <circle cx="13" cy="13" r="3"    fill="#d4a846" opacity="0.75"/>
        <circle cx="13" cy="13" r="1.1"  fill="#0a0a14"/>
      </svg>
      <div class="logo">LIRI</div>
    </div>
    <div style="font-size: 12px; color: rgba(240,230,211,0.2);">Lyrics for vinyl.</div>
  </footer>

  <style>
    @keyframes hero-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

</body>
</html>
