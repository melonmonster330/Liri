<!DOCTYPE html>
<!--
  tv.html — Liri TV Receiver
  ─────────────────────────────────────────────────────────────────────────────
  Dual-mode display for Liri lyrics on a large screen:

  MODE 1 — Google Cast Receiver (preferred)
    Loaded automatically by Chromecast when the user taps Cast in Liri.
    Receives lyrics + song data over a private Cast message channel.
    No room code needed. Sync is direct phone → Chromecast.

  MODE 2 — Browser fallback (QR code / URL)
    Works on any smart TV browser, Apple TV browser, etc.
    User enters or scans a room code → syncs via Supabase Realtime.
    Same display, different transport layer.

  Cast message namespace: urn:x-cast:com.getliri.lyrics
  Messages: SESSION_START | TRACK_ADVANCE | SESSION_END
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liri — TV</title>

  <!-- Cast Receiver SDK — only loads when running on a Chromecast -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- Supabase (used for browser-mode fallback only) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #050508; color: #f0e6d3; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }

    #backdrop {
      position: fixed; inset: -40px; z-index: 0;
      background-size: cover; background-position: center;
      filter: blur(120px) brightness(0.12) saturate(2.5);
      transition: background-image 1.5s ease, opacity 1s ease;
      opacity: 0;
    }
    #backdrop.visible { opacity: 1; }

    #overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(5,5,8,0.7) 0%, rgba(5,5,8,0.2) 40%, rgba(5,5,8,0.8) 100%);
      pointer-events: none;
    }

    /* ── WAITING screen ── */
    #waiting {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; transition: opacity 0.6s ease;
    }
    #waiting.hidden { opacity: 0; pointer-events: none; }

    .liri-logo { font-size: 42px; letter-spacing: 20px; color: #d4a846; font-weight: 300; margin-bottom: 8px; }
    .tagline { font-size: 15px; color: rgba(255,255,255,0.18); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 64px; }

    /* The big code display */
    #code-block { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #code-label { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    #tv-code {
      font-size: 120px; font-weight: 900; letter-spacing: 24px;
      background: linear-gradient(135deg, #d4a846, #c9807a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; padding-right: 24px; /* offset letter-spacing */
    }
    #code-hint { font-size: 18px; color: rgba(255,255,255,0.22); text-align: center; line-height: 1.7; margin-top: 8px; }
    #code-hint strong { color: rgba(255,255,255,0.5); font-weight: 600; }

    /* Cast mode waiting */
    #waiting-cast { display: none; flex-direction: column; align-items: center; gap: 16px; margin-top: 40px; text-align: center; }
    #waiting-cast.show { display: flex; }
    #cast-status { font-size: 20px; color: rgba(255,255,255,0.3); }
    #cast-hint { font-size: 16px; color: rgba(255,255,255,0.15); margin-top: 4px; }

    /* ── LYRICS screen ── */
    #lyrics-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
    }
    #lyrics-screen.visible { opacity: 1; pointer-events: auto; }

    #song-info {
      position: fixed; bottom: 48px; left: 64px; z-index: 20;
      display: flex; align-items: center; gap: 20px;
    }
    #song-art { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; }
    #song-art.show { display: block; }
    #song-title { font-size: 24px; font-weight: 700; color: #f0e6d3; }
    #song-artist { font-size: 18px; color: rgba(255,255,255,0.4); margin-top: 4px; }

    #room-badge { position: fixed; bottom: 48px; right: 64px; z-index: 20; font-size: 14px; color: rgba(255,255,255,0.15); letter-spacing: 2px; text-align: right; }

    #lyrics-container {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 120px 180px; gap: 0;
    }

    .lyric-line { text-align: center; line-height: 1.3; transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1); padding: 8px 0; }
    .lyric-line.current { font-size: 80px; font-weight: 800; color: #ffffff; text-shadow: 0 0 80px rgba(212,168,70,0.5), 0 4px 32px rgba(0,0,0,0.9); padding: 16px 0; }
    .lyric-line.near { font-size: 48px; font-weight: 400; color: rgba(255,255,255,0.3); }
    .lyric-line.far { font-size: 32px; font-weight: 300; color: rgba(255,255,255,0.12); }

    #no-lyrics { font-size: 36px; color: rgba(255,255,255,0.2); text-align: center; display: none; }
    #no-lyrics.show { display: block; }
  </style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="overlay"></div>

  <!-- WAITING screen -->
  <div id="waiting">
    <div class="liri-logo">LIRI</div>
    <div class="tagline">Lyrics for Vinyl</div>

    <!-- Cast mode: shown when running as Chromecast receiver -->
    <div id="waiting-cast">
      <div id="cast-status">Ready to receive</div>
      <div id="cast-hint">Open Liri on your phone and tap the Cast button</div>
    </div>

    <!-- Browser mode: TV shows its code, phone types it in -->
    <div id="code-block">
      <div id="code-label">Your TV code</div>
      <div id="tv-code">—</div>
      <div id="code-hint">
        Open Liri on your phone → tap <strong>📺</strong> → enter this code
      </div>
    </div>
  </div>

  <!-- LYRICS screen -->
  <div id="lyrics-screen">
    <div id="lyrics-container">
      <div id="no-lyrics">No lyrics available for this track</div>
    </div>
    <div id="song-info">
      <img id="song-art" alt="" />
      <div id="song-text">
        <div id="song-title"></div>
        <div id="song-artist"></div>
      </div>
    </div>
    <div id="room-badge"></div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const SB_URL       = "https://xjdjpaxgymgbvcwmvorc.supabase.co";
    const SB_KEY       = "sb_publishable_C-NBnfg0ltAoUi46XQTUjA_ozjZW_Nd";
    const CAST_NS      = "urn:x-cast:com.getliri.lyrics"; // Cast message namespace

    let syncInterval   = null;

    // ── Shared display functions (used by both Cast and browser mode) ──────────

    function showSession(data) {
      clearInterval(syncInterval);

      const detectedAt = typeof data.detectedAt === "number" ? data.detectedAt : new Date(data.detected_at || data.detectedAt).getTime();
      const initialPos = data.initialPos ?? data.initial_position ?? 0;
      const lyrics     = data.lyrics ?? data.lyrics_json ?? [];
      const artwork    = data.artworkUrl ?? data.artwork_url ?? null;
      const title      = data.songTitle  ?? data.song_title  ?? "";
      const artist     = data.songArtist ?? data.song_artist ?? "";

      if (artwork) {
        const bd = document.getElementById("backdrop");
        bd.style.backgroundImage = `url(${artwork})`;
        bd.classList.add("visible");
        const art = document.getElementById("song-art");
        art.src = artwork; art.classList.add("show");
      } else {
        document.getElementById("backdrop").classList.remove("visible");
        document.getElementById("song-art").classList.remove("show");
      }

      document.getElementById("song-title").textContent  = title;
      document.getElementById("song-artist").textContent = artist;
      document.getElementById("waiting").classList.add("hidden");
      document.getElementById("lyrics-screen").classList.add("visible");

      if (lyrics.length === 0) {
        document.getElementById("no-lyrics").classList.add("show");
        document.getElementById("lyrics-container").innerHTML = "";
        document.getElementById("lyrics-container").appendChild(document.getElementById("no-lyrics"));
        return;
      }
      document.getElementById("no-lyrics").classList.remove("show");

      let lastIdx = -1;
      syncInterval = setInterval(() => {
        const t   = initialPos + (Date.now() - detectedAt) / 1000;
        let idx   = 0;
        for (let i = 0; i < lyrics.length; i++) {
          if (lyrics[i].time <= t) idx = i; else break;
        }
        if (idx === lastIdx) return;
        lastIdx = idx;
        renderLyrics(lyrics, idx);
      }, 80);
    }

    function renderLyrics(lyrics, currentIdx) {
      const container = document.getElementById("lyrics-container");
      container.innerHTML = "";
      [
        [currentIdx - 2, "far"],
        [currentIdx - 1, "near"],
        [currentIdx,     "current"],
        [currentIdx + 1, "near"],
        [currentIdx + 2, "far"],
        [currentIdx + 3, "far"],
      ].forEach(([i, cls]) => {
        if (i < 0 || i >= lyrics.length) return;
        const div = document.createElement("div");
        div.className = "lyric-line " + cls;
        div.textContent = lyrics[i].text;
        container.appendChild(div);
      });
    }

    // ── MODE DETECTION ─────────────────────────────────────────────────────────
    // The Cast Receiver SDK sets up `cast.framework` on the window.
    // If it's present, we're running inside a Chromecast. Otherwise, browser mode.

    if (typeof cast !== "undefined" && cast.framework) {
      initCastReceiverMode();
    } else {
      initBrowserMode();
    }

    // ── CAST RECEIVER MODE ─────────────────────────────────────────────────────

    function initCastReceiverMode() {
      // Hide browser-mode UI, show Cast waiting screen
      document.getElementById("room-entry").style.display       = "none";
      document.getElementById("waiting-connected").style.display = "none";
      document.getElementById("waiting-cast").classList.add("show");
      document.getElementById("room-badge").textContent = "Cast";

      const context = cast.framework.CastReceiverContext.getInstance();

      // Listen for lyrics messages from the Liri sender app
      context.addCustomMessageListener(CAST_NS, event => {
        const msg = event.data;
        if (!msg || !msg.type) return;

        if (msg.type === "SESSION_START" || msg.type === "TRACK_ADVANCE") {
          showSession(msg);
        } else if (msg.type === "SESSION_END") {
          clearInterval(syncInterval);
          document.getElementById("lyrics-screen").classList.remove("visible");
          document.getElementById("waiting").classList.remove("hidden");
          document.getElementById("cast-status").textContent = "Ready to receive";
        }
      });

      // Start the receiver — this tells Chromecast we're ready
      context.start({ disableIdleTimeout: true });
    }

    // ── BROWSER / TV MODE ──────────────────────────────────────────────────────
    // The TV generates its own 4-digit code and displays it.
    // The user types that code into Liri on their phone.
    // Phone sends lyrics to cast_sessions with that room_code → TV shows them.

    function initBrowserMode() {
      const sb = supabase.createClient(SB_URL, SB_KEY);
      let realtimeChannel = null;

      // Generate or restore a stable 4-digit code (persists across page refresh via hash)
      let code = location.hash.replace("#", "").toUpperCase();
      if (!/^\d{4}$/.test(code)) {
        code = String(Math.floor(1000 + Math.random() * 9000));
        location.hash = code;
      }

      document.getElementById("tv-code").textContent = code;
      document.getElementById("room-badge").textContent = "liri.tv · " + code;

      // Subscribe to cast_sessions for this code
      realtimeChannel = sb.channel("cast:" + code)
        .on("postgres_changes", {
          event: "*", schema: "public", table: "cast_sessions",
          filter: "room_code=eq." + code
        }, payload => {
          if (payload.new?.is_active) showSession(payload.new);
        })
        .subscribe();

      // Also fetch any existing active session immediately (in case phone already connected)
      sb.from("cast_sessions")
        .select("*").eq("room_code", code).eq("is_active", true)
        .order("updated_at", { ascending: false }).limit(1)
        .then(({ data }) => { if (data?.[0]) showSession(data[0]); });
    }
  </script>
</body>
</html>
